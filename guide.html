        <div class="entry-head">
          <span class="entry-term">facility fee</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A per-ticket cost deducted directly from gross box office receipts for use of the venue's facilities. Listed on the ticket, but pulled before any artist split is calculated.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">fixed expense</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A show cost that is predetermined and independent of variable factors like tickets sold or gross box office. Security, parking, and venue rent typically run as fixed expenses.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">flat guarantee</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance agreement in which the artist's fee is a predetermined dollar amount with no additional money on the table. Exceptions can be made if a bonus is written into the deal memo.</div>
      </div>

      

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">force majeure</span>
          <span class="entry-pron">[fȯrs-mä-ˈzhər]</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An unexpected, disruptive event that may excuse a party from a contract. This protective clause assures the artist will still be paid in the event of inclement weather, a catastrophic event, or an "act of God."</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">front of house (FOH)</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The area where the sound and lighting boards are located — normally within 100 feet of center stage. Also used more broadly for the audience-facing side of the venue.</div>
      </div>

    </div>
  </div>
</div>

          <span class="entry-term">GA ticket</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— general admission</span>
        </div>
        <div class="entry-def">A ticket that allows an attendee access to a designated area of the venue without a specific seat assignment. Common at clubs, festivals, and standing-room shows.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">GBOR</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— gross box office receipts</span>
        </div>
        <div class="entry-def">Total income from ticket sales before any deductions. The top-line number on the settlement sheet, before facility fees, taxes, or anything else is pulled.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">gross</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Total income before deductions. Used loosely to refer to either GBOR or another top-line revenue figure — always confirm which.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">gross potential</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An event's total possible gross income from all ticket sales — ticket prices multiplied by capacity at each price level. The number the date could hit if every seat sold at full price.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">guarantee</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The flat fee the artist gets paid for the show, regardless of ticket sales. The minimum — additional money may come from splits, bonuses, or merch.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">H</span>
      <span class="letter-pron">[āch]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">headline billing</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A billing structure where no other name or likeness appears before, or larger than, the headlining artist. The dominant position on every flyer, ad, and marquee.</div>
      </div>

      

    </div>
  </div>
</div>

      <span class="letter-pron">[em]</span>
      <span class="letter-meta">— ENTRIES —</span>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">meet &amp; greet</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: M&amp;G</span>
        </div>
        <div class="entry-def">An autograph and/or photo session held between the artist and fans, contest winners, or VIPs. Typically organized through fan clubs, radio promotions, or the promoter — heavily managed for time and access.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">merch split</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The agreed percentages of the artist's merchandise sales revenue to be shared between artist and venue/promoter. A separate negotiated number from the show deal — and a line item at settlement.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">merchandise / merch</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">T-shirts, hats, vinyl, tour-specific items brought in by the artist to sell at the event. A meaningful revenue stream and a separate accounting line at settlement.</div>
      </div>

      

    </div>
  </div>
</div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">NBOR</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— net box office receipts</span>
        </div>
        <div class="entry-def">Total income from ticket sales after all deductions — expenses, taxes, fees. The figure that drives most artist-side splits in a deal that goes past breakeven.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">net</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The settlement number after all approved deductions are pulled from gross. What the artist actually walks away with.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">net potential</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The total possible net income for an event — gross potential minus the expected expenses, taxes, and fees. What the date could clear if it sold out at full price.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">O</span>
      <span class="letter-pron">[ō]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">one-off</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance or event on an isolated date that doesn't route with other dates. Usually a fly date — backline rented in market, local crew hired, the whole operation shaped around a single show.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">overage</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The amount by which a payment due to the artist exceeds the guaranteed amount. The math output of a deal that beat expectations.</div>
      </div>

    </div>
  </div>
</div>

          <span class="entry-term">phones</span>

        </div>
        <div class="entry-def">See <em>internet</em>.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">plus deal</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance agreement in which the artist receives a guaranteed fee plus the potential for additional money. The overage can be a percentage of box office receipts or a flat bonus based on ticket sales goals.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">production</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Sound, lights, stage equipment — the gear and labor that puts the show in the room. At settlement, "production" usually shows up as a single expense line that bundles a long list of underlying costs.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">promoter</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The company or person who has paid the artist to perform in their market. Owns the financial risk, the marketing, the venue rental, and the deal terms. Often, the promoter, the buyer, and the purchaser are the same entity.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">promoter profit deal</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance agreement in which the artist receives a guaranteed fee plus a percentage of box office receipts — after the promoter takes a profit off the top based on a percentage of the show expenses. A variation on the plus deal that protects the promoter's margin first.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">purchaser</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The contract verbiage for the event or event representative who signs the artist contract. Usually synonymous with promoter and buyer in practice.</div>
      </div>

    </div>
  </div>
</div>

          <span class="entry-term">radius clause</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A stated mileage from an event location within which the artist may not perform publicly for a specified number of days before and after the date. For example: <em>"Artist agrees to not publicly perform within 100 miles of event location 90 days prior to and 30 days following said Event."</em></div>
        <div class="entry-field"><strong>FIELD NOTE</strong>Read the radius clause before booking adjacent markets. A miss here can void the deal or cost the artist the date.</div>
      </div>

      

    </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">scaling</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The number of tickets at each different price level, based on the configuration and layout of the venue. Determines the gross potential and shapes the entire ticket-sales strategy.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">settlement</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The post-show financial reconciliation between the tour and the promoter. Tickets sold, deal terms applied, deductions subtracted, payment issued. The closing of the night — and the moment the deal moves from theory into cash.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">show advance / production advance</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The process of communication and negotiation between tour/production manager(s) and event representatives in the weeks leading up to a show — covering production, catering, local ground transportation, day-of-show schedule, and everything in between.</div>
      </div>

      

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">split point</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">See <em>breakeven / split point</em>.</div>
      </div>

      

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">support</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: opener, opening act</span>
        </div>
        <div class="entry-def">The artist or artists performing before the headliner. Typically a shorter set, less production support, and a smaller share of the night's resources — sometimes a flat fee, sometimes a buyout.</div>
      </div>

    </div>
  </div>
</div>

        <div class="entry-def">A detailed report of the status of all event tickets at a specific time — sold, available, comp, killed. A final ticket audit is required for settlement.</div>

          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: manifest</span>
        </div>
        <div class="entry-def">A detailed report of all event tickets, including location and price. The official ticket count document from the box office, broken out by ticket type (paid, comp, deadwood). The starting point for settlement math.</div>

    <div class="entry-list">

        <div class="entry-head">
          <span class="entry-term">variable expense</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A show cost that isn't fixed — calculated based on an inconstant factor like number of tickets sold or gross box office receipts. Per-head insurance and credit card fees are common variable expenses.</div>
      </div>

      

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">versus deal</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance agreement in which the artist receives either a guaranteed fee or a certain percentage of the box office receipts — whichever amount is greater. The artist takes the better side of the math.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">W</span>
      <span class="letter-pron">[ˈdə-bəl-yū]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">walkout</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The total amount of money the artist receives as payment for a performance — guarantee plus any overages or bonuses. The number that lands on the road report at the end of the night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">walkout potential</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The total amount of money the artist could receive as payment for a performance if every ticket sold and every bonus trigger hit. The ceiling on the deal.</div>
      </div>

    </div>

  <div class="body-area">
    <div class="module-tag">— MASTER BUDGET GUIDE / THE CONCEPT —</div>
    <div class="page-title">BEFORE YOU <span class="accent">ROLL.</span></div>
    <div class="page-sub">Costing the whole tour before you commit to it.</div>

    <p class="para">The Master Budget is a <strong>front-end financial planning tool</strong>. It&rsquo;s built at the very start of a tour &mdash; before deals are signed, before trucks are booked &mdash; as you gather quotes and pricing across every cost category. Where a road report tracks the money once the tour is rolling, the Master Budget answers the question that comes first: <em>does this tour make money, and at what margin?</em></p>

    <div class="sec-head">It Starts At The Projection. It Ends At The <span class="accent">Summary.</span></div>

    <p class="para">The build begins on the <strong>Projection</strong> page &mdash; show dates, cities, venues, capacity, tickets, guarantees, VIP, merch. From there you work through every cost the tour carries: crew, gear, transportation, hotels, and the rest. It all flows toward the <strong>Summary</strong> &mdash; the hub. By the time the numbers land there, they&rsquo;ve run through all their math, and the Summary lays them out cleanly, in percentages, top to bottom. It&rsquo;s the one view where you see the whole tour at once and can tell what&rsquo;s hitting too heavy and what&rsquo;s running light &mdash; and decide what to adjust. <strong>Start at the Projection; read the answer at the Summary.</strong></p>

    <div class="sec-head">Why It <span class="accent">Matters.</span></div>

    <p class="para">You don&rsquo;t roll a tour you haven&rsquo;t costed. The Master Budget is the <strong>go / no-go tool</strong> &mdash; it tells you, before anyone has committed, whether the numbers work. It&rsquo;s also how you pressure-test a tour: change a guarantee, add a show, cut a truck, and watch the net move. Built early and kept honest, it turns a tour from a hope into a plan.</p>

    <div class="ab-callout">
      <div class="abc-tag">— A LIVING ESTIMATE —</div>
      <div class="abc-title">IT STARTS AS QUOTES. IT TIGHTENS INTO TRUTH.</div>
      <div class="abc-text">Early on, the budget is estimates and projections. As real quotes and confirmed numbers come in, they replace the placeholders &mdash; and the picture sharpens. The Master Budget is <strong>most valuable when it&rsquo;s kept current</strong>, right up until the tour rolls.</div>
    </div>

  </div>
</div>

    <div class="page-title">INSIDE THE <span class="accent">BUDGET.</span></div>
    <div class="page-sub">Two anchor pages, and a cost page for every category.</div>

    <p class="para">The Master Budget is one Google Sheet. Two pages anchor it &mdash; the Projection, where the tour begins, and the Summary, where it all rolls up. Everything else is a cost page, one for each category the tour carries.</p>

    <div class="tab-list">
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">01</span><span class="tab-name">Projections</span></div>
        <div class="tab-body">Where the tour begins. Every day laid out &mdash; day type (travel, rehearsal, show, off), date, city, venue, capacity, tickets sold, guarantee, VIP lift, merch. This is the origin: the tour takes shape here, and the rest of the budget &mdash; crew, gear, transportation, hotels &mdash; gets built off of it.</div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">02</span><span class="tab-name">Summary</span></div>
        <div class="tab-body">The hub. Every cost category summed and stacked &mdash; income, operating expenses, start-up, contingency, commissions, and the final net, laid out cleanly in percentages. This is where you see the whole tour at once, spot what&rsquo;s hitting heavy and what&rsquo;s running light, and decide what to adjust. It&rsquo;s also the page you put in front of someone when they ask, <em>&ldquo;so, does this work?&rdquo;</em></div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">03</span><span class="tab-name">The Ten Cost Pages</span></div>
        <div class="tab-body">One detailed worksheet per category: <strong>Payroll, Per Diems, Airfares, Hotel, Buses &amp; Ground Transport, Production, Special Guests, Trucking &amp; Freight, Start-Up &amp; Misc Costs,</strong> and <strong>Insurance.</strong> As quotes come in, they land on these pages &mdash; and roll up into the Summary.</div>
      </div>
    </div>

    <div class="page-title">HOW IT <span class="accent">ADDS UP.</span></div>
    <div class="page-sub">From guarantees to net profit.</div>

    <p class="para">The Summary runs a clean waterfall &mdash; from what the tour earns, down through everything it costs, to what it actually keeps.</p>

    <div class="waterfall">
      <div class="wf-step">
        <div class="wf-op">&nbsp;</div>
        <div class="wf-label">Gross Income</div>
        <div class="wf-note">The guarantees, carried over from the Projection.</div>
      </div>
      <div class="wf-step">
        <div class="wf-op">&minus;</div>
        <div class="wf-label">Operating Expenses</div>
        <div class="wf-note">Every cost category &mdash; payroll, travel, production, and the rest.</div>
      </div>
      <div class="wf-step">
        <div class="wf-op">&minus;</div>
        <div class="wf-label">Start-Up + TD Fee</div>
        <div class="wf-note">Up-front costs to get the tour built, plus the tour director fee.</div>
      </div>
      <div class="wf-step">
        <div class="wf-op">+</div>
        <div class="wf-label">Contingency</div>
        <div class="wf-note">Typically ~5% of expenses &mdash; because something always comes up.</div>
      </div>
      <div class="wf-step">
        <div class="wf-op">&minus;</div>
        <div class="wf-label">Commissions</div>
        <div class="wf-note">Agent, manager, business manager, and lawyer percentages.</div>
      </div>
      <div class="wf-step">
        <div class="wf-op">&minus;</div>
        <div class="wf-label">Tax</div>
        <div class="wf-note">Any tax applied to the run.</div>
      </div>
      <div class="wf-step wf-total">
        <div class="wf-op">=</div>
        <div class="wf-label">Net Profit</div>
        <div class="wf-note">What the tour actually keeps. The number the whole document exists to find.</div>
      </div>
    </div>

    <div class="sec-head">The Cost Of A <span class="accent">Day.</span></div>

    <p class="para">The Summary also breaks the run down by time &mdash; what the tour costs <strong>per day</strong> on average, <strong>per week</strong>, and <strong>across the whole run.</strong> Those numbers are what make two different tours comparable, and what tell you fast whether a routing change helps or hurts.</p>

    <div class="emph-band">
      An master budget is an estimate, not a verdict. It starts as quotes and projections, and tightens as real numbers replace them. <strong>Keep it honest, keep it current</strong> &mdash; and it will tell you the truth about the tour before the tour tells you itself.
    </div>

  </div>

  @page { size: letter; margin: 0; }
  html, body { background: #1a1a1a; }
  body {
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 30px 0 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .format-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(244,241,234,0.35);
    text-align: center;
    padding: 0 0 14px;
  }
  .page-wrapper {
    width: var(--page-w);
    height: var(--page-h);
    background: var(--black);
    border: 0.5px solid rgba(244,241,234,0.15);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin-top: 32px;
  }
  .page-wrapper:first-of-type { margin-top: 0; }
  .page-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(27,58,92,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.18) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }
  .page-wrapper > * { position: relative; z-index: 1; }

  /* HEADER */
  .page-header {
    padding: 10px 36px;
    border-bottom: 2px solid var(--orange);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .tb-mark { display: inline-block; border: 1px solid rgba(244,241,234,0.55); color: var(--bone); flex-shrink: 0; }
  .tb-mark .hrow, .tb-mark .frow { display: flex; justify-content: space-between; padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 6px; letter-spacing: 1.5px; gap: 8px; }
  .tb-mark .hrow { border-bottom: 0.5px solid rgba(244,241,234,0.4); opacity: 0.7; }
  .tb-mark .frow { border-top: 0.5px solid rgba(244,241,234,0.4); opacity: 0.5; }
  .tb-mark .body { padding: 3px 8px 4px; }
  .tb-mark .top { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
  .tb-mark .bot { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 300; letter-spacing: 2px; line-height: 1; margin-top: 2px; }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); line-height: 1.6; }
  .doc-stamp { text-align: right; flex-shrink: 0; }
  .doc-stamp .doc-num { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-bottom: 2px; }
  .doc-stamp .doc-rev { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--orange); border-bottom: 1px solid var(--orange); padding-bottom: 1px; }
  .doc-stamp .pg-num { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-top: 2px; line-height: 1.4; }
  .doc-stamp .pg-num .pg-of { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-left: 2px; }

  /* COVER */
  .cover-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 60px; position: relative; }
  .cover-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--orange); margin-bottom: 18px; }
  .cover-main { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 92px; letter-spacing: 3px; line-height: 0.9; color: var(--bone); margin-bottom: 8px; }
  .cover-sub { font-family: 'Archivo', sans-serif; font-weight: 300; font-size: 22px; letter-spacing: 5px; color: var(--bone); margin-top: 14px; }
  .cover-rule { width: 80px; height: 2px; background: var(--orange); margin: 30px auto 24px; }
  .cover-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: rgba(244,241,234,0.55); line-height: 1.7; max-width: 520px; }
  .cover-corners .corner { position: absolute; width: 28px; height: 28px; border: 1.5px solid var(--orange); }
  .cover-corners .tl { top: 40px; left: 60px; border-right: 0; border-bottom: 0; }
  .cover-corners .tr { top: 40px; right: 60px; border-left: 0; border-bottom: 0; }
  .cover-corners .bl { bottom: 40px; left: 60px; border-right: 0; border-top: 0; }
  .cover-corners .br { bottom: 40px; right: 60px; border-left: 0; border-top: 0; }

  /* CONTENT PAGE — white paper */
  .page2 { background: #FFFFFF; color: var(--black); }
  .page2::before { display: none; }
  .page2 .page-header { background: var(--black); background-image: linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px); background-size: 22px 22px; border-bottom: 2px solid var(--orange); }
  .page2 .body-area { padding: 22px 36px 26px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page2 .module-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 3px; color: var(--orange); margin-bottom: 6px; }
  .page2 .page-title { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 40px; letter-spacing: 1px; line-height: 0.95; color: var(--black); margin-bottom: 8px; }
  .page2 .page-sub { font-family: 'Archivo', sans-serif; font-weight: 300; font-size: 16px; letter-spacing: 1px; line-height: 1.25; color: var(--black); margin-bottom: 12px; }
  .page2 .para { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400; line-height: 1.55; color: var(--black); margin-bottom: 8px; }
  .page2 .para strong { font-weight: 700; }
  .page2 .para em { font-style: italic; color: rgba(14,14,14,0.78); }

  /* SHOW HEADER BANNER */
  .show-banner {
    background: var(--black);
    color: var(--bone);
    padding: 18px 22px 20px;
    margin: 4px 0 16px;
    border-left: 4px solid var(--orange);
    position: relative;
  }
  .show-banner-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .show-banner-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1.18;
    color: var(--bone);
    margin-bottom: 14px;
  }
  .show-banner-title .sep {
    color: var(--orange);
    margin: 0 6px;
    font-weight: 400;
  }
  .show-banner-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px 28px;
    margin-top: 4px;
  }
  .sb-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    line-height: 1.45;
  }
  .sb-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--orange);
    flex-shrink: 0;
    min-width: 92px;
    text-transform: uppercase;
  }
  .sb-val { color: var(--bone); opacity: 0.94; }
  .sb-val .name { font-weight: 700; }
  .sb-val .phone { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.8; margin-left: 5px; }

  /* READ FIRST FRAME — bordered orange-corner frame, page-2-onward variant */
  .read-first-frame {
    border: 0.5px solid rgba(14,14,14,0.4);
    padding: 18px 22px 20px;
    background: rgba(14,14,14,0.025);
    margin: 4px 0 14px;
    position: relative;
  }
  .read-first-frame::before,
  .read-first-frame::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid var(--orange);
  }
  .read-first-frame::before {
    top: -1px;
    left: -1px;
    border-right: 0;
    border-bottom: 0;
  }
  .read-first-frame::after {
    bottom: -1px;
    right: -1px;
    border-left: 0;
    border-top: 0;
  }
  .read-first-frame .rff-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .read-first-frame .rff-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.5px;
    color: var(--black);
    margin-bottom: 10px;
    line-height: 1.1;
    text-transform: uppercase;
  }
  .read-first-frame p {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--black);
    margin: 0 0 7px 0;
  }
  .read-first-frame p:last-child { margin-bottom: 0; }
  .read-first-frame p strong { font-weight: 700; }
  .read-first-frame p em { font-style: italic; color: rgba(14,14,14,0.78); }

  /* OPENER LINE — page 2 highlighted opening sentence */
  .opener-line {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    line-height: 1.4;
    color: var(--black);
    padding: 9px 18px;
    background: rgba(212,100,30,0.08);
    border-left: 3px solid var(--orange);
    margin: 6px 0 0;
  }
  .opener-line strong {
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* INTRO LINE */
  .intro-line {
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-size: 12px;
    line-height: 1.55;
    color: rgba(14,14,14,0.85);
    margin: 4px 0 16px;
    padding: 10px 14px;
    border-left: 2px solid rgba(14,14,14,0.3);
    background: rgba(14,14,14,0.03);
  }

  /* SECTION (per-topic block) */
  .adv-section {
    margin-bottom: 14px;
    break-inside: avoid;
  }
  .adv-section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--orange);
    padding-bottom: 4px;
  }
  .adv-section-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--orange);
  }
  .adv-section-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--black);
  }
  .adv-list {
    list-style: none;
    padding: 0;
    margin: 6px 0 0;
  }
  .adv-list li {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    line-height: 1.55;
    color: var(--black);
    padding: 3px 0 3px 18px;
    position: relative;
  }
  .adv-list li::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--orange);
    font-weight: 700;
  }
  .adv-list li.ask {
    font-style: italic;
    color: rgba(14,14,14,0.78);
  }
  .adv-list li.ask::before {
    content: "?";
    font-style: normal;
    font-weight: 700;
    color: var(--blue);
  }
  .adv-list li strong { font-weight: 700; }
  .adv-list ul { margin: 4px 0 4px 8px; padding: 0; list-style: none; }
  .adv-list ul li { padding-left: 14px; font-size: 11.5px; opacity: 0.9; }
  .adv-list ul li::before { content: "·"; font-size: 16px; line-height: 0; top: 8px; }

  /* TWO-COL SECTION ROW for short sections side-by-side */
  .adv-two {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 10px;
  }

  /* PARTY GRID — Band & Crew breakdown, clean text with dots */
  .party-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px 10px;
    margin: 4px 0 4px 18px;
  }
  .party-cell {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    line-height: 1.55;
    color: var(--black);
    padding: 3px 0 3px 14px;
    position: relative;
  }
  .party-cell::before {
    content: "·";
    position: absolute;
    left: 2px;
    top: -1px;
    font-size: 18px;
    line-height: 1;
    color: var(--orange);
    font-weight: 700;
  }

  /* CALLOUT for direct quotes (Support Production) */
  .adv-quote {
    margin: 8px 0 8px 18px;
    padding: 10px 14px;
    background: rgba(14,14,14,0.04);
    border-left: 2px solid var(--blue);
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-size: 11.5px;
    line-height: 1.55;
    color: rgba(14,14,14,0.85);
  }

  /* DAY SHEET — Proposed Schedule */
  .schedule-stage {
    background: var(--black);
    padding: 22px 26px 24px;
    margin: 10px 0 14px;
    color: var(--bone);
    position: relative;
  }
  .schedule-stage::before {
    content: "PROPOSED SCHEDULE";
    position: absolute;
    top: -10px;
    left: 26px;
    background: var(--orange);
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    padding: 3px 10px;
  }
  .schedule-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--orange);
    margin-bottom: 6px;
    margin-top: 6px;
  }
  .schedule-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--bone);
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .schedule-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 28px;
  }
  .schedule-row {
    display: grid;
    grid-template-columns: 86px 1fr;
    padding: 7px 12px;
    border-bottom: 0.5px solid rgba(244,241,234,0.18);
    align-items: baseline;
  }
  .schedule-row.accent {
    background: rgba(212,100,30,0.10);
    border-bottom-color: rgba(212,100,30,0.35);
  }
  .schedule-row .s-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--bone);
    opacity: 0.88;
  }
  .schedule-row .s-event {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--bone);
    text-transform: uppercase;
  }
  .schedule-note {
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-size: 11px;
    color: rgba(244,241,234,0.7);
    margin-top: 10px;
    line-height: 1.4;
  }

  /* CONCLUSION block */
  .conclusion-block {
    margin: 14px 0 0;
    padding: 20px 24px;
    background: rgba(14,14,14,0.04);
    border-left: 4px solid var(--orange);
  }
  .conclusion-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .conclusion-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 12px;
    line-height: 1.05;
  }
  .conclusion-block .para {
    font-size: 12.5px;
    line-height: 1.6;
    margin-bottom: 9px;
  }
  .conclusion-block .para:last-child { margin-bottom: 0; }

  /* TITLE PAGE — distinct from module covers */
  .title-page { background: #FFFFFF; color: var(--black); }
  .title-page::before { display: none; }
  .title-page .page-header { background: var(--black); background-image: linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px); background-size: 22px 22px; border-bottom: 2px solid var(--orange); }
  .title-page .body-area {
    padding: 32px 40px 30px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .title-page .tp-hero-icon {
    width: 360px;
    height: 360px;
    margin: 48px auto 0;
    display: block;
  }
  .title-page .tp-hero-icon svg { width: 100%; height: 100%; display: block; }
  .title-page .tp-center-block {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    text-align: center;
    padding: 0 20px;
    margin-top: auto;
    margin-bottom: 4px;
    padding-top: 40px;
  }
  .title-page .tp-center-block .tp-main {
    text-align: center;
  }
  .title-page .tp-center-block .tp-sub {
    text-align: center;
  }
  .title-page .tp-center-block .tp-rule {
    margin: 14px auto 4px;
  }
  .title-page .tp-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .title-page .tp-eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .title-page .tp-eyebrow-line {
    flex: 1;
    height: 1px;
    background: var(--orange);
    opacity: 0.6;
  }
  .title-page .tp-eyebrow-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--orange);
  }
  .title-page .tp-main {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 92px;
    letter-spacing: 1px;
    line-height: 0.88;
    color: var(--black);
    margin-bottom: 4px;
  }
  .title-page .tp-main .accent {
    color: var(--orange);
  }
  .title-page .tp-sub {
    font-family: 'Archivo', sans-serif;
    font-weight: 300;
    font-size: 24px;
    letter-spacing: 2px;
    line-height: 1.1;
    color: var(--black);
    margin-top: 6px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .title-page .tp-rule {
    width: 96px;
    height: 3px;
    background: var(--black);
    margin: 6px 0 22px;
  }
  .title-page .tp-frame {
    border: 0.5px solid rgba(14,14,14,0.4);
    padding: 22px 26px 24px;
    background: rgba(14,14,14,0.025);
    margin-bottom: 18px;
    position: relative;
  }
  .title-page .tp-frame::before,
  .title-page .tp-frame::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid var(--orange);
  }
  .title-page .tp-frame::before {
    top: -1px;
    left: -1px;
    border-right: 0;
    border-bottom: 0;
  }
  .title-page .tp-frame::after {
    bottom: -1px;
    right: -1px;
    border-left: 0;
    border-top: 0;
  }
  .title-page .tp-frame-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--orange);
    margin-bottom: 10px;
  }
  .title-page .tp-frame-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--black);
    margin-bottom: 10px;
    line-height: 1.1;
    text-transform: uppercase;
  }
  .title-page .tp-frame .para {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--black);
    margin-bottom: 8px;
  }
  .title-page .tp-frame .para:last-child { margin-bottom: 0; }
  .title-page .tp-frame .para strong { font-weight: 700; }
  .title-page .tp-frame .para em { font-style: italic; color: rgba(14,14,14,0.78); }
  .title-page .tp-meta {
    margin-top: auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px 22px;
    padding-top: 18px;
    border-top: 1px solid rgba(14,14,14,0.18);
  }
  .title-page .tp-meta-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 1.8px;
    color: rgba(14,14,14,0.55);
    line-height: 1.5;
  }
  .title-page .tp-meta-cell .v {
    color: var(--black);
    font-weight: 700;
    display: block;
    margin-top: 2px;
  }

  /* PRINT */
  @media print {
    body { background: white; padding: 0; }
    .format-label { display: none; }
    .page-wrapper {
      box-shadow: none;
      border: none;
      width: 8.5in;
      height: 11in;
      margin-top: 0;
      page-break-after: always;
    }
  }

  .page2 .body-area { background: #FBF9F2; }

  <div class="body-area">
    <div class="module-tag" style="margin-bottom: 6px; margin-top: -10px;">— THE ADVANCE / GUIDE —</div>

    <div class="read-first-frame">
      <div class="rff-title">A sample / a framing / your starting point</div>
      <p>What follows is an <strong>advancing template</strong> — written the way you might actually send it to a venue. It opens with the show details and the &ldquo;on copy&rdquo; contact list, then walks section-by-section through everything the building needs to know and everything you need them to confirm.</p>
      <p>Treat it as <strong>a framing for your own advance</strong>, not a fill-in-the-blanks form. Lift the sections that fit your tour, rewrite the lines that don&apos;t, drop anything that doesn&apos;t apply. <em>The shape of the email is what matters</em> — the order, the flow, what to declare, what to ask.</p>
      <p>Your show will have different numbers and different needs. Use this as the bones.</p>
    </div>

    <div class="opener-line" style="margin-top: 22px;">
      <strong>Framing:</strong> Below you&apos;ll find an advancing template for a mid-sized tour that you might find in a club or theatre.
    </div>

    <div class="email-bar">
      <span class="eb-stamp">&mdash; EMAIL EXAMPLE &mdash;</span>
      <span class="eb-meta">SAMPLE ADVANCE &middot; FROM YOU, TO THE VENUE</span>
    </div>
    <div class="email-zone">

    <p style="margin-top: 16px; margin-bottom: 2px; font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--orange);">
      — Email Subject Line —
    </p>
    <p class="para" style="margin-top: 0; font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; color: var(--black);">
      ARTIST NAME &mdash; DATE &mdash; CITY, STATE &mdash; VENUE NAME
    </p>

    <p class="para" style="margin-top: 12px;"><strong>On copy is:</strong></p>
    <ul class="adv-list" style="margin-top: 4px; margin-bottom: 10px;">
      <li>TM &amp; PM &mdash; PHONE NUMBER</li>
      <li>FRONT OF HOUSE</li>
      <li>MONITORS</li>
      <li>LIGHTING DIRECTOR</li>
      <li>MERCH &amp; VIP</li>
    </ul>

    <p class="para" style="margin-top: 10px; margin-bottom: 14px;">We look forward to working with you on this upcoming show. Please let us know if there is anything we haven&apos;t covered or that needs to be discussed.</p>

    <!-- TRAVEL -->
    <div class="adv-section">
      <div class="adv-section-head">
        <div class="adv-section-tag">— 01 —</div>
        <div class="adv-section-title">Travel</div>
      </div>
      <ul class="adv-list">
        <li>Artist will be traveling in <strong>(2) 65&apos; buses</strong> and <strong>(2) semi trucks with 53&apos; trailers</strong>.</li>
        <li>Support is traveling in <strong>(1) 15-passenger van w/ trailer</strong>. <em>(Add support contact information here.)</em></li>
        <li class="ask">What is the earliest vehicles can arrive at the venue?</li>
        <li class="ask">What is the latest vehicles can stay parked at the venue?</li>
        <li class="ask">Do they need to move immediately after load-out?</li>
        <li class="ask">Please provide a parking map.</li>
        <li class="ask">Is shore power / water available?</li>
      </ul>
    </div>

    </div>

    <div class="st-title">The &lsquo;On Copy&rsquo; List</div>
    <div class="st-body">The &lsquo;on copy&rsquo; list isn&rsquo;t a formality &mdash; it&rsquo;s you deciding up front who owns which answer, so when the venue writes back about monitors, your monitor engineer is already in the thread. <em>(Module 04 covers who you advance with &mdash; this is that, made concrete.)</em></div>

        <div class="adv-section-tag">— 03 —</div>
        <div class="adv-section-title">Soundcheck</div>
      </div>
      <ul class="adv-list">
        <li>We require a <strong>closed sound check</strong>. Only personnel with working credentials are allowed within the venue.</li>
        <li>Please remind your house crew, bar staff, ticket takers, etc. that <strong>photography or any type of recording of the band while on stage is not allowed</strong>. The use of social media to discuss the band&apos;s pre-show routine is prohibited.</li>
      </ul>
    </div>

    <!-- AUDIO -->

      <div class="adv-section-head">
        <div class="adv-section-tag">— 04 —</div>
        <div class="adv-section-title">Audio</div>
      </div>
      <ul class="adv-list">
        <li>The tour will be carrying: <strong>FOH and MON consoles (SD9)</strong>, 100m (330&apos;) FOH snake, FOH/MON split, 8 wedges, sidefills, a wireless system containing IEMs and vocals, hard-wired microphones, microphone stands, XLR, and sub snakes.</li>
        <li>FOH footprint: <strong>40&quot; x 20&quot;</strong></li>
        <li>MON footprint: <strong>25&quot; x 20&quot;</strong></li>
        <li>Shared stage rack: <strong>31&quot; x 23&quot;</strong></li>
      </ul>
    </div>

    <!-- VIDEO -->
    <div class="adv-section">
      <div class="adv-section-head">
        <div class="adv-section-tag">— 05 —</div>
        <div class="adv-section-title">Video</div>
      </div>
      <ul class="adv-list">
        <li>The tour will be carrying a <strong>24&apos; x 12&apos; LED wall</strong> that is hanging on <strong>30&apos; of truss upstage</strong>. <strong>4 half-ton motors.</strong></li>
      </ul>
    </div>

    <!-- LIGHTING -->

        <div class="adv-section-tag">— 06 —</div>
        <div class="adv-section-title">Lighting</div>

        <li>Tour requires a minimum of <strong>2 × 400A 3-phase power services</strong>.</li>
        <li class="ask">Where is power located?</li>
        <li>Tour traveling with ground-supported fixtures, pipe &amp; base, radiance hazer, lighting distro, and <strong>grandMA3 Lite</strong>.</li>
        <li>Tour traveling with a <strong>Fly Package</strong>:
          <ul>
            <li>40&apos; upstage truss with movers</li>
            <li>40&apos; mid-stage truss with movers</li>
            <li>40&apos; downstage truss with front wash</li>
          </ul>
        </li>
        <li>Each truss is hanging on <strong>4 half-ton motors</strong>.</li>
      </ul>
    </div>

    <!-- RIGGING -->
    <div class="adv-section">
      <div class="adv-section-head">
        <div class="adv-section-tag">— 07 —</div>
        <div class="adv-section-title">Rigging</div>

        <li><strong>22 half-ton motor points.</strong></li>
        <li>Tour will be traveling with a rigger.</li>
        <li class="ask">Please send any drawings and rigging information with engineering notes.</li>
        <li class="ask">Please provide your lead rigger&apos;s contact information.</li>
      </ul>

  </div>

        <p style="font-size: 10px; opacity: 0.78; margin-bottom: 22px;">This document, together with the Hospitality Rider and the Performance Agreement to which it is attached, forms the complete agreement between the Artist and the Purchaser. In the event of a conflict, this Rider supersedes any prior agreements and may only be modified by written addendum signed by the Artist&rsquo;s representative.</p>

        <h1>About This Rider</h1>
        <p>This Technical &amp; Production Rider is the operating document for advancing and producing performances by <strong>The Blue Printers</strong>. It defines the equipment, personnel, schedule, and conditions required to deliver the show as designed. It is intended to be read in full by the venue&rsquo;s Production Manager and Technical Director, and used as the primary reference document during the advance and on the day of show.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          This is the opening framing of the rider. Working pros use this paragraph to set expectations and assert the document&rsquo;s authority. Keep it short &mdash; three or four sentences &mdash; but make clear that (a) the rider is binding, (b) it is to be read in full, and (c) the advance call is the venue&rsquo;s chance to flag anything they cannot meet.
        </div>

        <h2 style="margin-top: 24px;">How to use this document</h2>
        <ul>
          <li>Read every section before the advance call. Sections marked <strong>CRITICAL</strong> are non-negotiable without prior written approval from the Production Manager.</li>
          <li>Anything the venue cannot supply must be flagged in writing no later than <strong>fourteen (14) days prior to the show date</strong>.</li>
          <li>Hospitality requirements live in a separate <strong>Hospitality Rider</strong>, which forms part of the same agreement.</li>
          <li>Stage plot, input list, and patch list are appended at the end of this document and supersede any prior versions.</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          This is your house-rules section. State how the document should be used, what the deadlines are for flagging issues, and where to look for related documents. Keep this list short and operational &mdash; it sets the tone for the rest of the rider.
        </div>

        <h2 style="margin-top: 24px;">Conflicts and revisions</h2>
        <p>In the event of any conflict between this Rider and other documents forming part of this engagement, this Rider shall take precedence. The current revision number is shown on the cover page. Any revision marked with a date later than that of the contract automatically supersedes the version attached to the contract, and will be issued via email from the Production Manager.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Riders evolve as a tour matures. State explicitly that the most recent dated version is the operative one, and that revisions will come from a single named source (the PM). This protects you when a venue waves around a six-month-old version.
        </div>
      </div>

        <p>The Purchaser is obligated to advance this engagement in writing with the Production Manager <strong>no later than thirty (30) days prior to the show date</strong>. The advance shall confirm the items in this Rider, identify any deviations, and produce a <strong>finalized Show Day Schedule signed by both parties</strong>.</p>

        <div class="wgh">
          <strong>What goes here</strong>
          This sets the deadline and the expected output of the advance. Thirty days is the working pro standard for theater and up; for clubs it can be 14 days. Pick a number and hold to it. The &lsquo;finalized Show Day Schedule signed by both parties&rsquo; is the deliverable that proves the advance happened.
        </div>

        <h2 style="margin-top: 24px;">Required Documents from Purchaser</h2>
        <p>Purchaser shall provide the following to the Production Manager in advance of the show:</p>
        <ul>
          <li>Venue technical pack including stage dimensions, rigging plot, weight-loading certificate, and electrical service detail.</li>
          <li>Venue ground plan to scale (PDF and DWG/Vectorworks if available).</li>
          <li>Loading dock dimensions, access route, parking diagram for tour buses and trucks, and any restrictions on overnight parking or noise.</li>
          <li>Local labor call sheet with names, call times, and IATSE / union local where applicable.</li>
          <li>Building emergency procedures, nearest hospital and route, and house security plan.</li>
          <li>Curfew, sound limit (dB), and any local noise ordinance restrictions.</li>
          <li>Confirmed door times, set times, and changeover schedule for all acts on the bill.</li>
          <li>Box office report format and settlement procedure.</li>
        </ul>

        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          This is the venue&rsquo;s homework. If you don&rsquo;t ask for it explicitly, you won&rsquo;t get it. The technical pack and ground plan are essential &mdash; without them you cannot verify that your rig fits or that the rigging points hold. Sound limits and curfews matter at theater scale because many older buildings sit in residential areas.
        </div>
      </div>

    <div class="tmpl-note">
      <strong>— GUIDE NOTE —</strong>
      Lead with the minimum stage specs. This is the rider&rsquo;s first hard physical ask and it&rsquo;s where most show-fit problems get caught early.
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Stage &amp; Venue Requirements</h1>
        <p>The dimensions and conditions below describe the minimum stage required to perform the show as designed. Any venue unable to meet these specifications must flag the issue with the Production Manager during the advance. A scaled or modified version of the show may be possible with adequate notice.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Open with the minimum stage requirements and explicitly invite undersized venues to flag during the advance. Working pros build a &lsquo;B-rig&rsquo; or scaled version for venues that can&rsquo;t take the full show &mdash; telling the venue you have flexibility (with notice) keeps the conversation collaborative.
        </div>

        <h2 style="margin-top: 22px;">Minimum Stage Dimensions</h2>
        <table class="spec-table">
          <tbody>
            <tr><td>Stage width (proscenium / playing)</td><td>40 ft (12.2 m)</td></tr>
            <tr><td>Stage depth</td><td>30 ft (9.1 m)</td></tr>
            <tr><td>Stage height (deck to floor)</td><td>4 ft (1.2 m)</td></tr>
            <tr><td>Trim height (deck to lowest truss)</td><td>22 ft (6.7 m) minimum</td></tr>
            <tr><td>Wing space (each side)</td><td>8 ft (2.4 m) minimum</td></tr>
            <tr><td>Front-of-house mix position</td><td>Centered, 60&ndash;100 ft from stage, NOT under a balcony overhang</td></tr>
            <tr><td>Spot positions (followspots)</td><td>2 &times; house followspots with operators, calls per cue sheet</td></tr>
          </tbody>
        </table>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          These numbers are the rider&rsquo;s standing ask, not the show&rsquo;s hard floor. Include both imperial and metric units so European venues don&rsquo;t have to convert. The FOH note about balcony overhangs matters more than people realize &mdash; a covered FOH position destroys the mix engineer&rsquo;s ability to hear the room.
        </div>
      </div>

    <div class="module-tag" style="margin-bottom: 4px; margin-top: -4px;">— THE RIDER / RIGGING + POWER —</div>

    <div class="tmpl-note">
      <strong>— GUIDE NOTE —</strong>
      Rigging and power are the rider&rsquo;s two biggest physical dealbreakers. Pair them on a page so the venue&rsquo;s tech director reads both before responding.
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Rigging</h1>
        <p>Touring production includes flown lighting trusses and a flown audio system. The Purchaser shall provide a venue rigger with verified weight-loading certification, all motor pickup points pre-marked, and any house chain motors required as confirmed during the advance. Detailed rigging plot is appended.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Rigging is the section most likely to kill a show if mishandled. State explicitly that you bring (or contract) a Head Rigger; reference the appended plot; and require a venue rigger who can produce a weight-loading certificate. For older theaters this is often the first dealbreaker.
        </div>

        <h2 style="margin-top: 22px;">Rigging Summary (Indicative)</h2>
        <ul>
          <li>8 &times; 1-ton CM Lodestar motors for lighting truss (front, mid, back, downstage)</li>
          <li>4 &times; 1-ton CM Lodestar motors for audio mains and side hangs</li>
          <li>2 &times; 0.5-ton motors for upstage video wall hang</li>
          <li>Combined dead load (rig only): approximately 6,400 lbs / 2,900 kg</li>
          <li>Bridled points may be substituted with prior approval of Head Rigger</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          List motor counts and approximate dead load. A real rider would also include a per-point loading table; for a template, the summary plus &lsquo;see appended rigging plot&rsquo; is enough. Always include the bridle clause &mdash; it preserves flexibility for venues with awkward beam layouts.
        </div>

        <h2 style="margin-top: 22px;">Power Distribution</h2>
        <table class="spec-table">
          <tbody>
            <tr><td>Lighting service</td><td>200A / 3-phase / 5-wire Cam-Lok, 100 ft from upstage left</td></tr>
            <tr><td>Audio service</td><td>100A / 3-phase / 5-wire Cam-Lok, isolated from lighting, 50 ft from FOH</td></tr>
            <tr><td>Video service</td><td>60A / 3-phase / 5-wire Cam-Lok, upstage center</td></tr>
            <tr><td>Backline / stage power</td><td>Two (2) dedicated 20A 120V circuits at each band position, isolated from FOH/MON ground</td></tr>
            <tr><td>Bus shore power</td><td>30A 120V at parking position; 50A preferred for two buses</td></tr>
          </tbody>
        </table>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Power is where venues most often surprise you. State the service type, amperage, phase, distance from the connection point, and isolation requirements. The audio-isolated-from-lighting clause prevents ground loops &mdash; the most common cause of venue noise problems.
        </div>
      </div>

    <div class="rider-frame">

        <p>The Purchaser shall provide a complete, professional-grade audio system covering the entire audience area at a sustained level of <strong>105 dB(A) at FOH measured slow</strong>, with even coverage across the room. Acceptable manufacturers and approximate quantities are listed below; substitutions require prior written approval from the FOH Engineer.</p>

        <h2 style="margin-top: 20px;">PA System (Acceptable Models)</h2>
        <p>One (1) of the following line array systems, deployed left/right with appropriate sub configuration and front/out fills as required by venue geometry:</p>

        <p>One (1) of the following digital consoles, fully patched and operational at line check:</p>
        <ul>
          <li>DiGiCo Quantum 338 (preferred), Quantum 7, or SD12-96</li>
          <li>Avid VENUE | S6L-24D or S6L-32D with full Pro Tools integration if recording</li>

          <strong>What goes here</strong>
          Reference the input list as a separate appendix rather than duplicating it inline. Allow within-family microphone substitutions to give venues some flexibility. Insist on test-by-line-check &mdash; that&rsquo;s when failures get caught.

    <div class="tmpl-note">
      <strong>— GUIDE NOTE —</strong>
      Lighting splits into three: required fixtures, console &amp; control, and color/programming notes. The programming notes block is where you protect the handoff between LD and venue electrician.
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Lighting</h1>
        <p>The Lighting Designer&rsquo;s plot, rig, and programmed show file form the visual identity of the performance. The Purchaser shall provide a venue-supplied lighting rig as detailed below, or, where contracted, accept the touring rig and provide the rigging, electrical, and crew support to install it. The full lighting plot, channel hookup, and DMX patch are appended.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Lighting riders come in two flavors: &lsquo;venue supplies&rsquo; (rig rented locally) or &lsquo;touring rig&rsquo; (artist brings their own). State which you are. For theater-scale, a hybrid is common.
        </div>

        <h2 style="margin-top: 22px;">Required Fixtures</h2>
        <ul>
          <li>12 &times; moving wash (e.g., Robe MegaPointe, Martin MAC Aura PXL, Ayrton Domino)</li>
          <li>16 &times; moving spot/profile (e.g., Robe Esprite, Ayrton Khamsin, Martin MAC Encore Performance)</li>
          <li>32 &times; LED PAR or wash bar (e.g., Chauvet COLORado, ETC ColorSource PAR)</li>
          <li>8 &times; LED batten / pixel bar for backlight (e.g., Astera Titan Tube, ChromaQ Color Force II)</li>
          <li>4 &times; atmospheric haze units (MDG ATMe or equivalent water-based haze; oil-based not accepted)</li>
          <li>2 &times; house followspots, manned, with comms to Lighting Designer</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Substitute model names matter. List 2&ndash;3 acceptable models per fixture type so the venue&rsquo;s preferred rental house can quote without coming back to you. The atmospheric haze note is operationally critical &mdash; oil-based haze sets off smoke detectors and stains soft goods.
        </div>

        <h2 style="margin-top: 22px;">Console &amp; Control</h2>
        <ul>
          <li>MA Lighting grandMA3 full-size or grandMA3 light (preferred), running grandMA2 mode acceptable</li>
          <li>Console position: front of house, immediately adjacent to FOH audio, with clear sightline to stage</li>
          <li>DMX/sACN distribution as required by plot; minimum 8 universes available</li>
          <li>Followspot communications via Clear-Com or RTS, dedicated channel for LD/spot ops</li>
        </ul>

        <h2 style="margin-top: 18px;">Color &amp; Programming Notes</h2>
        <p>All programming is pre-loaded and run from the touring show file. The Lighting Designer will arrive with the file on USB and operate from FOH. Venue-supplied fixtures must be addressed and patched per the appended channel hookup before lighting designer arrival. Any deviations to the rig (substitutions, missing fixtures) must be flagged in writing to the LD <strong>no later than 48 hours prior to load-in</strong>.</p>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          This addresses the workflow handoff: who programs (the LD), who patches (venue&rsquo;s house electrician), and what happens when the rig differs from the plot. The 48-hour deviation note gives the LD time to repatch in advance.
        </div>

        <h1>Video</h1>
        <p>The video package supports the performance with playback content, IMAG (image magnification) coverage, and any specialty content as designed. The system is partially touring (playback + content) and partially venue-supplied (camera package, projection or LED wall). Specifics are listed below; full layout in the appended video drawing.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          State the split between touring and venue-supplied gear up front. Most theater-scale tours bring playback servers and content but rent the LED wall or screens locally &mdash; that decision drives most of this section&rsquo;s other requirements.
        </div>

        <h2 style="margin-top: 22px;">LED / Projection</h2>

          <li>Three (3) broadcast-quality cameras: one (1) FOH locked, one (1) downstage handheld, one (1) stage-side robotic or handheld</li>

        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Timecode is what synchronizes lighting cues, video content, and audio playback &mdash; get it wrong and the show loses its pulse. Specify the source (LTC), the routing (BNC or audio pairs), and which positions need the feed.

      Local crew is one of the venue&rsquo;s biggest cost lines. Be specific about minimums and the hierarchy &mdash; every local hand should be &lsquo;under direction of&rsquo; a touring department head.
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Crew &amp; Local Labor</h1>
        <p>The touring crew is supplemented by local labor for load-in, show, and load-out. The minimum local crew call is detailed below. Where the venue is a union house, all local labor will be hired through the appropriate IATSE local or equivalent jurisdiction. The Production Manager will confirm the call and any meal-period rules during the advance.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          State the minimums clearly, acknowledge union jurisdictions, and commit to confirming meal periods (which trigger penalty pay if missed). Avoid being prescriptive about exactly which IATSE local &mdash; that depends on the city.
        </div>

        <h2 style="margin-top: 22px;">Local Crew Call (Minimum)</h2>
        <table class="crew-table">
          <thead>
            <tr><th>Department</th><th>Role / Scope</th><th>Min</th></tr>
          </thead>
          <tbody>
            <tr><td>Stagehands</td><td>Load-in, show ops, load-out &mdash; under direction of Stage Manager</td><td>8</td></tr>
            <tr><td>Audio</td><td>PA build, monitor world setup, FOH patch &mdash; under direction of FOH Engineer</td><td>3</td></tr>
            <tr><td>Lighting</td><td>Truss build, fixture hang/patch, focus &mdash; under direction of LD</td><td>4</td></tr>
            <tr><td>Video</td><td>LED wall build, camera placement, processing &mdash; under direction of Video Director</td><td>3</td></tr>
            <tr><td>Riggers</td><td>All flown rig points; weight-loading certified, working under Head Rigger</td><td>2</td></tr>
            <tr><td>Followspot ops</td><td>House followspot operation; brief at sound check, called by LD</td><td>2</td></tr>
            <tr><td>Loaders</td><td>Truck pack/unpack &mdash; call begins one hour before crew call</td><td>4</td></tr>
            <tr><td>Runner</td><td>Errands as directed by Tour Manager; vehicle and local knowledge required</td><td>1</td></tr>
            <tr><td>Backstage security</td><td>Stage door, dressing room corridor, stage left/right wings</td><td>3</td></tr>
          </tbody>
        </table>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          The numbers above are typical for theater-scale (1,200&ndash;3,000 cap). Every local hand is &lsquo;under direction of&rsquo; a touring department head &mdash; that hierarchy preserves your authority over the work.
        </div>

        <h2 style="margin-top: 22px;">Meal Periods &amp; Overtime</h2>
        <p>All local crew shall be released for meal breaks per applicable union rules or, in non-union venues, no later than <strong>five and one-half (5.5) hours after call</strong>. Meal periods, if pushed by Purchaser request to accommodate the schedule, will incur meal penalties at the prevailing local rate, payable by Purchaser. Overtime call-outs and turnaround penalties are likewise the responsibility of Purchaser.</p>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Meal penalties and turnaround are the most expensive &lsquo;gotchas&rsquo; in stagehand labor. Stating clearly that they&rsquo;re the venue&rsquo;s cost (not the artist&rsquo;s) closes off arguments at settlement.

    <div class="tmpl-note">
      <strong>— GUIDE NOTE —</strong>
      Truck and bus counts drive parking math. Adjust for your scale. Don&rsquo;t forget shore power and water disposal &mdash; both are real bus quality-of-life issues that surface at 11 PM if not advanced.
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Parking, Trucks &amp; Tour Buses</h1>
        <p>The tour travels with <strong>two (2) 53-ft tractor trailers and two (2) tour buses</strong> (entertainer coaches). Parking arrangements must be confirmed in advance, including overnight parking with shore power for the buses where possible. Where overnight parking is unavailable, the Purchaser shall secure off-site overnight parking within five (5) miles of the venue.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Truck and bus counts drive parking math. Adjust for your scale &mdash; clubs may roll with one bus and a trailer, festivals with a sprinter van. The shore-power note is a real cost issue: buses idling overnight burn diesel and idle-emissions fines apply in some cities.
        </div>

        <h2 style="margin-top: 22px;">Requirements</h2>
        <ul>
          <li>Two (2) tractor-trailer parking positions at the loading dock during load-in/show/load-out</li>
          <li>Two (2) tour bus parking positions adjacent to the venue, level ground</li>
          <li>Shore power: 30A 120V minimum at each bus position; 50A 120V preferred</li>
          <li>Black water and gray water disposal available within 25 miles, with point of contact</li>
          <li>Truck route, height clearance, and any city-specific permits identified in advance</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Black/gray water is bus waste &mdash; buses need to dump tanks every couple of days. Truck height clearance matters in old urban venues with low loading-dock approaches; a route that doesn&rsquo;t fit a 13&prime;6&Prime; trailer is a same-day catastrophe.
        </div>
      </div>

    <div class="tmpl-note">
      <strong>— GUIDE NOTE —</strong>
      Two-block section: minimum security posture (the floors) + pass system &amp; credentials (the access tiers).
    </div>

    <div class="rider-frame">
      <div class="rdr">
        <h1>Security &amp; Safety</h1>
        <p>The Purchaser shall provide a security plan covering the venue interior, stage area, dressing rooms, backstage corridor, audience floor, and exterior loading dock. The plan and head security contact must be reviewed with the Tour Manager during the advance and confirmed at door time on show day.</p>
        <div class="wgh">
          <strong>What goes here</strong>
          Security is non-negotiable and mostly handled by the venue, but you set expectations. The advance review and the door-time confirmation are two checkpoints &mdash; both should appear in your day-of-show checklist.
        </div>

        <h2 style="margin-top: 22px;">Minimum Security Posture</h2>
        <ul>
          <li>Stage door / artist entrance staffed from crew arrival through final load-out</li>
          <li>Backstage corridor patrolled or staffed; pass-controlled access at all times</li>
          <li>Dressing room corridor: one (1) guard during showtime, two (2) during meet &amp; greet</li>
          <li>Stage barricade with appropriate guard count (one per 6 ft of barricade as baseline)</li>
          <li>Designated medical position with EMT on-site from doors through end of show</li>
          <li>Emergency action plan reviewed with Tour Manager prior to doors</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          These are the floors, not the ceilings. For artists with active fan engagement (meet &amp; greet lines, stage-door encounters), increase counts. The EMT-on-site clause is increasingly standard at theater scale and required at festival scale.
        </div>

        <h2 style="margin-top: 22px;">Pass System &amp; Credentials</h2>
        <p>Touring pass system is laminate-based with daily date-coded over-stickers. The Tour Manager will deliver venue-side credentials (laminates and stickers) to the venue&rsquo;s head security contact at venue arrival. Access tiers are: <strong>All-Access</strong> (touring senior staff), <strong>Stage / Backstage</strong> (crew), <strong>Working</strong> (local crew, vendors), and <strong>VIP</strong> (per artist guest list).</p>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          Credential systems prevent venue staff from gatekeeping touring crew (and vice versa). Date-coded stickers prevent yesterday&rsquo;s pass from working today &mdash; that&rsquo;s how riders prevent unauthorized backstage drift.
        </div>
      </div>

        <p>The Artist&rsquo;s touring entity carries general liability, workers&rsquo; compensation, and tour cancellation insurance per industry standard. The Artist&rsquo;s <strong>Certificate of Insurance (COI)</strong> will be provided naming the Purchaser and venue as additional insureds with required limits. The Purchaser shall provide its own COI and confirm any local jurisdiction requirements during the advance.</p>

        <ul>
          <li>No professional audio, video, or broadcast recording without prior written approval from Management</li>

        <h1>About This Rider</h1>
        <p>This Hospitality Rider is the operating document for the food, beverage, dressing room, runner, and meet-and-greet requirements for performances by <strong>The Blue Printers</strong>. It is intended to be read in full by the venue&rsquo;s hospitality lead and catering staff, and used as the primary reference document during the advance and on the day of show.</p>
        <div class="wgh">

        <ul>

          <li>Technical requirements live in a separate <strong>Technical Rider</strong>, which forms part of the same agreement.</li>
          <li>A final shop list and dietary update will be sent <strong>72 hours prior to show day</strong> from the Tour Manager. That list supersedes any prior version.</li>
        </ul>
        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>

        </div>

        <h2 style="margin-top: 24px;">Conflicts and revisions</h2>
        <p>In the event of any conflict between this Rider and other documents forming part of this engagement, this Rider shall take precedence. The current revision number is shown on the cover page. Any revision marked with a date later than that of the contract automatically supersedes the version attached to the contract, and will be issued via email from the Tour Manager.</p>

        <h1 style="margin-top: 26px;">Advance Window</h1>
        <p>The Purchaser is obligated to advance the hospitality requirements with the Tour Manager <strong>no later than twenty-one (21) days prior to the show date</strong>. The advance shall confirm crew counts, dietary restrictions, and catering format (in-house vs buyout).</p>

        <h2 style="margin-top: 18px;">Required From Purchaser</h2>
        <ul>
          <li>Confirmed venue hospitality lead contact and runner contact (with vehicle details)</li>
          <li>Catering vendor information and contact (if applicable)</li>
          <li>Confirmation of in-house catering vs buyout structure for each meal</li>
          <li>Local grocery, restaurant, and dispensary recommendations within 5 miles</li>
          <li>Backstage WiFi network and password</li>
          <li>Shower availability and timing window</li>
          <li>Washer / dryer availability or local fluff-and-fold contact</li>
        </ul>

        <div class="wgh" style="margin-top: 14px;">
          <strong>What goes here</strong>
          State the timeline and what gets locked at each window. Hospitality is unique &mdash; counts and dietary needs land earlier than the final shop list, which can update right up to 72 hours out. This is the venue&rsquo;s hospitality homework. The local grocery / restaurant / dispensary list saves the runner an hour on show day &mdash; ask for it before they ask why the runner is late with the meal buyouts.
        </div>

            <tr><td>Hold area</td><td>Lobby or designated VIP holding room, with light snacks and water</td></tr>
            <tr><td>M&amp;G room</td><td>Backstage room or designated photo area, climate-controlled</td></tr>
            <tr><td>Timing</td><td>Begins 60 minutes prior to doors, lasts approximately 45 minutes</td></tr>
            <tr><td>Photo position</td><td>Branded backdrop or step-and-repeat, tour photographer + runner moving people through</td></tr>
            <tr><td>Staff</td><td>One (1) VIP host, one (1) runner, one (1) security, tour photographer</td></tr>
          </tbody>
        </table>

        <h2 style="margin-top: 16px;">Hospitality at the M&amp;G</h2>
        <ul>
          <li>Bottled water staged at the hold area and at the photo position</li>
          <li>Light snacks (nuts, pretzels, fruit) at the hold area</li>

          <li>Twelve (12) bottles Fiji water per cooler</li>
          <li>Twelve (12) black stage towels with each cooler</li>
