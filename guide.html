  .topbar-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BB — The Blueprint (Preface)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black:  #0E0E0E;
    --black2: #141414;
    --blue:   #1B3A5C;
    --blue-d: #122947;
    --blue-l: #9FC5E7;
    --bone:   #F4F1EA;
    --orange: #D4641E;
    --page-w: 816px;
    --page-h: 1056px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { size: letter; margin: 0; }
  html, body { background: #1a1a1a; }
  body {
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 30px 0 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .format-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(244,241,234,0.35);
    text-align: center;
    padding: 0 0 14px;
  }
  .page-wrapper {
    width: var(--page-w);
    height: var(--page-h);
    background: var(--black);
    border: 0.5px solid rgba(244,241,234,0.15);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin-top: 32px;
  }
  .page-wrapper:first-of-type { margin-top: 0; }

  /* HEADER */
  .page-header {
    padding: 10px 36px;
    border-bottom: 2px solid var(--orange);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .tb-mark { display: inline-block; border: 1px solid rgba(244,241,234,0.55); color: var(--bone); flex-shrink: 0; }
  .tb-mark .hrow, .tb-mark .frow { display: flex; justify-content: space-between; padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 6px; letter-spacing: 1.5px; gap: 8px; }
  .tb-mark .hrow { border-bottom: 0.5px solid rgba(244,241,234,0.4); opacity: 0.7; }
  .tb-mark .frow { border-top: 0.5px solid rgba(244,241,234,0.4); opacity: 0.5; }
  .tb-mark .body { padding: 3px 8px 4px; }
  .tb-mark .top { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
  .tb-mark .bot { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 300; letter-spacing: 2px; line-height: 1; margin-top: 2px; }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); line-height: 1.6; }
  .doc-stamp { text-align: right; flex-shrink: 0; }
  .doc-stamp .doc-num { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-bottom: 2px; }
  .doc-stamp .doc-rev { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--orange); border-bottom: 1px solid var(--orange); padding-bottom: 1px; }
  .doc-stamp .pg-num { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-top: 2px; line-height: 1.4; }
  .doc-stamp .pg-num .pg-of { margin-left: 2px; }

  /* ============================================ */
  /* PAGE 1 — COVER (BLUEPRINT SCHEMATIC STYLE)   */
  /* ============================================ */
  .cover-page {
    background: var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.18) 1px, transparent 1px);
    background-size: 22px 22px;
  }
  .cover-page .page-header {
    background: var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px);
    background-size: 22px 22px;
    border-bottom: 2px solid var(--orange);
  }
  .cover-canvas {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cover-eyebrow {
    padding: 26px 50px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--orange);
    position: relative;
    z-index: 2;
  }
  .cover-eyebrow-rule {
    flex: 1;
    height: 1px;
    background: var(--orange);
    opacity: 0.5;
    margin: 0 14px;
  }

  .cover-hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    padding: 22px 0 22px;
  }
  .cover-square {
    position: relative;
    width: 480px;
    height: 480px;
    background: var(--blue);
    background-image:
      linear-gradient(rgba(159,197,231,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(159,197,231,0.18) 1px, transparent 1px),
      linear-gradient(rgba(159,197,231,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(159,197,231,0.08) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
    border: 2px solid rgba(244,241,234,0.6);
    box-shadow:
      0 0 0 1px rgba(244,241,234,0.18),
      0 6px 24px rgba(0,0,0,0.45);
    overflow: hidden;
  }

  .cover-titleblock {
    position: absolute;
    bottom: 22px;
    right: 22px;
    width: 168px;
    border: 1px solid rgba(244,241,234,0.45);
    background: rgba(27,58,92,0.55);
    padding: 0;
    z-index: 5;
    opacity: 0.78;
    font-family: 'JetBrains Mono', monospace;
  }
  .cover-titleblock .tbk-row {
    display: flex;
    border-bottom: 1px solid rgba(244,241,234,0.35);
    font-size: 7.5px;
    letter-spacing: 1.5px;
    line-height: 1.3;
  }
  .cover-titleblock .tbk-row:last-child { border-bottom: 0; }
  .cover-titleblock .tbk-key {
    padding: 4px 6px;
    color: rgba(244,241,234,0.55);
    border-right: 1px solid rgba(244,241,234,0.35);
    flex: 0 0 38%;
    text-transform: uppercase;
    font-weight: 700;
  }
  .cover-titleblock .tbk-val {
    padding: 4px 6px;
    color: rgba(244,241,234,0.92);
    flex: 1;
    font-weight: 700;
    text-transform: uppercase;
  }
  .cover-titleblock .tbk-head {
    padding: 5px 6px 4px;
    color: var(--orange);
    border-bottom: 1px solid rgba(244,241,234,0.35);
    font-size: 8px;
    letter-spacing: 2px;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
  }
  .cover-square::before,
  .cover-square::after {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--orange);
    opacity: 0.6;
  }
  .cover-square::before {
    top: 8px; left: 8px;
    border-right: 0;
    border-bottom: 0;
  }
  .cover-square::after {
    bottom: 8px; right: 8px;
    border-left: 0;
    border-top: 0;
  }

  .cover-map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
  .cover-map svg { width: 100%; height: 100%; display: block; }

  .cover-compass {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }
  .cover-compass svg {
    width: 320px;
    height: auto;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4));
  }

  .cover-gear {
    position: absolute;
    width: 100px;
    height: 100px;
    z-index: 4;
    opacity: 0.92;
  }
  .cover-gear-tr {
    top: 22px;
    right: 22px;
    width: 110px;
    height: 110px;
  }
  .cover-gear-bl {
    bottom: 26px;
    left: 26px;
    width: 78px;
    height: 78px;
    opacity: 0.85;
  }
  .cover-gear svg { width: 100%; height: 100%; }

  .cover-crosshair {
    position: absolute;
    width: 24px;
    height: 24px;
    z-index: 2;
  }
  .cover-crosshair::before,
  .cover-crosshair::after {
    content: "";
    position: absolute;
    background: var(--orange);
    opacity: 0.55;
  }
  .cover-crosshair::before { width: 100%; height: 1px; top: 50%; }
  .cover-crosshair::after { width: 1px; height: 100%; left: 50%; }
  .cover-ch-tl { top: 18px; left: 18px; }
  .cover-ch-tr { top: 18px; right: 18px; }
  .cover-ch-bl { bottom: 18px; left: 18px; }
  .cover-ch-br { bottom: 18px; right: 18px; }

  .cover-title-block {
    padding: 0 50px 36px;
    position: relative;
    z-index: 2;
  }
  .cover-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .cover-main {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 86px;
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--bone);
    margin-bottom: 10px;
  }
  .cover-main .accent { color: var(--orange); }
  .cover-sub {
    font-family: 'Archivo', sans-serif;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 4px;
    color: rgba(244,241,234,0.75);
    text-transform: uppercase;
    margin-top: 10px;
  }
  .cover-rule {
    width: 80px;
    height: 2px;
    background: var(--orange);
    margin-top: 22px;
  }
  .cover-meta {
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    color: rgba(244,241,234,0.6);
    line-height: 1.7;
  }

  /* ============================================ */
  /* CONTENT PAGES                                 */
  /* ============================================ */
  .page2 { background: #FFFFFF; color: var(--black); }
  .page2 .page-header { background: var(--black); background-image: linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px); background-size: 22px 22px; border-bottom: 2px solid var(--orange); }
  .page2 .body-area { padding: 18px 40px 20px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page2 .module-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--orange);
    margin-bottom: 5px;
  }
  .page2 .page-title {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 1px;
    line-height: 0.95;
    color: var(--black);
    margin-bottom: 3px;
  }
  .page2 .page-sub {
    font-family: 'Archivo', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    letter-spacing: 1px;
    color: var(--black);
    margin-bottom: 10px;
  }
  .page2 .para {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--black);
    margin-bottom: 6px;
  }
  .page2 .para strong { font-weight: 700; }
  .page2 .para em { font-style: italic; color: rgba(14,14,14,0.78); }

  /* SECTION HEADERS in body */
  .sec-head {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 12.5px;
    letter-spacing: 1.5px;
    color: var(--black);
    text-transform: uppercase;
    margin: 10px 0 5px;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--orange);
  }

  /* LICENSE block (orange-edge callout, matches CTA pattern from DOC-100) */
  .lic-block {
    border-left: 3px solid var(--orange);
    padding: 8px 12px;
    margin: 8px 0 10px;
    background: rgba(212,100,30,0.05);
  }
  .lic-block .lic-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--orange);
    margin-bottom: 3px;
  }
  .lic-block .lic-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: var(--black);
    font-style: italic;
  }

  /* TEMPLATE GRID — phase-grouped, 2-column, scannable */
  .tpl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 22px;
    row-gap: 4px;
    margin: 4px 0 6px;
  }
  .tpl-phase {
    grid-column: 1 / -1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    text-transform: uppercase;
    margin: 6px 0 2px;
    padding-bottom: 2px;
    border-bottom: 0.5px dashed rgba(212,100,30,0.45);
  }
  .tpl-row {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: var(--black);
    padding: 2px 0 2px 11px;
    position: relative;
  }
  .tpl-row::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--orange);
    font-weight: 700;
  }
  .tpl-row .tpl-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 10.5px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    color: var(--black);
  }
  .tpl-row .tpl-desc {
    color: rgba(14,14,14,0.78);
  }
  .tpl-row .tpl-tag {

    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--orange);
    text-transform: uppercase;
    margin-left: 4px;
  }

  /* TWO-DICTIONARY block — compact two-row layout */
  .dict-row {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: var(--black);
    padding: 2px 0 2px 11px;
    position: relative;
    margin-bottom: 2px;
  }
  .dict-row::before {
    content: "—";
    position: absolute;
    left: 0;
    color: var(--orange);
    font-weight: 700;
  }
  .dict-row .dict-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  /* Closing line */
  .closing-line {
    margin-top: auto;
    padding-top: 12px;
    text-align: center;
    font-family: 'Archivo', sans-serif;
    font-weight: 300;
    font-size: 13px;

    <div class="page-title">WHAT YOU HAVE.</div>
    <div class="page-sub">The kit, how it works, and where help lives.</div>

    <p class="para">The Blueprint is <strong>14 working documents and 9 paired guides</strong> &mdash; the same files we run on real shows. Not theoretical, not sales-page versions of the work, not stripped-down samples. Owning the Blueprint means owning all of it. There&rsquo;s no tiered edition. There&rsquo;s nothing held back for a future product. What you have on day one is the whole kit.</p>

    <div class="sec-head">How to use it</div>

    <p class="para">Each template opens via a Google Drive &ldquo;Make a copy&rdquo; link. You land in your own Drive with your own copy, immediately. They&rsquo;re yours forever &mdash; no expiration, no subscription, no DRM. Most templates ship with a paired guide that walks through how to fill it out, so you&rsquo;re not guessing at intent. The two dictionaries cover vocabulary that comes up while you&rsquo;re in the work.</p>

<!-- BODY — A                                       -->
<!-- ============================================ -->
<div class="page-wrapper body-page">

  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">
        <div class="hrow"><span>DOC-300</span><span>EST. 2026</span></div>
        <div class="body"><div class="top">BACKSTAGE</div><div class="bot">BLUEPRINT</div></div>

      </div>

        EDITION 01
      </div>
    </div>
    <div class="doc-stamp">
      <div class="doc-num">DOC-300 / REV.01</div>
      <div class="pg-num">A — ENTRIES</div>
    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">A</span>
      <span class="letter-pron">[ā]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">after show food</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Food and beverages provided for the artist and touring staff after the performance. Distinct from catering, which covers the show day; after show food is the post-show meal — usually requested in the rider and waiting in the dressing room or on the bus.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">A1</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— see also: front of house engineer</span>
        </div>
        <div class="entry-def">The lead audio engineer responsible for the front-of-house mix the audience hears. The person sitting at the console in the middle of the room, balancing the show every night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">A2</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The audio assistant working stage-side — patching gear, troubleshooting mics, and supporting the A1 and the monitor engineer through the show.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">advance</span>
          <span class="entry-pron">[ad-ˈvans]</span>
          <span class="entry-pos">verb · noun</span>
        </div>
        <div class="entry-def"><span class="num">1.</span>To contact a venue weeks before a show to reconcile what the rider asks for, what the venue can provide, and what the show actually needs. <span class="num">2.</span>The document that comes out of that process — the per-city production packet.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>"Send me the advance" almost always means the document, not a description of the work.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">all-access</span>
          <span class="entry-pos">adjective · noun</span>
        </div>
        <div class="entry-def">A credential that grants the holder access to every area of the venue — backstage, FOH, dressing rooms, stage. The top tier of laminate.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>All-access doesn't mean unsupervised. Security still controls the doors; the laminate just means you're allowed through them.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">amphitheater</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An outdoor venue with a fixed stage and seated/lawn capacity, typically 5,000 to 25,000. The summer scale of touring.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">apron</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The portion of the stage that extends past the proscenium toward the audience. Sometimes called the thrust.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">artist</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The performer or act the tour exists for. In production conversation, often used as a singular noun even when the act is a band ("the artist will be in at 4pm").</div>
      </div>

    </div>
  </div>
</div>

<!-- BODY — B                                       -->
<!-- ============================================ -->
<div class="page-wrapper body-page">

  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">
        <div class="hrow"><span>DOC-300</span><span>EST. 2026</span></div>

      </div>

        EDITION 01
      </div>
    </div>

      <div class="doc-num">DOC-300 / REV.01</div>
      <div class="pg-num">B — ENTRIES</div>
    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">B</span>
      <span class="letter-pron">[bē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">backline</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The instruments and amplifiers used by the artist on stage — drums, guitars, basses, keyboards, amps, pedalboards. Distinct from PA, lighting, and venue gear.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">band card</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A credit card issued in the tour manager's name and funded by the artist's business management. Used for tour expenses on the road.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>Always clarify what the band card is and isn't for at the start of the tour. Rules vary tour to tour.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">barricade</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The metal fencing line between the audience and the stage. Sometimes shortened to "barri" or "the barri."</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">BOH</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— back of house</span>
        </div>
        <div class="entry-def">Anything behind the stage or out of audience view — dressing rooms, production office, hallways, the loading dock. The crew's side of the building.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">box office</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The venue's ticket sales operation, and the office that holds the ticket count, will-call list, and guest list on show day. The room where settlement starts.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">bus call</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The hour at which the tour bus is leaving the venue — the last call of the night for everyone who wants to be on it.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>Bus call is not negotiable. The bus rolls when it rolls. If you're not on it, you're finding your own way to the next city.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">bus stock</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Items purchased specifically for the artist's bus(es) — ice, food and beverages, paper products, towels, basic supplies. Stocked before departure and topped up on the road as needed.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">buyout</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A cash or per-person amount paid in lieu of providing catering or hospitality on a given day. Common when a venue can't deliver meals or when the schedule pushes the crew off-site.</div>
      </div>

    </div>
  </div>
</div>

<!-- BODY — C                                       -->
<!-- ============================================ -->
<div class="page-wrapper body-page">

  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">
        <div class="hrow"><span>DOC-300</span><span>EST. 2026</span></div>

      <div class="pg-num">C — ENTRIES</div>
    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">C</span>
      <span class="letter-pron">[sē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">carnet</span>
          <span class="entry-pron">[kär-ˈnā]</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An international customs document that lets a tour move gear across borders without paying import duties. Required for most international touring.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>Pronounced car-NAY, not CAR-net. Mispronouncing it is a fast tell that someone hasn't done an international run.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">catering</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The meals provided to crew and band on show day — typically lunch and dinner. Either provided in-house by the venue or brought in by an outside catering vendor.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">changeover</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The window between two acts on a multi-act show — opener to headliner, or set to set on a festival stage. Includes striking the previous setup and getting the next one ready.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">COI</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— certificate of insurance</span>
        </div>
        <div class="entry-def">A document showing the production carries valid liability insurance, with the venue or promoter named as an additional insured. Most venues won't release the contract or allow load-in without one.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">comp</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A complimentary ticket. Tracked separately from paid tickets on the manifest and rarely counted toward gross.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">console</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The audio mixing board — at FOH (audience-facing mix) or stage-side at monitor world (performer-facing mix). Brands and models vary; the term is universal.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">credentials</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The laminates, wristbands, and stickers that grant access to specific areas of a venue or festival. Tiered by role and access level.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">curfew</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The hard time the show must end — set by the venue, the city, or local noise ordinance. Going past it usually means a fine, sometimes per minute.</div>
      </div>

    </div>
  </div>
</div>

<!-- BODY — D                                       -->
<!-- ============================================ -->
<div class="page-wrapper body-page">

  <div class="page-header">

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">D</span>
      <span class="letter-pron">[dē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">day sheet</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The single one-page schedule given to every person on the tour each day. Includes load-in, sound check, doors, set times, lobby call, bus call, hotel info, and emergency contacts.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>If the day sheet is wrong, the day is wrong. Treat it as the most important document on the road.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">deal memo</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A written summary of an agreement — signed at settlement when the show pays out as something other than the full guarantee, or when terms have been adjusted day-of.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">deductions</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Approved expenses subtracted from the gross at settlement before the artist is paid. Common ones: venue rent, production costs, taxes, credit card fees, performance rights (ASCAP/BMI).</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">deposit</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The advance payment from the promoter, typically 50% of the guarantee, paid before the show. Subtracted from what's owed at settlement.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">doors</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The time the venue opens to the audience. The hard pivot from production day into show night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">downstage</span>
          <span class="entry-pos">adjective · adverb</span>
        </div>
        <div class="entry-def">Toward the audience side of the stage. The opposite of upstage. A holdover from theater, where stages used to physically slope downward toward the audience.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">dressing room</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The private space where artist and crew prepare before the show. Also where hospitality lives — drinks, food, towels, whatever the rider asks for.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">drop count</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A count of unsold tickets returned to inventory at the end of advance ticket sales — used at settlement to reconcile final paid attendance.</div>
      </div>

    </div>
  </div>
</div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">E</span>
      <span class="letter-pron">[ē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">electronic ticket</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An event ticket issued to an attendee electronically, via email or PDF download. Each ticket carries a unique barcode that's scanned at the door — once scanned, duplicate copies are blocked from gaining access.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">encore</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The set the artist plays after walking off stage and being called back by the audience. Usually planned, occasionally extended, sometimes skipped if curfew is tight.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">ENG</span>
          <span class="entry-pos">noun · abbreviation</span>
        </div>
        <div class="entry-def">Short for "engineer" — most often the audio engineer on a given role. Used in scheduling shorthand: <em>"FOH ENG arrives at 11."</em></div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">F</span>
      <span class="letter-pron">[ef]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">festival advance</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The advance process for a festival date, run through the festival's stage manager rather than a venue contact. A different document set and a different rhythm than a headline date.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">fly date</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A one-off show where the band flies in instead of arriving by tour bus. Backline gets rented in market, local crew is called, and the operation reshapes around airports instead of highways.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">FOH</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— front of house</span>
        </div>
        <div class="entry-def"><span class="num">1.</span>The position where the audio engineer mixes the show — typically at the back-center of the audience floor. <span class="num">2.</span>The audience-facing side of the venue in general.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">four-wall</span>
          <span class="entry-pos">adjective · noun</span>
        </div>
        <div class="entry-def">A venue rental arrangement where the artist or promoter rents the empty room ("four walls") and brings in everything else — gear, crew, security, even box office staff.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">freight</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The trucking — gear in transit between cities. Either dedicated to one tour or shared/relayed across multiple acts on a route.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">front fill</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Small speaker arrays placed at the front edge of the stage to cover the audience members standing right at the barricade — the seats the main PA shoots over.</div>
      </div>

    </div>
  </div>
</div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">G</span>
      <span class="letter-pron">[jē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">gel</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A colored film placed in front of a lighting fixture to tint the beam. Largely replaced by LED color mixing, but the term still gets used.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">get-in</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The earliest the production can access the venue on show day — usually load-in time. The official start of the day from the building's perspective.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">ghost light</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A single bare bulb left lit on stage when the venue is dark. Practical purpose: nobody trips. Theatrical purpose: a tradition older than touring.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">green room</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The shared backstage hospitality room — for crew, support acts, guests, and anyone with the credentials to get in. Distinct from the artist's private dressing room.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">grid</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The overhead structure above the stage — usually steel beams or trusses — used for hanging lights, video, audio, and rigging.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">guarantee</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The flat fee the artist gets paid for the show, regardless of ticket sales. The minimum — additional money may come from splits, bonuses, or merch.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">H</span>
      <span class="letter-pron">[āch]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">hands</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Local laborers hired by the venue or promoter to help load gear in and out, push cases, and assist the touring crew. Always count your hands; you'll move faster.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">headliner</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The act with top billing on the show — performs last, gets the longest set, and drives the ticket sale. The reason the room is full.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">hospitality</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Everything food- and drink-related provided to the artist and crew — catering, dressing room riders, green room snacks, buyouts. The non-technical side of the rider.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">house left / house right</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Directional language from the audience's perspective. Opposite of stage left and stage right (which are from the performer's perspective). Always confirm which framing someone's using before you point at something.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">house lights</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The lights that illuminate the audience seating area — separate from stage lighting. Usually controlled by the venue's lighting tech, brought down at showtime.</div>
      </div>

    </div>
  </div>
</div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">I</span>
      <span class="letter-pron">[ī]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">IATSE</span>
          <span class="entry-pron">[ī-ˈat-sē]</span>
          <span class="entry-pos">noun · abbreviation</span>
        </div>
        <div class="entry-def">The International Alliance of Theatrical Stage Employees — the primary stagehand union in the U.S. and Canada. Many major venues are IATSE houses, with specific call rules and labor minimums.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>Pronounced eye-AT-see. Treat the local steward as a partner, not an obstacle — they know the room better than you do.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">IEMs</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— in-ear monitors</span>
        </div>
        <div class="entry-def">Wireless earpieces worn by performers on stage so they can hear their own monitor mix — replacing or supplementing wedges. Usually run from the monitor console.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">input list</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The document listing every audio source going into the console, with channel assignments. The audio version of a stage plot — given to FOH and monitor world before sound check.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">J</span>
      <span class="letter-pron">[jā]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">jurisdiction</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The geographic territory covered by a specific union local. Different cities mean different IATSE locals, different rules, different rates.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">K</span>
      <span class="letter-pron">[kā]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">kick</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Short for kick drum — the bass drum in a drum kit, mic'd close. The low-end pulse of most live mixes.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">kills</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Seats that can't be sold for a specific reason — production gear in the way, staging configuration, obstructed sight lines. Pulled from the manifest before tickets go on sale.</div>
      </div>

    </div>
  </div>
</div>

    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">L</span>
      <span class="letter-pron">[el]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">labor call</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The number of local crew booked for the day, with their arrival time. <em>"4-hour call of 8 hands at 9am."</em> Set during the advance.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">laminate</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A plastic-coated credential worn around the neck — typically the all-access tier for crew and management on a tour. Distinguished from wristbands and stickers, which mark lower access tiers.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">LD</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— lighting designer</span>
        </div>
        <div class="entry-def">The person who designs the lighting for the show and runs cues from the lighting console. On smaller tours, the LD often programs the show ahead of time and operates it nightly.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">line array</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A vertically-stacked column of speaker boxes, hung from the rigging on either side of the stage. The standard PA configuration in modern touring — focuses sound across long distances.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">line check</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The pre–sound check verification that every input on the input list is plugged in and arriving at the console. Done by the audio crew, no band on stage.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>If line check is rushed, sound check exposes the problems. Pay the time on the front end.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">load in</span>
          <span class="entry-pos">verb · noun</span>
        </div>
        <div class="entry-def">The process of moving the show's gear from truck into venue and getting it set up. Also the time block in which that happens. <em>"Load-in is at 10."</em></div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">load out</span>
          <span class="entry-pos">verb · noun</span>
        </div>
        <div class="entry-def">The reverse of load in — striking the show after the encore and packing it back into the truck. Usually faster than load-in, almost always at night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">lobby call</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The time the band and crew meet in the hotel lobby with bags, ready to leave for the venue or the next city.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">local ground</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A passenger vehicle with a driver, booked locally to move the artist and their staff between venue, hotel, and airport. Common on fly dates and on city days where the tour bus stays parked.</div>
      </div>

    </div>
  </div>
</div>

      <span class="letter-pron">[em]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">M&amp;G</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— meet &amp; greet</span>
        </div>
        <div class="entry-def">A scheduled session where ticketed VIPs or fans meet the artist briefly — usually backstage or in a designated room, often with a photo, sometimes signed merch. Heavily managed for time.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">manifest</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The official ticket count document from the box office, broken out by ticket type (paid, comp, deadwood). The starting point for settlement math.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">master tour</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An industry-standard tour management software platform used by most major tours to centralize routing, advances, day sheets, contacts, and finances.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">merch</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Short for merchandise — t-shirts, hats, vinyl, tour-specific items sold at the show. A meaningful revenue stream and a separate accounting line at settlement.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">monitor engineer</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The audio engineer who mixes what the performers hear on stage — through wedges or in-ears — separately from what the audience hears. Sits at monitor world.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">monitor world</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The stage-side audio position where the monitor engineer works — usually offstage right or left, with their own console.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">multi</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Short for multi-channel cable — the heavy thick "snake" running from stage inputs to the audio console. Carries every mic'd instrument and vocal.</div>
      </div>

    </div>
  </div>
</div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">net</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The settlement number after all approved deductions are pulled from gross. What the artist actually walks away with.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">O</span>
      <span class="letter-pron">[ō]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">offstage</span>
          <span class="entry-pos">adverb · adjective</span>
        </div>
        <div class="entry-def">Out of audience view — in the wings, the dressing room, or anywhere not on the visible stage.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">on call</span>
          <span class="entry-pos">adjective</span>
        </div>
        <div class="entry-def">Available to work when needed, but not actively engaged. Common for runners, drivers, and overflow crew during the show window.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">opener</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The act performing before the headliner. Typically a shorter set, less production support, a smaller share of the night's resources.</div>
      </div>

    </div>
  </div>
</div>

  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">

      <div class="doc-num">DOC-300 / REV.01</div>
      <div class="pg-num">P — ENTRIES</div>
    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">P</span>
      <span class="letter-pron">[pē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">PA</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— public address</span>
        </div>
        <div class="entry-def">The main audience-facing speaker system — the line arrays, subs, fills, and amps that put the show in the room.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">per diem</span>
          <span class="entry-pron">[pər ˈdē-əm]</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A daily cash allowance paid to crew and band on the road for personal expenses (food, incidentals). Often shortened to "PD."</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">photo pass</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A credential that grants a photographer access to the pit (between barricade and stage) for a limited time — typically the first three songs, no flash.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">pit</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The space between the front barricade and the front of the stage. Used by photographers, security, and sometimes guest VIP areas. Not for general audience.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">PM</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— production manager</span>
        </div>
        <div class="entry-def">The person who owns the show — the rig, the stage, the technical day, the crew. Distinct from the tour manager, who owns the people and the money. On smaller tours, often the same person.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">production</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Sound, lights, stage equipment — the gear and labor that puts the show in the room. Used as the shorthand umbrella for everything technical that isn't backline. <em>"What's production for this date?"</em></div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">production office</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The dedicated room at the venue used by touring management — laptops, printers, schedules, the home base for the day. Set up at load-in, struck at load-out.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">promoter</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The company or person who has paid the artist to perform in their market. Owns the financial risk, the marketing, the venue rental, and the deal terms.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">push</span>
          <span class="entry-pos">verb</span>
        </div>
        <div class="entry-def">To follow up on outstanding advance items — venues, vendors, anyone slow to confirm. <em>"I'm pushing the festival on the changeover window."</em></div>
      </div>

    </div>
  </div>
</div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">Q</span>
      <span class="letter-pron">[kyū]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">quick change</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A scheduled wardrobe change that has to happen in seconds, usually offstage during a song or short break. Plotted into the run of show ahead of time.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">R</span>
      <span class="letter-pron">[är]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">rider</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The document attached to the show contract that lists the artist's technical and hospitality requirements — production gear, stage specs, dressing rooms, catering, hospitality.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>The rider is a negotiation document, not a wish list. What gets delivered is what the advance settles.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">rigger</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A specialist who hangs production gear from the venue's overhead grid using cables and motors. Specialty trade with its own union jurisdiction in IATSE houses.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">road report</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The running document where the tour manager logs all show income, merch income, and tour expenses. Shared with business management on a regular cadence.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">ROS</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— run of show</span>
        </div>
        <div class="entry-def">The cue-by-cue document for the performance itself — every song, every transition, every lighting and video cue, every special moment. Owned by the show caller.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">routing</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The geographic sequence of tour dates — the path a tour takes city to city. Bad routing burns crew morale and money; good routing makes everything else easier.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">runner</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A person hired to run errands during the day — picking up gear, food, dry cleaning, anything the production needs and can't leave the venue to handle. Usually a local hire.</div>
      </div>

    </div>
  </div>
</div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">set list</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The ordered list of songs the artist will perform that night. Distributed to the crew before showtime so audio, lighting, and video can prep their cues.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">settlement</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The post-show financial reconciliation between the tour and the promoter. Tickets sold, deal terms applied, deductions subtracted, payment issued. The closing of the night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">shore power</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An electrical hookup at the venue that lets a tour bus run AC, refrigeration, and outlets without idling the engine. Also called a "bus plug."</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">side fill</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Speakers placed at the sides of the stage to deliver monitor mix to performers without depending only on wedges or in-ears. Wide coverage for movement on stage.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">soft goods</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Stage drapes, scrims, blackout curtains — the fabric elements that frame and mask the stage. Distinct from the hard structural rig.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">sound check</span>
          <span class="entry-pos">noun · verb</span>
        </div>
        <div class="entry-def">The session before doors where the band plays through the rig so the audio team can dial in mixes for FOH and monitor world. Usually 30-60 minutes.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">spike</span>
          <span class="entry-pos">noun · verb</span>
        </div>
        <div class="entry-def">A piece of tape on the floor marking the exact position of a piece of gear, person, or set element. Used to reset cleanly every day.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">stage left / stage right</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Directional language from the performer's perspective looking out at the audience. Opposite of house left/right. Always confirm framing before you point.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">stage manager</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The person who calls the show — managing transitions, cueing departments, running the run of show. On festival stages, the festival's stage manager runs the day; you fit into their system.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">stage plot</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A diagram of where each performer, instrument, and piece of gear sits on stage. Sent to the venue in advance so the production team can prep the stage before load-in.</div>
      </div>

    </div>
  </div>
</div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">TD</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— technical director</span>
        </div>
        <div class="entry-def">The senior technical lead on a tour, often above the department heads (audio, lighting, video). Owns the overall technical execution of the show.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">tech rider</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The technical portion of the rider — PA spec, console preferences, stage size, rigging points, power, lighting, video. Distinct from the hospitality rider.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">timecode</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A digital sync signal used to lock lighting, video, and sometimes audio to a master clock. Common on shows with heavy programming and pre-recorded elements. Often shortened to "TC."</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">TM</span>
          <span class="entry-pos">noun · abbreviation</span>
          <span class="entry-also">— tour manager</span>
        </div>
        <div class="entry-def">The person who owns the people and the money on a tour — schedules, hotels, travel, settlement, payroll, road report. Distinct from the production manager, who owns the show itself.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">tour book</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The master document holding everything for a run — date grid, venues, contacts, hotels, contracts, riders, advance notes, day sheets, settlements. Lives in software (Master Tour, etc.) or a shared drive.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">truss</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An aluminum framework — usually a triangular or square cross-section — that lights, video, and rigging gear get hung from. Flown above or set on the stage.</div>
      </div>

    </div>
  </div>
</div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">union call</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A booked block of union labor — number of hands, arrival time, minimum hours. Bound by IATSE local rules in union venues.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">upstage</span>
          <span class="entry-pos">adjective · adverb</span>
        </div>
        <div class="entry-def">Toward the back of the stage, away from the audience. Opposite of downstage.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">V</span>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">VIP</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Ticketed package holders entitled to extra access — early entry, soundcheck observation, meet-and-greet, premium viewing. A distinct category from comp guests.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">visa</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A work-authorization document required for international touring. Different countries, different categories — paperwork starts months before the dates.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">venue rider</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: tech pack</span>
        </div>
        <div class="entry-def">A document from the venue outlining its specs, capabilities, and requirements — load-in access, rigging points, available labor, house equipment, in-house policies. The mirror of the artist's tech rider, sent the other direction during advance.</div>
      </div>

    </div>

    <div class="letter-divider" style="margin-top: 20px;">
      <span class="big-letter">W</span>
      <span class="letter-pron">[ˈdə-bəl-yū]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">walkout</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The total amount of money the artist receives as payment for a performance — guarantee plus any overages or bonuses. The number that lands on the road report at the end of the night.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">wedge</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">An angled floor monitor speaker placed at a performer's feet. Fed by the monitor engineer with a custom mix for that performer.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">will-call</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The box office service where guests pick up tickets held under their name on show day. The artist guest list usually goes through will-call.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">wing</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The offstage area immediately to the side of the stage — where performers stand before entering, where quick changes happen, where the stage manager calls the show from.</div>
      </div>

    </div>
  </div>
</div>

<div class="page-wrapper body-page">

        <div class="hrow"><span>DOC-301</span><span>EST. 2026</span></div>

    </div>
    <div class="doc-stamp">
      <div class="doc-num">DOC-301 / REV.01</div>
      <div class="pg-num">A — ENTRIES</div>
    </div>
  </div>

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">A</span>
      <span class="letter-pron">[ā]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">after show food</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Food and beverages provided for the artist and touring staff after the performance. Distinct from catering, which covers the show day; after show food is the post-show meal — usually requested in the rider and waiting in the dressing room or on the bus.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">agent</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: booking agent</span>
        </div>
        <div class="entry-def">Represents the artist for live performances — negotiates performance fees, presents offers to the artist's management, and passes or confirms offers. The artist's side of every deal.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">artist rider</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The document attached to the artist contract detailing the artist's requirements for the performance — technical specs, hospitality, stage layout, dressing rooms, transportation. Issued by the artist's team and negotiated against the venue's capabilities during advance.</div>
      </div>

    </div>
  </div>
</div>

<div class="page-wrapper body-page">

  <div class="dict-body">
    <div class="letter-divider">
      <span class="big-letter">B</span>
      <span class="letter-pron">[bē]</span>
      <span class="letter-meta">— ENTRIES —</span>
    </div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">backend</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Any overage received on a given show or settlement — money the artist earns beyond the guarantee, driven by ticket performance against the deal terms.</div>
      </div>

      

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">billing</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">How artists' names and likenesses are presented relative to each other in event advertising and in the performance order on show day. A negotiated deal point — font size, position, and order are all on the table.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">bonus</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Extra money potentially earned by the artist when specific ticket-related goals are met. Defined in the deal memo — typically tied to a paid-attendance threshold or a gross box office trigger.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">box office receipts</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">Money earned from ticket sales. The top-line number that drives almost every settlement calculation downstream.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">breakeven / split point</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The monetary point at which all agreed-upon event expenses have been covered by ticket sales — and, in many deals, the point at which the promoter and artist begin to share the upside on additional revenue.</div>
        <div class="entry-field"><strong>FIELD NOTE</strong>The breakeven is only as honest as the expense line items behind it. Audit them — that's where most settlement disputes live.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">buyer</span>
          <span class="entry-pos">noun</span>
          <span class="entry-also">— also: talent buyer, purchaser</span>
        </div>
        <div class="entry-def">Negotiates offers and artist contracts on behalf of a promoter, venue, or event. A buyer is to an event what an agent is to an artist.</div>
      </div>

    </div>
  </div>
</div>

    <div class="entry-list">

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">catering buy-out</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A negotiated dollar amount paid to the artist by the promoter in lieu of providing food and beverages at the event. Common when the venue can't deliver meals or when the schedule pushes the crew off-site.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">co-headline</span>
          <span class="entry-pos">noun · adjective</span>
        </div>
        <div class="entry-def">A billing structure where two artists are presented equally in advertising — same font size, same position, alternating order across markets. A negotiated arrangement that affects everything from set length to settlement splits.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">comp ticket</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A complimentary ticket that allows event admission free of charge. Tracked separately from paid tickets on the manifest and rarely counted toward gross.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">contract</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The legal document issued by the artist's agency outlining the details of the performance agreement. The short-hand version is the deal memo.</div>
      </div>

    </div>
  </div>
</div>

          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A written summary of an agreement — signed at settlement when the show pays out as something other than the full guarantee, or when terms have been adjusted day-of.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">deal points</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The specific parts of a contract negotiated and agreed upon by agent and buyer. VIP meet-and-greets, sponsor mentions in advertising, security arrangements, and transportation can all be deal points.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">deposit</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">The advance payment from the promoter, typically 50% of the guarantee, paid before the show. Subtracted from what's owed at settlement.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">door deal</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A performance agreement in which the artist receives a certain percentage of the box office receipts — no flat guarantee, just a share of what comes through the door.</div>
      </div>

      <div class="entry">
        <div class="entry-head">
          <span class="entry-term">drop count</span>
          <span class="entry-pos">noun</span>
        </div>
        <div class="entry-def">A count of unsold tickets returned to inventory at the end of advance ticket sales — used at settlement to reconcile final paid attendance. Historically a count of ticket stubs; today, ticket scanners provide the number directly.</div>
      </div>

    </div>
