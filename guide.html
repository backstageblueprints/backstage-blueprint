          <li>One (1) cooler with Gatorade and electrolyte drinks staged off stage right</li>
          <li>Hot tea with honey and lemon staged off stage left, refreshed at set start</li>
        </ul>
        <div class="wgh">
          <strong>What goes here</strong>
          Stage refresh is one of the most-used and least-noticed pieces of hospitality on show day. The towels and water on both sides of the stage are non-negotiable; the hot tea is a vocalist staple.
        </div>

          <li>Sandwiches or wraps (variety, including one vegetarian)</li>

          <li>Hot soup or chili (one option, vegetarian preferred)</li>
          <li>Coffee, hot tea, and the all-day cold beverage refresh continuing through load-out</li>
        </ul>

          <strong>What goes here</strong>

        </div>

        <h2 style="margin-top: 18px;">Special Requests</h2>
        <ul>
          <li>Pre-show neutral-temperature steamer in artist&rsquo;s dressing room, ready 30 minutes prior to set</li>
          <li><strong>Allergy alert:</strong> tree nuts, shellfish &mdash; please confirm with TM and label clearly in catering</li>
          <li>Hot tea with honey and lemon delivered to the artist dressing room one (1) hour prior to set</li>
          <li>Quiet hallway during the 30 minutes prior to artist set &mdash; non-essential foot traffic redirected</li>
          <li>Family / guest room space available for after-show as needed (advanced with TM)</li>

<div class="page-wrapper page2">

    <div class="header-left">

    <div class="doc-stamp">
      <div class="doc-num">DOC-306 / REV.01</div>
      <div class="pg-num">PG 02<span class="pg-of">/ 04</span></div>
    </div>

  <div class="body-area">
    <div class="module-tag">— DAY SHEET GUIDE / TIPS —</div>
    <div class="page-title">CREATING A<br>DAY SHEET.</div>
    <div class="page-sub">Tips and best practices.</div>

    <div class="sec-head">Go Digital First</div>
    <p class="para">Before we build one, a real recommendation: run your day sheets through a digital tour-management service. A good platform holds the whole information set in one place and keeps it fluid as the day moves. It answers most of the team&rsquo;s questions before the day even starts &mdash; and it saves whoever&rsquo;s managing it a serious amount of time, typing, and energy. One catch-all location, always current, traveling with the tour.</p>
    <p class="para">We&rsquo;re still going to walk through building a proper day sheet &mdash; it&rsquo;s the model for a clean sheet you&rsquo;d post around the venue, and the discipline behind it holds either way. One rule carries through all of it: <strong>keep private information off anything you post publicly.</strong> A sheet taped to a backstage wall is read by everyone who walks past it. A digital service has the edge here too &mdash; access is credentialed and invite-only, so the sheet stays private to the people who actually need it.</p>

    <div class="emph-band">
      The day sheet should be an <strong>easy-to-understand, effective playbook</strong> of information for the whole tour. Five things to keep in mind as you build it.
    </div>

    <div class="step">
      <div class="step-num">01</div>
      <div class="step-body">
        <strong>Start with a template.</strong>
        Don&rsquo;t reinvent the layout every show. Pull from a working template (like the sample on the next page, or grab the editable Day Sheet template that pairs with this guide), drop in the day&rsquo;s specifics, and ship. A consistent day sheet framework helps everybody on the tour know where and what to look for within that framework on a day-to-day basis.
      </div>
    </div>

    <div class="step">
      <div class="step-num">02</div>
      <div class="step-body">
        <strong>Wide coverage and relevance.</strong>
        Include everything the touring team needs to know for the day &mdash; load-in, soundcheck, transportation, contacts, the schedule beats, and any day-specific notes. If a piece of information is something someone might need at 2 PM, it belongs on the day sheet.
      </div>
    </div>

    <div class="step">
      <div class="step-num">03</div>
      <div class="step-body">
        <strong>Simple, clear, direct.</strong>
        Make the day sheet easy to read and easy to understand at a glance. It&rsquo;s very easy to add too much information, overshare, and end up with a schedule no one can read. <em>Information should be findable in seconds, not minutes.</em>
      </div>
    </div>

    <div class="step">
      <div class="step-num">04</div>
      <div class="step-body">
        <strong>Sensitive / private information stays off.</strong>
        Most day sheets are distributed widely and printed. Anything you don&rsquo;t want public &mdash; primary artist&rsquo;s hotel, credential info, door codes, flight numbers, after-show plans &mdash; keeps off the printed sheet. Route those direct to the people who need them.
      </div>
    </div>

    <div class="step">
      <div class="step-num">05</div>
      <div class="step-body">
        <strong>Double-check before distributing.</strong>
        Once information is live, people start to make plans and decisions based on it. Verify times, names, and contacts before the sheet goes out.
      </div>
    </div>

  </div>
</div>

<!-- ============================================ -->
<div class="page-wrapper page2">

  <div class="body-area">
    <div class="module-tag">— DAY SHEET GUIDE / SHARING + REFERENCE —</div>
    <div class="page-title">SHIPPING IT,<br>UPDATING IT.</div>
    <div class="page-sub">How to share, what to include, and how to handle changes.</div>

    <div class="sec-head">Sharing the Day Sheet</div>
    <p class="para">Sometimes deciding <strong>how</strong> to deliver information is almost more important than the day sheet itself. Day sheets are typically shared either digitally or as a printed hard copy displayed backstage &mdash; and <strong>running both serves you best</strong>.</p>
    <p class="para">Digital tour management platforms make distribution easy and let the full information set live in one place. The printed version stays simpler &mdash; focused on the schedule and the most-needed contacts. Get day sheets out in a timely manner so the team has time to make decisions about their day.</p>

    <div class="sec-head">Options of What to Include</div>
    <p class="para">Below is a reference for common items the touring team typically wants more info about on show days &mdash; <strong>think of it as a menu, not a checklist</strong>. You don&rsquo;t need every item on every sheet; pull in whatever&rsquo;s pertinent to your tour and leave the rest off. <strong>The precise outline of what to include and how to format the day sheet is entirely at the discretion of the production team</strong> and the actual needs of the tour that day. If there&rsquo;s something nonstandard about the show day, flag it visibly so it gets the attention it needs.</p>

    <div class="include-card">
      <div class="ic-grid two-col">
        <div class="ic-col">
          <div class="ic-head">— Contacts &amp; Hospitality —</div>
          <ul>
            <li>Venue Contact</li>
            <li>Hospitality Contact</li>
            <li>Runner Contact</li>
            <li>Merch Contact</li>
            <li>VIP Contact</li>
            <li>Meals / Rider</li>
            <li>Dressing Rooms</li>
            <li>Showers</li>
            <li>Laundry</li>
            <li>Internet</li>
          </ul>
        </div>
        <div class="ic-col">
          <div class="ic-head">— Production &amp; Venue —</div>
          <ul>
            <li>Venue Tech Pack <span class="lnk">link</span></li>
            <li>Parking Map <span class="lnk">link</span></li>
            <li>Shore Power / Water (Bus Power / Water)</li>
            <li>Load In</li>
            <li>Stage Dimensions</li>
            <li>Audio</li>
            <li>Lighting</li>
            <li>Labor</li>
            <li>Security</li>
            <li>Emergency Contacts</li>
          </ul>
        </div>
      </div>
    </div>

    <div class="sec-head">Updates, Pivots, Changes</div>
    <p class="para">Keep the day sheet as up-to-date as you can based on where the day actually navigates. If changes occur after distribution, that&rsquo;s the nature of the gig &mdash; staying on top of changes and making sure people are informed is part of a TM&rsquo;s job.</p>
    <p class="para"><strong>Anything critical or time-sensitive &mdash; go direct</strong> to the people who might be affected by the change. When a new version goes live, make sure the old one goes in the trash.</p>

    <div class="emph-band">
      Day sheets are a foundational element of a smooth, well-functioning tour. They&rsquo;re the schedule of record everyone navigates their day off of. When the team has visibility into what to expect, they can <strong>prepare, stay informed, and operate in their roles effectively</strong>.
    </div>

  </div>
</div>

<div class="page-wrapper page2">
  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">
        <div class="hrow"><span>DOC-307</span><span>EST. 2026</span></div>
        <div class="body"><div class="top">BACKSTAGE</div><div class="bot">BLUEPRINT</div></div>

  <div class="body-area">
    <div class="module-tag">— ROAD REPORT GUIDE / THE CONCEPT —</div>
    <div class="page-title">WHERE THE<br>MONEY <span class="accent">LIVES.</span></div>
    <div class="page-sub">One running ledger for the entire tour.</div>

    <p class="para">The Road Report is the tour&rsquo;s financial source of truth &mdash; one Google Sheet where the money for the whole run lives. Every show is a row. Where a settlement worksheet closes out a single night, <strong>the Road Report tracks the entire tour</strong>: show after show, dollar after dollar, start to finish.</p>

    <div class="sec-head">Built Around The <span class="accent">Float.</span></div>

    <p class="para">The Road Report runs on the float &mdash; the cash you carry on the road. It opens with a <strong>beginning float balance</strong>. Cash comes in from show settlements and merch. Cash goes out for expenses and payments. What&rsquo;s left is your <strong>cash on hand</strong>. The Road Report keeps that math live, so the float is never a guess &mdash; at any point in the run, you know exactly what you&rsquo;re holding.</p>

    <div class="sec-head">Why It <span class="accent">Matters.</span></div>

    <p class="para">Three things. First, at any moment it answers the only question that really matters &mdash; <em>where is the money.</em> Second, it&rsquo;s your <strong>paper trail</strong>: every figure traces back to a settlement, a receipt, or a deposit. Third, it&rsquo;s what you <strong>report up the chain</strong> &mdash; to management, the business manager, artist admin. A clean Road Report is what makes the money side of a tour trustworthy.</p>

    <div class="rr-callout">
      <div class="rrc-tag">— IT PAIRS WITH THE SETTLEMENT WORKSHEET —</div>
      <div class="rrc-title">SETTLEMENT IS ONE SHOW. THE ROAD REPORT IS THE WHOLE TOUR.</div>
      <div class="rrc-text">The per-show Settlement Worksheet and the Road Report are one system. Each night, the settlement closes a single show &mdash; and its key numbers become <strong>one row</strong> of the Road Report. Settle the show, then carry the result into the ledger.</div>
    </div>

    <p class="para">Set it up at the start of the run: enter your beginning float and lay the tour out, <strong>one row per show</strong>. From there it&rsquo;s a rhythm &mdash; a row a night, kept current as the tour rolls.</p>

  </div>

<!-- ============================================ -->
<!-- PAGE 3 — THE FIVE TABS                         -->
<!-- ============================================ -->
<div class="page-wrapper page2">
  <div class="page-header">
    <div class="header-left">

        <div class="hrow"><span>DOC-307</span><span>EST. 2026</span></div>
        <div class="body"><div class="top">BACKSTAGE</div><div class="bot">BLUEPRINT</div></div>
        <div class="frow"><span>BB.CO</span><span>REV.01</span></div>
      </div>
      <div class="header-meta">
        ROAD REPORT GUIDE<br>
        THE FIVE TABS
      </div>
    </div>
    <div class="doc-stamp">
      <div class="doc-num">DOC-307 / REV.01</div>
      <div class="pg-num">PG 03<span class="pg-of">/ 03</span></div>
    </div>
  </div>

  <div class="body-area">
    <div class="module-tag">— ROAD REPORT GUIDE / THE FIVE TABS —</div>
    <div class="page-title">THE FIVE <span class="accent">TABS.</span></div>
    <div class="page-sub">One sheet, five working pages.</div>

    <p class="para">The Road Report is one Google Sheet with five tabs. One is the master ledger, one is the reconciliation summary, and three are detail ledgers that feed it. Here&rsquo;s each tab &mdash; and how to work it.</p>

    <div class="tab-list">
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">01</span><span class="tab-name">Road Report</span></div>
        <div class="tab-body">The master ledger &mdash; one row per show. Guarantee, deposit, taxes withheld, show income, merch income, what&rsquo;s still due. After each show settles, carry its numbers over from the Settlement Worksheet. Anything that moves &mdash; money in, money out &mdash; gets logged at the end of the day. This tab is the whole tour at a glance, and there&rsquo;s a place for every dollar of it.</div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">02</span><span class="tab-name">Summary</span></div>
        <div class="tab-body">The reconciliation page. A clean, brief read on every line item leaving the Cash Expense and Credit Card ledgers and landing in the Road Report &mdash; plus the running totals and the cash-on-hand math: beginning float, plus cash received, minus expenses and payments. Check it any time you need to know where the float stands.</div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">03</span><span class="tab-name">Cash Expense</span></div>
        <div class="tab-body">The cash outflow log &mdash; every cash expense, line by line, logged as you spend. It rolls up into the Summary. <strong>Be diligent here, and keep every receipt.</strong> At the end of each day, export the table and file it with that day&rsquo;s receipts.</div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">04</span><span class="tab-name">Cash Payments</span></div>
        <div class="tab-body">Cash paid out &mdash; per diems, cash settlements, anything handed from the float to a person. Logged as it happens, it rolls into the Summary alongside cash expenses. <strong>USE THIS TAB IF YOU RUN CASH PER DIEMS.</strong> Most tours now run per diems through direct deposit, handled like payroll &mdash; but the cash route lives here if you need it.</div>
      </div>
      <div class="tab-item">
        <div class="tab-head"><span class="tab-num">05</span><span class="tab-name">Credit Card Expenses</span></div>
        <div class="tab-body">The running card ledger &mdash; every charge on the tour, tracked on its own. It sits apart from the float, since card spend never touches the cash you&rsquo;re carrying. Watch hotels and gas especially: room deposits stack up fast, particularly at the same chain. Keep a clean log so the bank statements never catch you off guard.</div>
      </div>
    </div>

    <div class="sec-head">How It <span class="accent">Connects.</span></div>

    <p class="para">The three expense tabs are the detail; the Summary is the rollup. Log spending on the detail tabs and the Summary updates itself &mdash; you never re-type a total. The main Road Report tab carries the income side, show by show. Together, the five tabs hold <strong>every dollar in and every dollar out, in one place.</strong></p>

    <div class="emph-band">
      Keep it current. A Road Report that&rsquo;s a week behind isn&rsquo;t a source of truth &mdash; it&rsquo;s a guess. <strong>Update it the night of, every night,</strong> and it will always have your answer.
    </div>

  </div>

  <div class="body-area">
    <div class="module-tag">— SETTLEMENT GUIDE / THE 10 STEPS —</div>
    <div class="page-title">TEN STEPS,<br>IN ORDER.</div>
    <div class="page-sub">Follow this sequence. The order matters.</div>

    <p class="para">Settlement is a sequence, not a single event &mdash; each step sets up the one after it. Follow these steps as you fill out your template and approach the settlement. Steps 01 through 05 happen before show day; 06 through 10 happen right before, or during, show day. <strong>Put most of the work in on the front end</strong> &mdash; so when it comes time to settle, your information is cleanly presented, understood, and accounted for, and the settlement itself goes much smoother and quicker.</p>

    <div class="step-list">
      <div class="step-item">
        <div class="step-head"><span class="step-num">01</span><span class="step-name">Deal Memo</span></div>
        <div class="step-body">You need a comprehensive understanding of the deal structure. Read the deal memo end to end. Is it a flat guarantee? Is there a versus deal? Are there bonuses or escalators? Are there nuances &mdash; merch, holdbacks, hospitality buy-offs &mdash; anything that affects the final number? <strong>If something doesn&rsquo;t make sense, ask the agent.</strong> Don&rsquo;t walk in guessing.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">02</span><span class="step-name">Deposit Report</span></div>
        <div class="step-body">Ask your agent and artist representation for the most up-to-date deposit report. It tells you how much the buyer has already paid your artist up front against the guarantee. Without it, you don&rsquo;t know what the balance owed should be at the end of the night.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">03</span><span class="step-name">Template Setup</span></div>
        <div class="step-body">Pre-fill everything about the show&rsquo;s finances you can lock before show day: date, city, venue, capacity, artist name, artist fee from the deal memo, deposit received, buyer/promoter contact info, ticket scaling, and any pre-agreed flat expenses.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">04</span><span class="step-name">Advance Your Settlement</span></div>
        <div class="step-body">Send your W-9, your banking details, and wire instructions, and specify how you&rsquo;d like to be paid &mdash; cash, check, or wire. <strong>Flag any savings ahead of time</strong> &mdash; holds you might release, advertising dollars trending under budget.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">05</span><span class="step-name">Pre-Settlement</span></div>
        <div class="step-body">Leading into show day &mdash; or first thing that morning &mdash; request a pre-settlement from the promoter. Does anything look too high or too low? Watch for expenses you don&rsquo;t recognize, and for items you expected to see that aren&rsquo;t there. See how their pre-settlement aligns with the template you&rsquo;ve built so far.</div>
      </div>
    </div>

  </div>
</div>

<!-- ============================================ -->
<!-- PAGE 3 — STEPS 06-10 + CALLOUTS                -->
<!-- ============================================ -->
<div class="page-wrapper page2">
  <div class="page-header">
    <div class="header-left">

      </div>
    </div>
    <div class="doc-stamp">

      <div class="pg-num">PG 03<span class="pg-of">/ 04</span></div>
    </div>
  </div>

  <div class="body-area">
    <div class="module-tag">— SETTLEMENT GUIDE / THE 10 STEPS —</div>
    <div class="page-title">STEPS SIX<br>THROUGH TEN.</div>
    <div class="page-sub">The day of show &mdash; and the close.</div>

    <div class="step-list">
      <div class="step-item">
        <div class="step-head"><span class="step-num">06</span><span class="step-name">Budget Expenses</span></div>
        <div class="step-body">Gather every expense from the pre-settlement, plus anything on your side. Compare actual costs against what was budgeted. <strong>Flag anything running as an overage.</strong></div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">07</span><span class="step-name">When To Settle</span></div>
        <div class="step-body">Some settle while the artist is on stage &mdash; the show is sold, the door count is in, the math is mostly known. Others wait until the show comes down and the load-out is rolling. The right time depends on how prepared everyone is, the promoter&rsquo;s rhythm, and your run-of-house call &mdash; and most of all, whether any actuals are still being awaited.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">08</span><span class="step-name">Final Settlement</span></div>
        <div class="step-body">Check the final settlement against your template and update everything with the actuals. When you request it, it should arrive with every correlating receipt, invoice, and backup document supporting each recorded expense. <strong>Does the math make sense? Is there a reason for every dollar?</strong></div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">09</span><span class="step-name">Settle With Promoter</span></div>
        <div class="step-body">Sit down with the promoter. Go over any errors or questions, resolve the issues, and address the flags you found. Then sign off on the final settlement &mdash; both parties sign. Keep a signed copy on hand, and collect your payment.</div>
      </div>
      <div class="step-item">
        <div class="step-head"><span class="step-num">10</span><span class="step-name">Update + Report</span></div>
        <div class="step-body">Update your road report and any budgeting. Send it off to whoever needs it &mdash; management, artist admin, anyone on the financial chain.</div>
      </div>
    </div>

    <div class="pc-callout">
      <div class="pcc-tag">— READ THE SEQUENCE LIKE THIS —</div>
      <div class="pcc-title">STEPS 01&ndash;05 HAPPEN BEFORE SHOW DAY. 06&ndash;10 HAPPEN RIGHT BEFORE, OR DURING, IT.</div>
      <div class="pcc-text">The work isn&rsquo;t at midnight at the settlement table. The work is in the days leading up to it. If steps 01 through 05 are clean, <em>everything that happens after gets easier.</em></div>
    </div>

  </div>

  <div class="body-area">
    <div class="module-tag">&mdash; SETTLEMENT GUIDE / THE TEMPLATE &mdash;</div>
    <div class="page-title">HOW THE SHEET WORKS.</div>
    <div class="page-sub">What you fill in, what it does, and the logic underneath.</div>

    <p class="para">The Settlement template is a one-page versus-deal worksheet. You fill in the night&rsquo;s real numbers; it runs the whole waterfall to one figure &mdash; the <strong>Amount Owed to Artist</strong> &mdash; and mirrors that up in the header box, so the answer is always in view.</p>

    <div class="sec-head">What You Type In</div>
    <p class="para">Artist, date, city, venue, and the deal terms &mdash; <strong>Guarantee</strong>, <strong>Versus percentage</strong>, and any <strong>Deposit</strong> already collected. Then two grids. In <strong>Tickets</strong>, enter each price tier &mdash; description, price, available, comps, paid; the sheet returns price &times; paid as the gross for each line. In <strong>Expenses</strong>, type the budgeted and actual cost of each Fixed item &mdash; the Difference fills itself. Variable Expenses (ASCAP, BMI, credit cards, insurance) run off their rate cells; leave them unless a rate changes.</p>

    <div class="sec-head">What It Does On Its Own</div>
    <p class="para">Everything below the inputs is automatic. Gross Box Office Receipts, less the facility fee, gives <strong>Adjusted Gross</strong>; less admissions tax gives <strong>NBOR</strong> &mdash; Net Box Office Revenue. Subtract total show expenses and you reach the <strong>Net-Net-Show</strong>: the real pool the deal pays from. The artist&rsquo;s percentage comes off that NNS pool &mdash; <em>not</em> gross, and not NBOR. That distinction is the whole game.</p>

    <div class="sec-head">The Versus Logic</div>
    <p class="para">The sheet compares two numbers &mdash; the artist&rsquo;s percentage of the Net-Net-Show, and the Guarantee &mdash; and pays <strong>whichever is larger</strong>. The Guarantee is a floor, and an advance against the split; it is never added on top.</p>

    <div class="pc-callout">
      <div class="pcc-tag">&mdash; THE RULE &mdash;</div>
      <div class="pcc-title">GUARANTEE OR THE SPLIT &mdash; WHICHEVER IS BIGGER.</div>
      <div class="pcc-text">Underperform, and the artist still gets the Guarantee. Overperform, and they get the percentage &mdash; with the <em>Overages</em> line showing how far above the Guarantee they landed. That&rsquo;s why Overages can never go negative.</div>
    </div>

    <p class="para">From the resulting Artist Show Gross, the sheet subtracts withholding tax and the Deposit already paid. What&rsquo;s left is the <strong>Amount Owed to Artist</strong> &mdash; the check you cut that night.</p>

    <div class="sec-head">Running It</div>
    <p class="para">Fill the inputs top to bottom, enter actual expenses as they come, and read the bottom line. <strong>The header total and the bottom line should always match</strong> &mdash; if they don&rsquo;t, something got typed over a formula. The only cells you ever adjust are <strong>yellow</strong> (a deal term) or <strong>blue</strong> (a rate). Quick sanity check: bump the Guarantee above the percentage figure and watch Artist Show Gross snap to the Guarantee with Overages at zero. If it does, the sheet is honest.</p>

<script>
(function(){
  "use strict";

  // -------- GUIDE CATALOG ----------
  var GUIDES = {
    "099": { title: "Blueprint Preface",       shortName: "Blueprint Preface",  kind: "bundle",     upgradeUrl: "/blueprint.html" },
    "300": { title: "Production Dictionary",   shortName: "Production Dict.",   kind: "dictionary" },
    "301": { title: "Settlement Dictionary",   shortName: "Settlement Dict.",   kind: "dictionary" },
    "302": { title: "Master Budget Guide",     shortName: "Master Budget",      kind: "paired", slug: "master-budget",       upgradeUrl: "/template.html?id=master-budget" },
    "303": { title: "Show Advance Guide",      shortName: "Show Advance",       kind: "paired", slug: "show-advance-packet", upgradeUrl: "/template.html?id=show-advance-packet" },
    "304": { title: "Technical Rider Guide",   shortName: "Technical Rider",    kind: "paired", slug: "technical-rider",     upgradeUrl: "/template.html?id=technical-rider" },
    "305": { title: "Hospitality Rider Guide", shortName: "Hospitality Rider",  kind: "paired", slug: "hospitality-rider",   upgradeUrl: "/template.html?id=hospitality-rider" },
    "306": { title: "Day Sheet Guide",         shortName: "Day Sheet",          kind: "paired", slug: "day-sheet",           upgradeUrl: "/template.html?id=day-sheet" },
    "307": { title: "Road Report Guide",       shortName: "Road Report",        kind: "paired", slug: "road-report",         upgradeUrl: "/template.html?id=road-report" },
    "308": { title: "Settlement Guide",        shortName: "Settlement",         kind: "paired", slug: "show-settlement",     upgradeUrl: "/template.html?id=show-settlement" }
  };
  var GUIDE_ORDER = ["099","300","301","302","303","304","305","306","307","308"];

  // -------- ENTITLEMENT → UNLOCK MATRIX ----------
  // Per Order 012 / dictionary_unlock_scope.md + guide_masters_reference/README.md
  function computeUnlockedGuides(entitlements) {
    var set = new Set(entitlements || []);
    // course_owner OR blueprint_paid unlocks everything
    if (set.has("blueprint_paid") || set.has("course_owner")) return new Set(GUIDE_ORDER);
    var unlocked = new Set();
    // Any paid entitlement unlocks both dictionaries
    var hasAnyPaid = entitlements && entitlements.length > 0;
    if (hasAnyPaid) { unlocked.add("300"); unlocked.add("301"); }
    // Per-template entitlements unlock paired guides
    GUIDE_ORDER.forEach(function(doc){
      var g = GUIDES[doc];
      if (g.kind === "paired" && set.has("template:" + g.slug + "_owned")) unlocked.add(doc);
    });
    return unlocked;
  }

  // -------- CLERK LAZY LOADER ----------
  var __clerkPromise = null;
  function __loadClerk() {
    if (__clerkPromise) return __clerkPromise;
    __clerkPromise = new Promise(function(res, rej){
      var s = document.createElement("script");
      s.async = true;
      s.crossOrigin = "anonymous";
      s.dataset.clerkPublishableKey = "pk_test_ZmFjdHVhbC1hc3AtMzAuY2xlcmsuYWNjb3VudHMuZGV2JA";
      s.src = "https://factual-asp-30.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    }).then(function(){ return window.Clerk.load(); });
    return __clerkPromise;
  }

  // -------- DOM HOOKS ----------
  var loadingCard = document.getElementById("loadingCard");
  var guideFrame  = document.getElementById("guideFrame");
  var upgradeCard = document.getElementById("upgradeCard");
  var upgradeBody = document.getElementById("upgradeBody");
  var upgradeCta  = document.getElementById("upgradeCta");
  var picker      = document.getElementById("guidePicker");
  var titleEl     = document.getElementById("guideTitle");

  function showOnly(which) {
    [loadingCard, guideFrame, upgradeCard].forEach(function(el){ el.classList.add("hidden"); });
    which.classList.remove("hidden");
  }

  function renderGuide(doc) {
    var src = document.getElementById("g-" + doc);
    if (!src) { showOnly(loadingCard); loadingCard.textContent = "Guide " + doc + " not found"; return; }
    var html = src.textContent;
    guideFrame.srcdoc = html;
    showOnly(guideFrame);
    titleEl.textContent = GUIDES[doc].title;
  }

  function showUpgrade(doc) {
    var g = GUIDES[doc];
    if (g.kind === "dictionary") {
      upgradeBody.textContent = "Both reference dictionaries unlock with any paid product — the cheapest is a single $5 template.";
      upgradeCta.setAttribute("href", "/templates.html");
    } else if (g.kind === "bundle") {
      upgradeBody.textContent = "The Blueprint Preface is the bundle's overview — included with The Blueprint (all 14 templates + 9 guides) or with the Course.";
      upgradeCta.setAttribute("href", g.upgradeUrl);
    } else {
      upgradeBody.textContent = "This guide ships with the " + g.shortName + " template, or with The Blueprint bundle (all 14 templates + all 9 guides).";
      upgradeCta.setAttribute("href", g.upgradeUrl);
    }
    titleEl.textContent = g.title;
    showOnly(upgradeCard);
  }

  function populatePicker(unlocked, currentDoc) {
    picker.innerHTML = "";
    GUIDE_ORDER.forEach(function(doc){
      if (!unlocked.has(doc)) return;
      var o = document.createElement("option");
      o.value = doc;
      o.textContent = "DOC-" + doc + "  ·  " + GUIDES[doc].shortName;
      if (doc === currentDoc) o.selected = true;
      picker.appendChild(o);
    });
    if (picker.options.length > 1) picker.classList.remove("hidden");
    picker.addEventListener("change", function(){
      var doc = picker.value;
      var url = new URL(window.location.href);
      url.searchParams.set("id", doc);
      window.history.replaceState({}, "", url.toString());
      renderGuide(doc);
    });
  }

  // -------- BOOT ----------
  async function boot() {
    var params = new URLSearchParams(window.location.search);
    var requestedDoc = params.get("id") || "300";
    if (!GUIDES[requestedDoc]) requestedDoc = "300";

    try {
      await __loadClerk();
      var user = window.Clerk && window.Clerk.user;
      if (!user) {
        // Not signed in — bounce to signup with return path
        window.location.href = "/signup.html?return=" + encodeURIComponent(window.location.pathname + window.location.search);
        return;
      }
      var res = await fetch("/.netlify/functions/get-my-entitlements", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clerk_user_id: user.id })
      });
      var entitlements = [];
      if (res.ok) {
        var data = await res.json();
        entitlements = data.entitlements || [];
      }
      var unlocked = computeUnlockedGuides(entitlements);
      populatePicker(unlocked, requestedDoc);
      if (unlocked.has(requestedDoc)) {
        renderGuide(requestedDoc);
      } else {
        showUpgrade(requestedDoc);
      }
    } catch (e) {
      console.warn("[BB Guide Reader] boot failed:", e && e.message);
      showOnly(loadingCard);
      loadingCard.textContent = "Couldn\u2019t load your guides. Try refreshing.";
    }
  }
  boot();
})();
</script>
