<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Binder — Backstage Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0E0E0E; --black2:#141414;
    --blue:#1B3A5C; --blue-d:#122947; --blue-l:#9FC5E7;
    --bone:#F4F1EA; --orange:#D4641E;
    --scale:1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.16) 1px,transparent 1px),
      linear-gradient(90deg,rgba(27,58,92,0.16) 1px,transparent 1px);
    background-size:26px 26px;
    color:var(--bone);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ============ LOGIN GATE ============ */
  .gate{
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
    background:var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.20) 1px,transparent 1px),
      linear-gradient(90deg,rgba(27,58,92,0.20) 1px,transparent 1px);
    background-size:26px 26px;
    transition:opacity .6s ease, visibility .6s;
  }
  .gate.hidden{opacity:0; visibility:hidden;}
  .gate-card{
    width:380px; max-width:90vw;
    background:var(--black2);
    border:1px solid rgba(244,241,234,0.14);
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    padding:38px 38px 34px;
    position:relative;
  }
  .gate-card::before,.gate-card::after{
    content:""; position:absolute; width:16px; height:16px;
    border:1.5px solid var(--orange); opacity:.7;
  }
  .gate-card::before{top:10px;left:10px;border-right:0;border-bottom:0;}
  .gate-card::after{bottom:10px;right:10px;border-left:0;border-top:0;}
  .gate-mark{
    display:inline-block; border:1px solid rgba(244,241,234,0.55);
    margin-bottom:22px;
  }
  .gate-mark .top,.gate-mark .bot{
    font-family:'Archivo',sans-serif; font-size:13px; line-height:1;
    letter-spacing:3px; padding:5px 12px;
  }
  .gate-mark .top{font-weight:900;}
  .gate-mark .bot{font-weight:300;border-top:.5px solid rgba(244,241,234,0.4);}
  /* Internal logo image — replaces the CSS-drawn stacked text mark. */
  .gate-mark-img {
    display: block;
    width: 280px;
    max-width: 100%;
    height: auto;
    margin: 0 0 22px;
    user-select: none;
  }
  .gate-tag{
    font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
    letter-spacing:3px; color:var(--orange); margin-bottom:8px;
  }
  .gate-title{
    font-family:'Archivo',sans-serif; font-weight:900; font-size:34px;
    letter-spacing:1px; line-height:.95; margin-bottom:6px;
  }
  .gate-sub{
    font-size:12.5px; color:rgba(244,241,234,0.6); margin-bottom:26px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-family:'JetBrains Mono',monospace;
    font-size:9px; font-weight:700; letter-spacing:2px;
    color:rgba(244,241,234,0.5); margin-bottom:5px;
  }
  .field input{
    width:100%; background:var(--black); color:var(--bone);
    border:1px solid rgba(244,241,234,0.18);
    padding:11px 12px; font-family:'Inter',sans-serif; font-size:13px;
    outline:none; transition:border-color .2s;
  }
  .field input:focus{border-color:var(--orange);}
  .gate-btn{
    width:100%; margin-top:10px;
    background:var(--orange); color:var(--black);
    border:0; padding:13px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-weight:700;
    font-size:11px; letter-spacing:2.5px;
    transition:transform .12s ease, filter .15s ease;
  }
  .gate-btn:hover{filter:brightness(1.08);}
  .gate-btn:active{transform:scale(.985);}
  .gate-note{
    margin-top:16px; font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:1px; color:rgba(244,241,234,0.32);
    text-align:center; line-height:1.6;
  }

  /* ============ APP SHELL ============ */
  .app{
    height:100vh; display:flex; flex-direction:column;
    opacity:0; transition:opacity .7s ease .15s;
  }
  .app.live{opacity:1;}

  /* top bar */
  .topbar{
    flex-shrink:0; height:60px;
    display:flex; align-items:center; gap:18px;
    padding:0 22px;
    border-bottom:1px solid rgba(244,241,234,0.10);
    background:rgba(14,14,14,0.6);
  }
  .tb-mark{
    display:flex; flex-direction:column; line-height:1;
    border:1px solid rgba(244,241,234,0.5); flex-shrink:0;
  }
  .tb-mark span{
    font-family:'Archivo',sans-serif; font-size:9px; letter-spacing:2px;
    padding:3px 8px;
  }
  .tb-mark .a{font-weight:900;}
  .tb-mark .b{font-weight:300;border-top:.5px solid rgba(244,241,234,0.4);}
  /* Internal logo image — replaces the CSS-drawn stacked text mark in topbar. */
  .tb-mark-img {
    display: block; height: 40px; width: auto;
    flex-shrink: 0; user-select: none;
  }
  .tb-name{
    font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:3px; color:rgba(244,241,234,0.55);
  }
  .tb-spacer{flex:1;}
  .module-select{
    position:relative;
  }
  .module-select select{
    appearance:none; -webkit-appearance:none;
    background:var(--black2); color:var(--bone);
    border:1px solid rgba(244,241,234,0.20);
    padding:9px 38px 9px 14px;
    font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:1.5px; cursor:pointer; outline:none;
    transition:border-color .2s;
  }
  .module-select select:hover{border-color:var(--orange);}
  .module-select::after{
    content:"\25BC"; position:absolute; right:13px; top:50%;
    transform:translateY(-50%); font-size:8px; color:var(--orange);
    pointer-events:none;
  }
  .signout{
    background:none; border:1px solid rgba(244,241,234,0.18);
    color:rgba(244,241,234,0.6); cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-size:9px;
    letter-spacing:2px; padding:8px 12px; transition:all .18s;
  }
  .signout:hover{border-color:var(--orange); color:var(--orange);}

  /* Back-to-hub link — sits next to the sign-out button */
  .back-hub{
    background:none; border:1px solid rgba(244,241,234,0.18);
    color:rgba(244,241,234,0.6); cursor:pointer; text-decoration:none;
    font-family:'JetBrains Mono',monospace; font-size:9px;
    letter-spacing:2px; padding:8px 12px; transition:all .18s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .back-hub:hover{border-color:var(--orange); color:var(--orange);}
  .back-hub .arr{font-size:11px; line-height:1;}

  /* main reading area */
  .reading{
    flex:1; display:flex; align-items:center; justify-content:center;
    gap:34px; padding:24px 40px; min-height:0;
  }

  /* binder spine + rings */
  .spine{
    flex-shrink:0; width:64px;
    background:linear-gradient(100deg,var(--blue-d),var(--blue) 55%,var(--blue-d));
    border:1px solid rgba(244,241,234,0.12);
    border-radius:5px 2px 2px 5px;
    box-shadow:inset -8px 0 18px rgba(0,0,0,0.45), 0 18px 40px rgba(0,0,0,0.5);
    position:relative;
  }
  .spine::before{
    content:""; position:absolute; inset:6px 8px;
    border:1px dashed rgba(159,197,231,0.30);
  }
  .ring{
    position:absolute; right:-30px; width:60px; height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,#f0f0f3 0%,#b6b6be 38%,#5c5c64 62%,#d2d2d9 100%);
    box-shadow:inset 0 3px 4px rgba(255,255,255,0.7),
               inset 0 -4px 7px rgba(0,0,0,0.55),
               0 5px 10px rgba(0,0,0,0.55);
    z-index:6;
  }
  .ring::before{
    content:""; position:absolute; inset:19px;
    border-radius:50%;
    background:var(--black);
    box-shadow:inset 0 3px 6px rgba(0,0,0,0.85);
  }
  .ring.r1{top:20%;} .ring.r2{top:50%;margin-top:-30px;} .ring.r3{bottom:20%;}

  /* page flip stage */
  .stage-wrap{position:relative;}
  .stage{
    width:816px; height:1056px;
    transform:scale(var(--scale));
    transform-origin:top left;
    perspective:2400px;
  }
  .leaf-area{
    position:relative; width:816px; height:1056px;
    transform-style:preserve-3d;
  }
  .page-shadow{
    position:absolute; inset:0;
    box-shadow:0 38px 80px rgba(0,0,0,0.62);
    z-index:0;
  }
  .leaf{
    position:absolute; inset:0;
    transform-origin:left center;
    transform:rotateY(0deg);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    transition:transform .72s cubic-bezier(.45,.05,.25,1);
  }
  .leaf iframe{
    width:816px; height:1056px; border:0; display:block;
    background:#ffffff;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }
  .leaf-shade{
    position:absolute; inset:0; pointer-events:none; opacity:0;
    background:linear-gradient(90deg,rgba(0,0,0,0.55),rgba(0,0,0,0) 42%);
  }
  @keyframes flipShadeFwd{0%{opacity:0}48%{opacity:.5}100%{opacity:0}}
  .leaf.flipping .leaf-shade{animation:flipShadeFwd .72s cubic-bezier(.45,.05,.25,1);}

  /* "coming soon" panel for locked modules */
  .locked{
    width:816px; height:1056px;
    transform:scale(var(--scale)); transform-origin:top left;
    display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    background:var(--black2); border:1px solid rgba(244,241,234,0.12);
    text-align:center;
  }
  .locked .lk-tag{
    font-family:'JetBrains Mono',monospace; font-size:12px;
    font-weight:700; letter-spacing:3px; color:var(--orange);
  }
  .locked .lk-title{
    font-family:'Archivo',sans-serif; font-weight:900; font-size:44px;
    letter-spacing:1px;
  }
  .locked .lk-sub{font-size:13px; color:rgba(244,241,234,0.5);}

  /* notes panel */
  .notes{
    flex-shrink:0; width:414px;
    display:flex; flex-direction:column;
    background:#FBF7EA;
    border:1px solid rgba(0,0,0,0.25);
    box-shadow:0 24px 56px rgba(0,0,0,0.5);
  }
  .notes-head{
    flex-shrink:0; padding:13px 18px 11px;
    background:var(--blue-d);
    border-bottom:2px solid var(--orange);
  }
  .notes-head .nh-label{
    font-family:'JetBrains Mono',monospace; font-size:9px;
    font-weight:700; letter-spacing:3px; color:var(--orange);
  }
  .notes-head .nh-mod{
    font-family:'Archivo',sans-serif; font-weight:900; font-size:16px;
    letter-spacing:.5px; color:var(--bone); margin-top:3px;
  }
  .notes-paper{position:relative; flex:1; min-height:0;}
  .notes-paper::before{
    content:""; position:absolute; top:0; bottom:0; left:42px;
    width:2px; background:rgba(212,100,30,0.45); z-index:2;
  }
  .notes textarea{
    position:absolute; inset:0; width:100%; height:100%;
    border:0; outline:none; resize:none;
    background:repeating-linear-gradient(
      #FBF7EA, #FBF7EA 29px,
      rgba(27,58,92,0.22) 29px, rgba(27,58,92,0.22) 30px);
    font-family:'Inter',sans-serif; font-size:13px;
    line-height:30px; color:#1a1a1a;
    padding:8px 18px 18px 56px;
  }
  .notes textarea::placeholder{color:rgba(14,14,14,0.30);}
  .notes-foot{
    flex-shrink:0; padding:8px 16px;
    border-top:1px solid rgba(0,0,0,0.15);
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono',monospace; font-size:9px;
    letter-spacing:1.5px; color:rgba(14,14,14,0.45);
  }
  .save-state{color:var(--blue);}
  .save-state.saved{color:#2d7d3f;}

  /* bottom nav */
  .navbar{
    flex-shrink:0; height:70px;
    display:flex; align-items:center; justify-content:center; gap:22px;
    border-top:1px solid rgba(244,241,234,0.10);
    background:rgba(14,14,14,0.6);
  }
  .nav-btn{
    display:flex; align-items:center; gap:9px;
    background:var(--black2); color:var(--bone);
    border:1px solid rgba(244,241,234,0.20);
    padding:11px 20px; cursor:pointer;
    font-family:'JetBrains Mono',monospace; font-weight:700;
    font-size:10px; letter-spacing:2px;
    transition:all .16s ease;
  }
  .nav-btn:hover:not(:disabled){
    border-color:var(--orange); color:var(--orange);
  }
  .nav-btn:active:not(:disabled){transform:scale(.97);}
  .nav-btn:disabled{opacity:.28; cursor:default;}
  .nav-btn .arw{font-size:13px;}
  .counter{
    font-family:'JetBrains Mono',monospace; font-size:12px;
    letter-spacing:2px; color:rgba(244,241,234,0.7);
    min-width:120px; text-align:center;
  }
  .counter b{color:var(--orange); font-weight:700;}
</style>
</head>
<body>

<!-- ============ LOGIN GATE ============ -->
<div class="gate" id="gate">
  <div class="gate-card">
    <img class="gate-mark-img" src="bb-logo-internal.png" alt="Backstage Blueprint">
    <div class="gate-tag">— COURSE LIBRARY —</div>
    <div class="gate-title">THE BINDER</div>
    <div class="gate-sub">Sign in to open your course modules.</div>
    <form id="gateForm">
      <div class="field">
        <label>EMAIL</label>
        <input type="email" id="gEmail" placeholder="you@example.com" autocomplete="off">
      </div>
      <div class="field">
        <label>ACCESS CODE</label>
        <input type="password" id="gCode" placeholder="••••••••" autocomplete="off">
      </div>
      <button type="submit" class="gate-btn">OPEN THE BINDER</button>
    </form>
    <div class="gate-note">PROTOTYPE · ANY CREDENTIALS WILL OPEN THE BINDER</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">

  <div class="topbar">
    <img class="tb-mark-img" src="bb-logo-internal.png" alt="Backstage Blueprint">
    <div class="tb-name">THE&nbsp;BINDER</div>
    <div class="tb-spacer"></div>
    <div class="module-select">
      <select id="moduleSelect"></select>
    </div>
    <a class="back-hub" href="members.html" aria-label="Back to Members Hub"><span class="arr">&larr;</span> MEMBERS HUB</a>
    <button class="signout" id="signout">SIGN OUT</button>
  </div>

  <div class="reading">
    <div class="spine" id="spine">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
    </div>

    <div class="stage-wrap" id="stageWrap">
      <div class="stage" id="stage">
        <div class="leaf-area">
          <div class="page-shadow"></div>
          <div class="leaf" id="leaf1"><div class="leaf-shade"></div><iframe id="ifr1" scrolling="no"></iframe></div>
          <div class="leaf" id="leaf2"><div class="leaf-shade"></div><iframe id="ifr2" scrolling="no"></iframe></div>
        </div>
      </div>
      <div class="locked" id="locked">
        <div class="lk-tag">— LOCKED —</div>
        <div class="lk-title" id="lkTitle">MODULE</div>
        <div class="lk-sub">This module isn't loaded into the binder yet.</div>
      </div>
    </div>

    <div class="notes">
      <div class="notes-head">
        <div class="nh-label">— NOTES —</div>
        <div class="nh-mod" id="notesMod">Module</div>
      </div>
      <div class="notes-paper">
        <textarea id="notesArea" placeholder="Your notes for this module&hellip;" spellcheck="true"></textarea>
      </div>
      <div class="notes-foot">
        <span>SAVED ON THIS DEVICE</span>
        <span class="save-state" id="saveState">READY</span>
      </div>
    </div>
  </div>

  <div class="navbar">
    <button class="nav-btn" id="prevBtn"><span class="arw">&#8249;</span> PREV</button>
    <div class="counter" id="counter">PG <b>01</b> / 01</div>
    <button class="nav-btn" id="nextBtn">NEXT <span class="arw">&#8250;</span></button>
  </div>

</div>

<!-- ============ MODULE SOURCE (raw, non-executed) ============ -->
<script type="text/html" id="mod-100">
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BB — Before We Begin (Preface)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black:  #0E0E0E;
    --black2: #141414;
    --blue:   #1B3A5C;
    --blue-d: #122947;
    --blue-l: #9FC5E7;
    --bone:   #F4F1EA;
    --orange: #D4641E;
    --page-w: 816px;
    --page-h: 1056px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { size: letter; margin: 0; }
  html, body { background: #1a1a1a; }
  body {
    color: var(--bone);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 30px 0 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .format-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(244,241,234,0.35);
    text-align: center;
    padding: 0 0 14px;
  }
  .page-wrapper {
    width: var(--page-w);
    height: var(--page-h);
    background: var(--black);
    border: 0.5px solid rgba(244,241,234,0.15);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin-top: 32px;
  }
  .page-wrapper:first-of-type { margin-top: 0; }

  /* HEADER */
  .page-header {
    padding: 10px 36px;
    border-bottom: 2px solid var(--orange);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .tb-mark { display: inline-block; border: 1px solid rgba(244,241,234,0.55); color: var(--bone); flex-shrink: 0; }
  .tb-mark .hrow, .tb-mark .frow { display: flex; justify-content: space-between; padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 6px; letter-spacing: 1.5px; gap: 8px; }
  .tb-mark .hrow { border-bottom: 0.5px solid rgba(244,241,234,0.4); opacity: 0.7; }
  .tb-mark .frow { border-top: 0.5px solid rgba(244,241,234,0.4); opacity: 0.5; }
  .tb-mark .body { padding: 3px 8px 4px; }
  .tb-mark .top { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 900; letter-spacing: 2px; line-height: 1; }
  .tb-mark .bot { font-family: 'Archivo', sans-serif; font-size: 9px; font-weight: 300; letter-spacing: 2px; line-height: 1; margin-top: 2px; }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); line-height: 1.6; }
  .doc-stamp { text-align: right; flex-shrink: 0; }
  .doc-stamp .doc-num { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-bottom: 2px; }
  .doc-stamp .doc-rev { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--orange); border-bottom: 1px solid var(--orange); padding-bottom: 1px; }
  .doc-stamp .pg-num { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-top: 2px; line-height: 1.4; }
  .doc-stamp .pg-num .pg-of { margin-left: 2px; }

  /* ============================================ */
  /* PAGE 1 — COVER (BLUEPRINT SCHEMATIC STYLE)   */
  /* ============================================ */
  .cover-page {
    background: var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.18) 1px, transparent 1px);
    background-size: 22px 22px;
  }
  .cover-page .page-header {
    background: var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px);
    background-size: 22px 22px;
    border-bottom: 2px solid var(--orange);
  }
  .cover-canvas {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cover-eyebrow {
    padding: 26px 50px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;

  <div class="body-area">
    <div class="module-tag">— BEFORE WE BEGIN / PG 02 —</div>
    <div class="page-title">WELCOME.</div>
    <div class="page-sub">A few things to know before you dig in.</div>

    <p class="para">These pages weren&rsquo;t in the original plan, but as we kept building, we realized the value of the context we can provide you in stepping into this. Touring is definitely not a one-size-fits-all scenario, so taking a beat to make a plan before we talk about the plans is always a good plan.</p>

    <p class="para">Before we jump in, I&rsquo;d be remiss if I didn&rsquo;t take a moment to say <strong>thank you for being here</strong> and working through the Backstage Blueprint course. The intent behind putting together Backstage Blueprint was to spark conversation, community, and extend a hand to the people stepping up and trying to navigate the live production and touring industry. These systems have worked well for us, and personally I&rsquo;ve been able to apply them to many areas within my workflows. Of course, we love hearing how you&rsquo;re currently running your teams and crews if you&rsquo;re actively in the industry. We want this to be an open conversation. Reach out, send an email, hit us in the DMs. Let&rsquo;s connect.</p>

    <div class="sec-head">A Few Housekeeping Items</div>

    <p class="para">As you move through this, the first thing I want to point your attention toward is that you also have, along with the modules, a package of <strong>templates, tools, and a dictionary</strong>. Anytime there&rsquo;s a mention throughout a module that aligns with one of those templates or tools, you&rsquo;ll see an icon along with a brief description. Each one should be fairly self-contained in explaining its function.</p>

    <div class="icon-legend">
      <div class="il-cell binder">
        <span class="il-icon">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.4" stroke-linejoin="miter">

            <rect x="4" y="5" width="11" height="14"/>

            <line x1="4" y1="17" x2="9" y2="17"/>
          </svg>
        </span>
        <div class="il-text">
          <div class="il-label">— FROM THE BINDER —</div>
          <div class="il-name">Template</div>
        </div>
      </div>

      <div class="il-cell toolkit">
        <span class="il-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

            <path d="M14.2 4.2 l3.6 -3.6 4 4 -3.6 3.6 z" transform="translate(0.2 0.2)"/>
          </svg>
        </span>
        <div class="il-text">
          <div class="il-label">— FROM THE TOOLKIT —</div>
          <div class="il-name">Tool</div>
        </div>
      </div>
    </div>

    <p class="para">You&rsquo;ve also been given the <strong>Backstage Blueprint Production Dictionary</strong>. To some, it&rsquo;ll just look like a book of random words &mdash; but if you&rsquo;ve spent any time in this world, you know that words like <em>doors</em>, <em>load</em>, <em>advance</em>, or <em>runner</em> mean something completely different inside production than they do outside it. The dictionary decodes all the wild terminology, acronyms, and shop-talk that gets thrown around on a tour. To someone who hasn&rsquo;t lived it, that vocabulary sounds like a foreign language. We wanted to make sure no one gets left out.</p>

    <div class="sec-head">A Note on the Tech</div>

    <p class="para"><strong>One thing you may notice as we move through the course is that there&rsquo;s not too much tech talk.</strong> For as much as this production and touring industry is built around gear and equipment, we&rsquo;ve found as we were building these modules out that the gear isn&rsquo;t the whole story. The systems and workflows in this course are designed to give you a clear road map that sits underneath any production &mdash; no matter what the gear is, what the lighting looks like, or what the tech package includes, these systems can serve as the foundation that keeps it all moving.</p>

    <p class="para">In the near future, one of our goals is to write modules dedicated to more specific, honed-in roles within a tour. There are countless thoughts on how cool that could be. We&rsquo;ll get there. For now, we&rsquo;re casting a wide net and starting with a comprehensive view on the approach, workflows, and systems that help with live touring and production.</p>

    <div class="page-title">TOURS COME IN<br>ALL SHAPES.</div>
    <div class="page-sub">A wide net &mdash; and a few last things before we get going.</div>

    <p class="para">Building this out with a model that fits everyone individually would be like writing a tour book for every tour that ever rolled. The goal here was to build framing and systems that translate into most elements of the live and touring space. Some of the contexts these tools and systems can help you in directly:</p>

    <div class="context-list">
      <div class="cl-cell">Van Tours</div>
      <div class="cl-cell">Nashville Touring</div>
      <div class="cl-cell">Routed Tours · Club Level</div>
      <div class="cl-cell">Routed Tours · Arena Level</div>
      <div class="cl-cell">Fly Dates</div>
      <div class="cl-cell">International Touring</div>
      <div class="cl-cell">Press &amp; Promo Events</div>
      <div class="cl-cell">Rehearsals</div>
    </div>

    <p class="para">From the start, <strong>Backstage Blueprint was built to give a view behind the curtain</strong> &mdash; a glimpse into the systems that run the unseen parts of the tours, shows, and festivals that travel around the world. With a particular target: we set out to help the up-and-coming artists and teams stepping into their first tour, their first festival slot, or just starting to scale up. That&rsquo;s really where we built a lot of this package toward. No matter where you are in the production world &mdash; touring, festivals, one-off shows, or just getting started and trying to figure out where you wind up &mdash; we&rsquo;re here to help and provide systems of approach that have been tested and have worked for us.</p>

    <p class="para">In these modules you&rsquo;re going to find a lot of useful information. But if you have any questions, or if you need a more honed-in examination of your dynamic or your scenario in particular, <strong>please reach out</strong>. Send us an email or hit us on social media. We can chat, set up a call, or get boots on the ground and really partner with you.</p>

    <div class="cta-block">
      <div class="cta-label">— IF YOU&apos;RE JUST GETTING STARTED —</div>
      <div class="cta-text">
        If you&rsquo;re just stepping into this and curious about the live production field &mdash; wanting to learn and find resources &mdash; <strong>I commend you</strong>. It&rsquo;s a tough industry to really learn. My biggest encouragement is to find a local production company in your area, jump in, and get involved. Even if it&rsquo;s not strictly live touring or concerts, getting plugged into your local live events market is one of the best ways to learn and gain applicable experience.
      </div>
    </div>

    <div class="cta-block">
      <div class="cta-label">— IF YOU&apos;RE AN ARTIST OR ARTIST REPRESENTATION —</div>
      <div class="cta-text">
        If you&rsquo;re cautiously navigating some of these aspects for your artist, please look into the resources we name and provide throughout this course for getting connected with verified and trusted industry pros. A <strong>Backstage Blueprint Partner</strong> is also a great resource &mdash; we love helping build an approach and finding a system that works best for your needs. Our network of partners has a real pool of talent that can help be a voice and a guide through the many options and outcomes along the way.
      </div>
    </div>

    <div class="cta-block">
      <div class="cta-label">— IF YOU&apos;RE IN THE WORK —</div>
      <div class="cta-text">
        If you&rsquo;re actively in the industry and want to compare notes &mdash; we want to hear it. Send an email, hit us in the DMs, drop a comment. The whole reason we built Backstage Blueprint was to keep the conversation open. <strong>Let&rsquo;s connect.</strong>
      </div>
    </div>

      <div class="letter-title">Before we<br>get started.</div>

      <div class="letter-body">
        <p>A massive thank you for making it here, and for believing in this system enough to take the time. Sitting down and spelling this out was a cause for reflection — a chance to step back from a fast-paced industry that rarely lets you do exactly that.</p>

        <p>In writing these modules, I've found my own approach shifting, opening up, leaning further into the collaboration this work is built on. That's the real goal of Backstage Blueprint: that we can all understand and learn what truly causes an experience to happen — the moments and movements that transcend what any one of us could pull off alone.</p>

        <p>Whether you're a seasoned veteran of the road or these are your first steps into touring and production, I'm honored you're here. My hope is that this becomes a moment we can all use to inspect, refine, and collaborate on the larger-than-life projects we get to be a part of in this industry.</p>

        <p>I know that sounds like a tall order. But I've had moments where I've been amazed at the impact a small, focused crew can pull off in creating a show. With that outlook — let's get started.</p>
      </div>

  <div class="body-area">
    <div class="module-tag">— 01 / WHERE TO START —</div>
    <div class="page-title">WHERE TO<br>START</div>
    <div class="page-sub">The fly-by before we go in for the close-up.</div>

    <p class="para">Before any of the work makes sense, you need the shape of the thing in your head. A tour is a logistics machine wrapped around a creative product. The show is the reason it exists. Everything else — the contracts, the riders, the day sheets, the settlement statements — exists to make sure the show happens, makes money, and keeps happening tomorrow in a different city.</p>

    <p class="para">This module is the wide shot. Eight stops, one per page, each previewing a full module that comes later. <strong>Veterans</strong>, you'll recognize the terrain — treat this as the framework you can hand to someone you're bringing up. <strong>Newcomers</strong>, you'll meet every word on the road eventually. <strong>Artists and artist representation</strong>, this is a detailed look under the hood of the systems and roles that support a show — pick up tips at any scale, whether you're figuring things out as a small operation or holding a growing team to a standard as you scale. The goal here is that none of these terms feel foreign when they show up.</p>

    <div class="pull-quote">
      <p>You don't need to memorize this module. You need to feel the shape of it — so when the next seven modules drop you into the deep end, you already know which pool you're in.</p>
    </div>

    <p class="para">A useful frame — one most production offices live by, even if nobody writes it on the wall. Every document, every meeting, every conversation on the road is answering one of three questions:</p>

    <div class="three-q">
      <div class="q">
        <div class="q-num">— 01 —</div>
        <div class="q-text">What do<br>we need?</div>
      </div>
      <div class="q">
        <div class="q-num">— 02 —</div>
        <div class="q-text">What are we doing<br>right now?</div>
      </div>
      <div class="q">
        <div class="q-num">— 03 —</div>
        <div class="q-text">What just<br>happened?</div>
      </div>
    </div>

    <p class="para">The advance answers question one. The day sheet answers question two. Settlement answers question three. Hold on to that triangle. Most of what follows is just learning which document answers which question, and how to fill it out so the next person doesn't have to ask.</p>

    <div class="sec-head">A note on tools</div>
    <p class="para">Many big tours run on a dedicated tour management platform — Master Tour, Day Sheets, or similar apps purpose-built for the road. Mid-size and indie tours often run on a shared drive, a group chat, and a stack of spreadsheets that someone smart built three tours ago. None of these tools are the system — the system is the work. Pick the one that disappears into the background.</p>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">The Production Dictionary</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>

        </div>
      </div>
      <p class="bc-text-dark">The <strong>Production Dictionary</strong> is the A-to-Z companion to this course — every touring term, defined in plain working language. Hit a word you don&rsquo;t know on any page, in any module: that&rsquo;s where it lives. Pinned to DOC-300.</p>

  <div class="page-header">

    <div class="doc-stamp">

  <div class="body-area">
    <span class="preview-stamp">— MODULE 02 / PREVIEW —</span>
    <div class="page-title">THE DEAL &amp;<br>THE DESIGN</div>
    <div class="page-sub">The contract sets the terms. The vision sets the show.</div>

    <p class="para">Before there is a tour, there is a deal. An agent takes the artist's calendar and routes the run — calling promoters in each market, fielding offers, lining up dates. The promoter offers a guarantee, a door deal, or some hybrid. Representation signs off. A contract gets issued, and attached to it is the rider.</p>

    <p class="para">That contract plus rider is the founding document of every show. Everything downstream — the advance, the day of show, the settlement — is just executing what those pages already said.</p>

    <div class="pull-quote">
      <p>When the venue says "we're not providing that," you don't argue from feelings. You argue from the contract. The rider is the source of truth.</p>
    </div>

    <div class="sec-head">Start with the artist's vision</div>
    <p class="para">The deal sets the route. The <strong>artist is the origin of what the show should feel like</strong> — and that comes first. Before a rig gets spec'd or a truck pack gets priced, take a moment to make sure the systems being built to carry the tour are supporting an overall vision that starts at the artist's intent. The brief from that origin is tangible — the emotional intent, the reference moments, the non-negotiables not to compromise on, and the flex points where the design can scale up or down with budget, venue, or routing.</p>

    <p class="para">Clear and careful details around the artist's intent are the design's North Star. Every tactical decision after it gets measured against the same question — <em>does it serve what the artist is trying to build, or does it dilute it?</em></p>

    <div class="sec-head">Then scale it to the route</div>
    <p class="para">Once the vision is locked, the design has to fit the road. A theater run, an amphitheater run, a festival-scale package — each one calls for a different rig, a different truck count, a different crew size. Designing the tour means scaling the package to the average venue across the route, not the largest and not the smallest. Get this right and the tour breathes. Get it wrong and the result is either over-building for rooms that can't hold it, or under-building and lighting the show with whatever the venue has on the floor.</p>

    <div class="sec-head">What the full module covers</div>
    <ul class="topics">
      <li>Pulling the artist's vision — emotional intent, references, non-negotiables, flex points</li>
      <li>How offers get made and what's actually in a deal</li>
      <li>Reading a contract and rider like a working document, not a legal one</li>
      <li>Designing the production package to fit the route — sizing rig, truck count, and crew</li>
      <li>How venue size, market, and production load all talk to each other</li>
    </ul>

    </div>
  </div>

<!-- PAGE 4 — MODULE 03 PREVIEW: TOUR BUDGET       -->
<!-- ============================================ -->
<div class="page-wrapper page2">
  <div class="page-header">
    <div class="header-left">
      <div class="tb-mark">
        <div class="hrow"><span>DOC-101</span><span>EST. 2026</span></div>

    <div class="doc-stamp">

    </div>
  </div>

  <div class="body-area">
    <span class="preview-stamp">— MODULE 03 / PREVIEW —</span>
    <div class="page-title">BUILDING<br>YOUR BUDGET</div>
    <div class="page-sub">The number that decides whether the tour is real.</div>

    <p class="para">Every tour has two budgets. The one you put on paper before the run, and the one that actually plays out across sixty cities. The job is to make those two numbers look as much alike as possible.</p>

    <p class="para">A working tour budget starts with the route, the design, and the deal — and turns them into a stack of line items. Trucks. Buses. Hotels. Crew. Backline. Production. Per diems. Insurance. Visas, if you're crossing borders. Catering buyouts on the days you can't feed people in-house. Then you compare that stack against the income side — guarantees, splits, sponsor money if it exists, merch — and you find out whether the tour is a tour or a hobby.</p>

    <div class="pull-quote">
      <p>A budget isn't a prediction. It's a position. It tells you where you can absorb a hit and where you can't.</p>
    </div>

    <div class="sec-head">The line items first-timers miss</div>
    <p class="para">There's a production fee floor at every scale of touring. A real number, from someone who's done it — not an estimate. Day-off costs (bus, hotels, per diems on non-show days) often run a quarter to a third of the total tour cost, and they get under-counted by anyone budgeting only against show days. Insurance and bonding sneak up — most venues won't release the contract without a current Certificate of Insurance, and they want to be named on it. Local labor multipliers vary by market and union jurisdiction, and they can swing a budget by tens of thousands across a run.</p>

    <div class="sec-head">What moves and what doesn't</div>
    <p class="para">Some line items lock the day you sign. Others swing weekly — fuel, freight, hotel rates by city, crew availability. Knowing which numbers are fixed and which can move is the difference between a budget you can defend and one that gets eaten alive on the road. The work in this module is the unglamorous part: gauging the market, gathering quotes, stress-testing assumptions, building cushion.</p>

    <div class="sec-head">What the full module covers</div>
    <ul class="topics">
      <li>Gauging market rates and getting honest quotes</li>
      <li>Production fee floor, day-off costs, insurance and COI requirements</li>
      <li>Local labor multipliers and how to model them across a route</li>
      <li>Income vs. expense — how the tour P&amp;L actually works</li>
      <li>The difference between a paper budget and a road budget</li>
    </ul>

    <div class="next-up">
      <span>MODULE 03 OF 08</span>
      <span class="arrow">— BUILDING YOUR BUDGET →</span>
    </div>
  </div>
</div>

    <div class="page-title">THE<br>ADVANCE</div>
    <div class="page-sub">The four to eight weeks where the show actually gets built.</div>

    <p class="para">If the deal is the contract and the design is the package, the advance is where they meet the building. Four to eight weeks before show day, the production manager works each city one by one — phone, email, shared docs — reconciling three things: what the rider asks for, what the venue can provide, and what the show actually needs that night.</p>

    <p class="para">This is where surprises die. Done well, an advance means nothing on show day catches you off guard. The venue knows your power, your stage dimensions, your rigging points, your bus parking, your dressing room count, and your meal times. You know their house specs, their crew call, their settlement contact, and the door at the back of the building you're loading through.</p>

    <div class="pull-quote">
      <p>Anything you don't advance, the venue gets to decide for you. And they will decide based on what's easiest for them, not what's right for the show.</p>
    </div>

    <div class="sec-head">The six buckets of an advance call</div>
    <ul class="topics">
      <li><strong>Schedule</strong> — load-in, sound check, doors, set times, curfew, load-out</li>
      <li><strong>Tech</strong> — PA, console, lighting, power, stage, rigging, dressing rooms</li>
      <li><strong>Hospitality</strong> — catering counts, dietary, dressing room riders, green room</li>
      <li><strong>Crew &amp; Labor</strong> — local hands, stagehands, loaders, runners, security</li>
      <li><strong>Logistics</strong> — bus parking, truck loading, shore power, nearest hotel and hospital</li>
      <li><strong>Settlement</strong> — time, contact, deductions, format</li>
    </ul>

    <p class="para">Every advance ends with one document: a show advance packet for that specific city, distilled to a few pages so the day reads at a glance.</p>

    <div class="page-title">THE DAY<br>OF SHOW</div>
    <div class="page-sub">One page tells everyone what's happening. That page runs the day.</div>

    <p class="para">Show day is a sequence. Bus arrival, load-in, set up, line check, sound check, catering, doors, opener, headliner, encore, merch, load-out, settlement, bus call. The order rarely changes. The times change every day, and that's why the day sheet exists.</p>

    <p class="para">The day sheet is the single most important piece of paper on the road. One page, given to everyone on the tour, that says when you arrive, when you eat, when you load in, when you check, when doors open, when you go on, and when the bus rolls. If the day sheet is wrong, the day is wrong.</p>

    <div class="pull-quote">
      <p>You can advance perfectly, design beautifully, and budget tight — and still lose the day if the day sheet has yesterday's load-in time on it.</p>
    </div>

    <div class="sec-head">The rhythm of a show day</div>
    <ul class="topics">
      <li><strong>Pre-load</strong> — personal time, parking, schedule, hotel rooms for the driver</li>
      <li><strong>Arrival</strong> — runner connect, walkthrough with venue and crew</li>
      <li><strong>Setup</strong> — load in, production office, signage, look-ahead on tomorrow</li>
      <li><strong>Pre-doors</strong> — sound check, VIP, guest list, dinner</li>
      <li><strong>Doors &amp; Show</strong> — pre-show routine, doors, set, settlement</li>
      <li><strong>Out</strong> — load-out, road report, bus call</li>
    </ul>

    <p class="para">The full module walks the day end to end — what each block needs from you, what hands off to the next block, and what falls apart when one of them slips.</p>

    <p class="para">Security is one part of that layer, and an important one. <em>The local team are the security experts.</em> Often the best approach is to give them the picture, lead with their expertise, and leave the meeting with their cell number on hand. But the module covers more than the security conversation — it covers credentials, routing, infrastructure, and what happens when something goes sideways.</p>

    <div class="page-title">THINGS THAT<br>SURPRISE PEOPLE</div>
    <div class="page-sub">A few things nobody tells you on day one.</div>

    <p class="para">Some of this lands harder once you've actually done it. But knowing it ahead of time means you'll catch yourself when it shows up.</p>

    <div class="sec-head">The rider is a negotiation document, not a wish list</div>
    <p class="para">What's printed in the rider is the opening position. What actually shows up in the dressing room is the result of the advance. Don't be surprised when the venue can't deliver every line — be ready to triage what matters and let go of what doesn't.</p>

    <div class="sec-head">Festival days run on the festival's clock</div>
    <p class="para">A headline date is your show. A festival date is somebody else's. You get a stage manager, a thirty-to-forty-five-minute changeover, a fixed set length, and a whole different document set. You fit into their system, not the other way around.</p>

    <div class="sec-head">Fly dates are their own animal</div>
    <p class="para">When the band flies in instead of busing, half the tour stack changes. Backline gets rented in market. Local crew gets called. Hotels move closer to the airport. Schedules tighten. The deal doesn't change but the operation does — and the planning happens in a different rhythm.</p>

    <div class="sec-head">PM and TM are two jobs</div>
    <p class="para">At club and theater scale, one person often wears both hats. At the upper end, they split. The production manager owns the show — the rig, the stage, the load-in, the technical day. The tour manager owns the people and the money. When they're the same person, the day is twice as long.</p>

    }
    ifr1.onload=done; ifr2.onload=done;
    ifr1.srcdoc=html; ifr2.srcdoc=html;
  }

  function countPages(ifr){
    try{ return ifr.contentDocument.querySelectorAll('.page-wrapper').length; }
    catch(e){ return 1; }
  }
  function showPage(ifr,idx){
    try{
      var pages=ifr.contentDocument.querySelectorAll('.page-wrapper');
      for(var i=0;i<pages.length;i++){
        pages[i].style.display=(i===idx)?'':'none';
      }
    }catch(e){}
  }
  function applyStack(){
    frontLeaf.style.zIndex=2; backLeaf.style.zIndex=1;
  }

  /* ---- page flip ---- */
  function flipNext(){
    if(busy||!currentModule||!currentModule.available) return;
    if(currentPage>=pageCount-1) return;
    busy=true;
    showPage(backIfr,currentPage+1);
    backLeaf.style.transition='none';
    backLeaf.style.transform='rotateY(0deg)';
    backLeaf.style.zIndex=1;
    frontLeaf.style.zIndex=2;
    void frontLeaf.offsetWidth;
    frontLeaf.classList.add('flipping');
    frontLeaf.style.transition='';
    frontLeaf.style.transform='rotateY(-180deg)';
    var moved=frontLeaf;
    setTimeout(function(){
      moved.classList.remove('flipping');
      var t=frontLeaf; frontLeaf=backLeaf; backLeaf=t;
      var ti=frontIfr; frontIfr=backIfr; backIfr=ti;
      backLeaf.style.transition='none';
      backLeaf.style.transform='rotateY(0deg)';
      applyStack();
      currentPage++;
      busy=false;
      updateNav();
    },730);
  }
  function flipPrev(){
    if(busy||!currentModule||!currentModule.available) return;
    if(currentPage<=0) return;
    busy=true;
    showPage(backIfr,currentPage-1);
    backLeaf.style.transition='none';
    backLeaf.style.transform='rotateY(-180deg)';
    backLeaf.style.zIndex=3;
    void backLeaf.offsetWidth;
    backLeaf.classList.add('flipping');
    backLeaf.style.transition='';
    backLeaf.style.transform='rotateY(0deg)';
    var moved=backLeaf;
    setTimeout(function(){
      moved.classList.remove('flipping');
      var t=frontLeaf; frontLeaf=backLeaf; backLeaf=t;
      var ti=frontIfr; frontIfr=backIfr; backIfr=ti;
      backLeaf.style.transition='none';
      backLeaf.style.transform='rotateY(0deg)';
      applyStack();
      currentPage--;
      busy=false;
      updateNav();
    },730);
  }

  /* ---- nav ---- */
  function updateNav(){
    var avail=currentModule&&currentModule.available;
    var pc=avail?pageCount:0;
    var human=avail?(currentPage+1):0;
    counter.innerHTML='PG <b>'+pad(human)+'</b> / '+pad(pc);
    prevBtn.disabled=!avail||currentPage<=0;
    nextBtn.disabled=!avail||currentPage>=pageCount-1;
  }
  function pad(n){ return (n<10?'0':'')+n; }

  prevBtn.addEventListener('click',flipPrev);
  nextBtn.addEventListener('click',flipNext);
  document.addEventListener('keydown',function(e){
    if(gate.classList.contains('hidden')==false) return;
    if (/INPUT|TEXTAREA/i.test((e.target && e.target.tagName) || '')) return;
    if (e.key === 'ArrowLeft' || e.keyCode === 37) flipPrev();
    else if (e.key === 'ArrowRight' || e.keyCode === 39) flipNext();
  });

})();
</script>
