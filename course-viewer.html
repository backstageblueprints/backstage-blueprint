    <div class="module-tag">— DOC-109 / CLOSING —</div>
    <div class="page-title">NOW, THE <span class="accent">CLOSE.</span></div>

    <p class="para" style="margin-top: 12px;"><strong>Eight modules.</strong> From the first deal to the final receipt. If you&rsquo;ve made it here, you&rsquo;ve walked the whole shape of a tour. That&rsquo;s a lot of pages. Thank you for spending the time with them.</p>

    <p class="para">One of the main reasons we built Backstage Blueprint is to have a collective way to support the people and teams doing this work out in the field &mdash; so the lessons don&rsquo;t have to stop here. Try these systems on your next advance, your next budget, your next day of show. Even just a few pieces. As you integrate some of these workflows and templates, let us know how it&rsquo;s working for you. <strong>We&rsquo;re constantly searching for what &ldquo;good&rdquo; or &ldquo;better&rdquo; looks like &mdash; let&rsquo;s help each other get there quicker.</strong></p>

    <p class="para">Backstage Blueprint is also more than that. It&rsquo;s about pulling back the curtain on the systems that work at scale and giving everyone a look behind it. <strong>We&rsquo;re not gatekeeping here.</strong> Iron sharpens iron. The road gets sharper when people on it share what they know &mdash; and that&rsquo;s what we&rsquo;re trying to build. A community around the work, not a hand-out from on high.</p>

    <div class="audience-row">
      <div class="au">
        <div class="au-tag">— IF YOU&apos;RE AN ARTIST —</div>
        <div class="au-body">I hope you found value in seeing the systems that support the show you&rsquo;re trying to put on.</div>
      </div>
      <div class="au">
        <div class="au-tag">— IF YOU&apos;RE A TOURING PRO —</div>
        <div class="au-body">I hope this influenced something you&rsquo;re already doing &mdash; or sharpened the process you use in your current workflow.</div>
      </div>
      <div class="au">
        <div class="au-tag">— IF YOU&apos;RE NEW &amp; LEARNING —</div>
        <div class="au-body">I hope it wasn&rsquo;t overwhelming. If it was, that&rsquo;s fine. Come back. These pages don&rsquo;t change &mdash; your understanding of them will.</div>
      </div>
    </div>

    <p class="para">This course was built to give you <strong>context and constraints</strong> &mdash; along with the working language, the sequences, and the tools you can plug into your own operation as you go. Every tour is different. Every artist is different. Every venue throws something unexpected at you. The work, the people, and the moments will often be your variables. <strong>Let these pages and these tools be the constant</strong> &mdash; a consistent system you can come back to as everything else changes.</p>

    <div class="sec-head">Before You <span class="accent">Close The Tab.</span></div>

    <p class="para">This is the first course &mdash; not the only one. A tech deep dive on the gear &mdash; the nuts and bolts, the actual hardware talk &mdash; absolutely deserves its own course. Festival shows, touring international, networking and getting started in the industry, even corporate AV &mdash; the list goes on. <strong>There&rsquo;s a lot of road left to cover.</strong></p>

    <p class="para"><strong>Stay engaged. Talk to us. Talk to each other.</strong> Backstage Blueprint isn&rsquo;t just a course &mdash; it&rsquo;s a conversation about how this work actually gets done, at every scale, by every kind of person doing it. Tag us, email us, write back. Tell us what&rsquo;s working in your operation, what you&rsquo;d build differently, what was missing here. <strong>Everybody runs their version of this work a little differently, and that&rsquo;s where the real sauce is.</strong></p>

    <p class="para">Also, if there&rsquo;s a topic or an area you don&rsquo;t see covered in a future module or course &mdash; <strong>please reach out and let us know.</strong> If you&rsquo;ve got real expertise in one of those spaces, we&rsquo;d love to hear from you. We can connect you with the Backstage Blueprint partners and build it out together. <strong>Each iteration of our work gets sharper.</strong></p>

    <div class="asks-list">
      <div class="ask">
        <div class="ask-head">Put It In Motion.</div>
        <div class="ask-body">Take a tool, a template, or a strategy from these pages and use it on your next show. Even at a small scale &mdash; even one tile of one page. <strong>The systems only become real when somebody chooses to run them.</strong></div>
      </div>
      <div class="ask">
        <div class="ask-head">Engage With The Work, And With Each Other.</div>
        <div class="ask-body">Find us on social. Drop us a line at <code>hello@backstageblueprint.co</code>. Tell us how it went. <strong>This is a conversation, not a broadcast.</strong></div>
      </div>
      <div class="ask">
        <div class="ask-head">Take Care Of Your People.</div>
        <div class="ask-body">The systems are the frame. The people are the work.</div>
      </div>
    </div>

    <p class="para" style="margin-top: 10px;">Thanks for being part of what this thing turns into. See you in the next city.</p>

    <div class="closing-tag">— FROM THE BINDER —</div>

      locked.style.display='flex';
      lkTitle.textContent=m.title.toUpperCase();
      pageCount=0; currentPage=0;
      updateNav();
      return;
    }
    locked.style.display='none';
    stage.style.display='';

    var src=document.getElementById('mod-'+m.num);
    var html=src ? src.textContent : '';
    html=html.replace('</head>',RESET+'</head>');

    var loaded=0;
    function done(){
      loaded++;
      if(loaded<2) return;
      pageCount=countPages(frontIfr);
      currentPage=0;
      leaf1.style.transition='none'; leaf2.style.transition='none';
      leaf1.style.transform='rotateY(0deg)'; leaf2.style.transform='rotateY(0deg)';
      frontLeaf=leaf1; backLeaf=leaf2; frontIfr=ifr1; backIfr=ifr2;
      showPage(frontIfr,0); showPage(backIfr,0);
      applyStack();
      void leaf1.offsetWidth;
      leaf1.style.transition=''; leaf2.style.transition='';
      updateNav();
    }
    ifr1.onload=done; ifr2.onload=done;
    ifr1.srcdoc=html; ifr2.srcdoc=html;
  }

  function countPages(ifr){
    try{ return ifr.contentDocument.querySelectorAll('.page-wrapper').length; }
    catch(e){ return 1; }
  }
  function showPage(ifr,idx){
    try{
      var pages=ifr.contentDocument.querySelectorAll('.page-wrapper');
      for(var i=0;i<pages.length;i++){
        pages[i].style.display=(i===idx)?'':'none';
      }
    }catch(e){}
  }
  function applyStack(){
    frontLeaf.style.zIndex=2; backLeaf.style.zIndex=1;
  }

  /* ---- page flip ---- */
  function flipNext(){
    if(busy||!currentModule||!currentModule.available) return;
    if(currentPage>=pageCount-1) return;
    busy=true;
    showPage(backIfr,currentPage+1);
    backLeaf.style.transition='none';
    backLeaf.style.transform='rotateY(0deg)';
    backLeaf.style.zIndex=1;
    frontLeaf.style.zIndex=2;
    void frontLeaf.offsetWidth;
    frontLeaf.classList.add('flipping');
    frontLeaf.style.transition='';
    frontLeaf.style.transform='rotateY(-180deg)';
    var moved=frontLeaf;
    setTimeout(function(){
      moved.classList.remove('flipping');
      var t=frontLeaf; frontLeaf=backLeaf; backLeaf=t;
      var ti=frontIfr; frontIfr=backIfr; backIfr=ti;
      backLeaf.style.transition='none';
      backLeaf.style.transform='rotateY(0deg)';
      applyStack();
      currentPage++;
      busy=false;
      updateNav();
    },730);
  }
  function flipPrev(){
    if(busy||!currentModule||!currentModule.available) return;
    if(currentPage<=0) return;
    busy=true;
    showPage(backIfr,currentPage-1);
    backLeaf.style.transition='none';
    backLeaf.style.transform='rotateY(-180deg)';
    backLeaf.style.zIndex=3;
    void backLeaf.offsetWidth;
    backLeaf.classList.add('flipping');
    backLeaf.style.transition='';
    backLeaf.style.transform='rotateY(0deg)';
    var moved=backLeaf;
    setTimeout(function(){
      moved.classList.remove('flipping');
      var t=frontLeaf; frontLeaf=backLeaf; backLeaf=t;
      var ti=frontIfr; frontIfr=backIfr; backIfr=ti;
      backLeaf.style.transition='none';
      backLeaf.style.transform='rotateY(0deg)';
      applyStack();
      currentPage--;
      busy=false;
      updateNav();
    },730);
  }

  /* ---- nav ---- */
  function updateNav(){
    var avail=currentModule&&currentModule.available;
    var pc=avail?pageCount:0;
    var human=avail?(currentPage+1):0;
    counter.innerHTML='PG <b>'+pad(human)+'</b> / '+pad(pc);
    prevBtn.disabled=!avail||currentPage<=0;
    nextBtn.disabled=!avail||currentPage>=pageCount-1;
  }
  function pad(n){ return (n<10?'0':'')+n; }

  prevBtn.addEventListener('click',flipPrev);
  nextBtn.addEventListener('click',flipNext);
  document.addEventListener('keydown',function(e){
    if(gate.classList.contains('hidden')==false) return;
    if (/INPUT|TEXTAREA/i.test((e.target && e.target.tagName) || '')) return;
    if (e.key === 'ArrowLeft' || e.keyCode === 37) flipPrev();
    else if (e.key === 'ArrowRight' || e.keyCode === 39) flipNext();
  });

  /* ---- notes (reconstructed — original was truncated by build pipeline) ---- */
  function loadNotes(id){
    try {
      notesArea.value = localStorage.getItem('bb-notes-' + id) || '';
    } catch(e) {
      notesArea.value = '';
    }
    if (saveState) saveState.textContent = '';
  }
  var notesTimer;
  if (notesArea) {
    notesArea.addEventListener('input', function(){
      if (saveState) saveState.textContent = 'SAVING\u2026';
      clearTimeout(notesTimer);
      notesTimer = setTimeout(function(){
        try {
          if (currentModule) localStorage.setItem('bb-notes-' + currentModule.id, notesArea.value);
          if (saveState) saveState.textContent = 'SAVED';
        } catch(e) {}
      }, 600);
    });
  }

})();
</script>
