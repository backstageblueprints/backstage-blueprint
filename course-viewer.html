  <div class="body-area">
    <div class="module-tag">— 06 / EMERGENCIES —</div>
    <div class="page-title">WHEN THINGS<br>GO SIDEWAYS.</div>
    <div class="page-sub">Have the conversation in the meeting so you don&rsquo;t have to figure it out in the moment.</div>

    <p class="para">Most show days don&rsquo;t have an emergency. Some do. The TM&rsquo;s job in any of them is the same: <strong>stay calm, defer to the experts, get the artist to safe ground, account for the crew.</strong> You&rsquo;re not the first responder. You&rsquo;re the one who knows where everyone on your team is supposed to be at any given moment, and that&rsquo;s the value you bring to whoever is running the response.</p>

    <div class="em-grid">
      <div class="em-card">
        <div class="em-head">Fire</div>
        <div class="em-body">Venue and house staff lead. <strong>Don&rsquo;t override an evacuation call.</strong> Get the artist out via the closest exit known to be clear, ideally to the buses. Account for crew at the muster point your security lead designated. The show may not resume that night.</div>
      </div>

      <div class="em-card">
        <div class="em-head">Medical</div>
        <div class="em-body">A fainter in the front row, a fan in the lobby, a tech who took a fall &mdash; venues have onsite medical, usually staged near the pit. <strong>Get them in the loop fast.</strong> If it&rsquo;s a touring crew member, get them to the right facility and loop in your tour office.</div>
      </div>

      <div class="em-card">
        <div class="em-head">Active Threat</div>
        <div class="em-body">Run-hide-fight is the framework most venues train on. <strong>Security and house staff drive the room&rsquo;s response.</strong> Your job: get the artist off stage and into a hardened space (dressing room, bus, designated safe area), then crew. Call 911 if no one else has. The show is over.</div>
      </div>

      <div class="em-card">
        <div class="em-head">Crowd / Barricade</div>
        <div class="em-body">Crush at the front, a barricade jumper, a fight in the pit. Security handles the physical intervention. <strong>If the show needs to stop briefly</strong> &mdash; flashing house lights, a calm announcement, the artist taking the mic &mdash; coordinate with FOH and the security lead in real time. Resume only when the lead clears it.</div>
      </div>
    </div>

    <div class="em-strip">
      <strong>Four numbers worth pinning before you need them:</strong> venue ops manager · venue medical · house security lead · local police non-emergency line. Add the &ldquo;in case of show stop&rdquo; protocol to your phone&rsquo;s notes app on day one of a tour and don&rsquo;t look at it again unless you need it.
    </div>

    <p class="para" style="margin-top: 10px;"><strong>The single most important thing</strong> is that the conversation about all of this already happened in the security meeting earlier in the day. The decisions are made when there&rsquo;s no pressure. The execution, if it ever has to happen, is just following what you already agreed to.</p>

  <div class="body-area">
    <div class="module-tag">— 06 / FIELD NOTES —</div>
    <div class="page-title">FIELD NOTES.</div>
    <div class="page-sub">Habits that pay off + things that surprise people.</div>

    <div class="fn-grid">
      <div class="fn-col">
        <div class="fn-head">— HABITS —</div>
        <ul>
          <li><strong>The security lead&rsquo;s name and cell go in your phone</strong> within the first hour at the venue. Saved as &ldquo;[Venue] Security &mdash; [Name].&rdquo;</li>
          <li><strong>Bring extra day sheets</strong> to the security meeting. Their team distributes copies across posts.</li>
          <li><strong>A backup stash of credentials</strong> lives in the production office. Passes get lost. Passes go through the wash.</li>
          <li><strong>Walk the runner&rsquo;s routes once</strong> in the afternoon. Security on each post sees you and registers the face.</li>
          <li><strong>Print door signs the night before</strong> and bring them in the binder. Hang during walkthrough, not later.</li>
          <li><strong>Thank security by name during the show.</strong> If you can&rsquo;t catch them, do it at load-out.</li>
        </ul>
      </div>

      <div class="fn-col">
        <div class="fn-head">— SURPRISES —</div>
        <ul>
          <li><strong>Most security teams are great when you treat them like partners.</strong> The horror stories you&rsquo;ve heard are the exception, not the rule.</li>
          <li><strong>Barricade is the hardest seat in the room.</strong> Pit security does brutal work for hours and rarely hears thanks. Bringing water in the afternoon goes a long way.</li>
          <li><strong>&ldquo;All access&rdquo; will be the question of the night</strong> if you don&rsquo;t lock the pass system in advance. Someone will try to talk their way past someone.</li>
          <li><strong>Photo pit rules get tested almost every show.</strong> A photographer pushes for four songs instead of three, brings a flash, or stays after the wave-out. The first three songs rule is non-negotiable.</li>
          <li><strong>VIP packages run long if you let them.</strong> A wrap cue from the runner is worth its weight by song three of the headliner&rsquo;s pre-show ritual.</li>
          <li><strong>Emergency conversations feel awkward in the daylight</strong> and useful in the dark. Have them anyway.</li>
        </ul>
      </div>
    </div>

    <div class="pull-quote">
      <p>If the rest of the day is about timing, this module is about respect &mdash; for the people working it with you, and for the lines that keep everyone safe.</p>
    </div>

    <div class="page-title">WHAT IT IS,<br>WHY IT IS,<br>HOW IT WORKS</div>

    <div class="trio">
      <div class="block">
        <div class="b-tag">— WHAT IT IS —</div>
        <div class="b-text">The spatial and access layer of show day. Credentials that say who&rsquo;s allowed where. People flow that keeps the streams separate. Security as the partnership that holds the lines.</div>
      </div>
      <div class="block">
        <div class="b-tag">— WHY IT IS —</div>
        <div class="b-text">Live performance is a public event. People move through the room. Some of those moments need to stay quiet, some need to stay safe, and some need to look effortless. None of it is accidental.</div>
      </div>
      <div class="block">
        <div class="b-tag">— HOW IT WORKS —</div>
        <div class="b-text">Lock the pass system on paper. Walk the venue&rsquo;s flow in your head. Sit down with the security lead for twenty minutes. Leave with their phone number. Run the day.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>The day&rsquo;s timing lives in Module 05. The day&rsquo;s flow lives here. Next, we zoom out from the venue and look at where the money goes.</p>

  <div class="body-area">
    <div class="module-tag">— 07 / OPENING —</div>
    <div class="page-title">THE MONEY<br>HAS TO MOVE.</div>
    <div class="page-sub" style="margin-bottom: 18px;">What happens to the dollars while the tour is rolling.</div>

    <p class="para">Every show day, money moves. <strong>Deposits in.</strong> Per diems out. Expenses on cards. Settlements at night. A guarantee paid in cash at five p.m., a merch float reconciled at eleven, a hotel master charged to the band card while the bus is still warming up at the curb. The numbers don&rsquo;t sit still &mdash; they cycle through your hands and out the other side, every single day of the run.</p>

    <p class="para">The TM&rsquo;s job is to <strong>track that flow in real time.</strong> Not at the end of the week. Not in a shoebox of receipts you&rsquo;ll sort out when you&rsquo;re back home. In real time, with the numbers landing in the same spreadsheet your business manager is watching from their desk in Nashville or LA or wherever the artist&rsquo;s books live. Doing this well is the difference between a Business Manager who trusts you and one who doesn&rsquo;t.</p>

    <p class="para">The money runs on a chain. <strong>Artist &rarr; Business Manager &rarr; Tour Accountant &rarr; TM &rarr; Promoter &rarr; Agent.</strong> Each person has a role. Each one expects the next one in the line to do their part. You sit roughly in the middle &mdash; the only one of these people who&rsquo;s actually in the venue at midnight, counting cash, scanning a settlement, sending the night&rsquo;s report.</p>

    <div class="pull-quote">
      <p>If Module 3 was the projection and Module 8 is the receipt, Module 7 is the running ledger between them.</p>
    </div>

    <div class="sec-head">What this module covers</div>
    <ul class="topics">
      <li><strong>Talking money</strong> with your team before the tour starts</li>
      <li><strong>Onboarding crew</strong> into the financial system</li>
      <li><strong>The Road Report</strong> &mdash; the daily ledger</li>
      <li><strong>When money comes in, when money goes out</strong></li>
      <li><strong>Per diems</strong>, bookkeeping, and the daily rhythm</li>
      <li><strong>Communication</strong> that keeps everyone in the loop</li>
    </ul>

    <div class="scale-callout" style="margin-top: 50px;">
      <div class="kit-title-row">
        <div class="bc-title-dark">How Can This Work At Your Scale?</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— AT YOUR SCALE —</span>
          <span class="kit-mark kit-mark-scale">
            <svg viewBox="-3 0 27 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linejoin="round" stroke-linecap="round">
              <!-- large rounded square — bone outline -->
              <rect x="4" y="4" width="14" height="14" rx="2.5" ry="2.5" stroke="#F4F1EA" stroke-width="1.6"/>
              <!-- small rounded square — bone-filled, centered on the big square's bottom-left corner -->
              <rect x="-1" y="13" width="10" height="10" rx="1.8" ry="1.8" fill="#F4F1EA" stroke="#F4F1EA" stroke-width="1"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">For an artist running their own operation, or a one- or two-person team handling everything, the principle holds. Cash still moves. Receipts still need to be tracked. The road report still needs to be updated. The work doesn&rsquo;t go away &mdash; there are just fewer hands to do it. <strong>Knowing what the full picture looks like is what makes a smaller picture clean.</strong></p>

  <div class="body-area">
    <div class="module-tag">— 07 / ONE FLOW, SIX KEY ROLES —</div>
    <div class="page-title">ONE FLOW,<br>SIX KEY ROLES.</div>
    <div class="page-sub">A proven structure for how tour money moves.</div>

    <p class="para">A proven structure carries tour money through <strong>six key roles in a single flow.</strong> Each role has its own purpose, its own moment in the timeline, and its own responsibility for the money side of a tour. Seeing the whole chain laid out &mdash; from the artist at one end to the agent at the other &mdash; helps make sense of what these roles actually own.</p>

    <p class="para">On smaller tours, one person often wears multiple hats. Spelling the chain out start to finish is what makes it possible to <strong>know which hat is being worn at any given moment</strong> &mdash; and what good handling of a show&rsquo;s money actually looks like.</p>

    <div class="chain-roles">
      <div class="chain-role">
        <div class="cr-name">Artist <span class="cr-mini">— THE ENTITY —</span></div>
        <div class="cr-body">The money flows <em>for them.</em> Operational financials rarely touch them directly. Their job is the show.</div>
      </div>
      <div class="chain-role">
        <div class="cr-name">Business Mgr <span class="cr-mini">— THE SPINE —</span></div>
        <div class="cr-body">Pays vendors, runs payroll, owns the books. <strong>The primary point of contact for everything money.</strong></div>
      </div>
      <div class="chain-role">
        <div class="cr-name">Tour Accountant <span class="cr-mini">— THE BOOKKEEPER —</span></div>
        <div class="cr-body">Sometimes the Business Manager, sometimes a separate role on bigger tours. Owns the day-to-day reconciliation work.</div>
      </div>
      <div class="chain-role">
        <div class="cr-name">Tour Manager <span class="cr-mini">— FIELD OPERATOR —</span></div>
        <div class="cr-body">Carries cash, runs the band card, scans receipts, walks settlements at midnight, updates the road report. <strong>The eyes and hands of the money side of a tour.</strong></div>
      </div>
      <div class="chain-role">
        <div class="cr-name">Promoter <span class="cr-mini">— THE BUYER —</span></div>
        <div class="cr-body">Pays the artist for the show. <strong>Where settlement happens</strong> on the night, in the venue, with the TM.</div>
      </div>
      <div class="chain-role">
        <div class="cr-name">Agent <span class="cr-mini">— THE DEAL —</span></div>
        <div class="cr-body">Structures the deal pre-tour. Usually hands-off post-confirmation &mdash; called in when something goes off the rails.</div>
      </div>
    </div>

      <p class="bc-text-dark">Smaller operations collapse this chain. A solo artist may be the artist, the Business Manager, and the TM in one. A four-person team might run with no separate tour accountant. <strong>The roles don&rsquo;t disappear &mdash; they live in fewer people.</strong> Knowing what each role is responsible for is what makes it easier to hold all of them well, whether that&rsquo;s holding all six or one of them.</p>

  <div class="body-area">
    <div class="module-tag">— 07 / TALKING MONEY &middot; BEFORE THE TOUR —</div>
    <div class="page-title">GET ON THE<br>SAME PAGE FIRST.</div>
    <div class="page-sub">Before the first show, lock in how the money side runs.</div>

    <p class="para">Whenever you start working with someone new &mdash; or grow your team into new territory &mdash; <strong>learn how they operate.</strong> Every Business Manager has their own rhythm. Every artist has a history of how their books have been kept. Walking in with assumptions about either is the fastest way to start a tour on the wrong foot.</p>

    <p class="para">Most of the time, if the process on the ground is sound, the team will let it run in its own style. That&rsquo;s the ideal. But some managers and Business Managers want things done a very specific way &mdash; their templates, their cadence, their categories. <strong>Get on the same page before the tour starts.</strong> Not at hour seventeen of show day three.</p>

    <div class="pull-quote">
      <p>Here are some items to walk through with the team before the tour starts &mdash; and before the first road report goes live.</p>
    </div>

    <div class="sec-head">Share The Processes</div>
    <ul class="topics">
      <li>Share the working <strong>templates for budgets and road reports</strong> with the artist&rsquo;s business management.</li>
      <li>Confirm they work for the team before the accounting process begins.</li>
      <li>Get approval before show #1.</li>
    </ul>

    <p class="para" style="margin-top: 10px;">If they prefer their own templates, swap. If they ask for tweaks, make them. <strong>The system has to belong to the whole team</strong> &mdash; the TM runs it nightly, but the Business Manager is the one answering to the artist about what it shows.</p>

    <div class="scale-callout" style="margin-top: 50px;">
      <div class="kit-title-row">
        <div class="bc-title-dark">How Can This Work At Your Scale?</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— AT YOUR SCALE —</span>
          <span class="kit-mark kit-mark-scale">
            <svg viewBox="-3 0 27 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linejoin="round" stroke-linecap="round">
              <rect x="4" y="4" width="14" height="14" rx="2.5" ry="2.5" stroke="#F4F1EA" stroke-width="1.6"/>
              <rect x="-1" y="13" width="10" height="10" rx="1.8" ry="1.8" fill="#F4F1EA" stroke="#F4F1EA" stroke-width="1"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">When the TM and the Business Manager are the same person &mdash; a solo artist, a young manager handling both, a friend who&rsquo;s stepped up to run things &mdash; the conversation about systems still has to happen. <strong>It just happens with yourself, on paper, before show #1.</strong> The benefit of writing it down anyway: when the team grows later, the system is already there to hand off.</p>
    </div>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— LEARN THEIR PROCESSES →</span>
    </div>
  </div>

  <div class="body-area">
    <div class="module-tag">— 07 / TALKING MONEY &middot; LEARN THEIR PROCESSES —</div>
    <div class="page-title">LEARN THEIR<br>PROCESSES.</div>
    <div class="page-sub">Their answers shape how you&rsquo;ll run the money side for the next 30+ shows. Ask early.</div>

    <p class="para">Four buckets of questions to walk through with the Business Manager <strong>before show #1.</strong> The answers are not all obvious, and getting them in advance saves you the awkward conversation at midnight on the side of the road.</p>

    <div class="sec-head">Templates</div>
    <ul class="topics">
      <li>Does the business management have <strong>preferred templates</strong> for budgets or road reports (in place of yours)?</li>
    </ul>

    <div class="sec-head">Per Diems</div>
    <ul class="topics">
      <li>How will per diems be paid on the tour?</li>
      <li>Will you be paying <strong>everyone in cash</strong> on the road?</li>
      <li>Or will PDs be paid by the Business Manager through <strong>ACH / wire / payroll?</strong></li>
    </ul>

    <div class="sec-head">Reimbursements</div>
    <ul class="topics">
      <li>How should reimbursements be handled on the road?</li>
      <li>Should reimbursements be paid using <strong>cash on the road</strong> for approved tour expenses?</li>
      <li>Or should all reimbursements run through the Business Manager?</li>
    </ul>

    <div class="sec-head">Deposits</div>
    <ul class="topics">
      <li>How often does the Business Manager want <strong>deposits</strong> to be made on the road &mdash; cash or checks received on the tour?</li>
      <li>Would they prefer all checks sent to their office directly instead of deposited at the bank?</li>
      <li>If so, where, and attention to whom?</li>
    </ul>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— AGREE + REQUEST →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 07 / TALKING MONEY &middot; AGREE + REQUEST —</div>
    <div class="page-title">LOCK IT IN.</div>
    <div class="page-sub">What gets locked in with the Business Manager before show #1.</div>

    <div class="sec-head">Agree On All Processes</div>
    <ul class="topics">
      <li>Make sure everyone is on the same page as to what <strong>templates will be used</strong> and how all finance-related items will be handled.</li>
    </ul>

    <div class="sec-head">Request Necessary Financial Items</div>

    <ul class="topics">
      <li><strong>Artist Bank Account</strong>
        <ul>
          <li>Bank name and account number</li>
          <li>Confirm the TM is authorized to make deposits</li>
          <li>National / international branches available?</li>
          <li>International partner bank for deposits or withdrawals?</li>
        </ul>
      </li>
      <li><strong>Wire Instructions</strong>
        <ul>
          <li>Confirm wire deposits go to the same account</li>
          <li>If not, request: bank name, address, SWIFT code, account name, account number, routing number</li>
        </ul>
      </li>
      <li><strong>W-9</strong>
        <ul>
          <li>Make sure the artist&rsquo;s W-9 is up-to-date, signed, and has the proper mailing address.</li>
        </ul>
      </li>
      <li><strong>Credit Card &mdash; &ldquo;the band card&rdquo;</strong>
        <ul>
          <li>Every TM should have a credit card <em>in their own name</em> supplied by the artist</li>
          <li>Clarify what expenses do and do not justify the band card</li>
        </ul>
      </li>
    </ul>

    <div class="pull-quote">
      <p>Walking into show #1 with all of this in hand means the work is already half done &mdash; the rest of the run is execution.</p>
    </div>

    <div class="scale-callout" style="margin-top: 50px;">
      <div class="kit-title-row">
        <div class="bc-title-dark">How Can This Work At Your Scale?</div>

          <span class="kit-mark kit-mark-scale">

              <rect x="-1" y="13" width="10" height="10" rx="1.8" ry="1.8" fill="#F4F1EA" stroke="#F4F1EA" stroke-width="1"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">Every item on this page exists for a solo artist too &mdash; just with the artist standing in for both the TM and the Business Manager. The bank account still has to be set up for tour deposits. Wire instructions still have to be on file before the first promoter asks. The W-9 still has to be ready. <strong>The band card still has to be funded and in someone&rsquo;s name, even if that someone is the artist.</strong> Smaller scale, same documents.</p>

  <div class="body-area">
    <div class="module-tag">— 07 / CREW ONBOARDING —</div>
    <div class="page-title">ONBOARDING<br>NEW CREW.</div>
    <div class="page-sub">The intake checklist when someone joins the tour.</div>

    <p class="para">Every time someone new joins the tour, the financial and travel side starts from zero. <strong>Building a clean intake habit</strong> means you&rsquo;re not chasing passport numbers from a hotel parking lot at midnight.</p>

    <div class="step-stack">
      <div class="step-card">
        <div class="sc-num">01</div>
        <div class="sc-body">
          <div class="sc-head">Decide What Info To Collect</div>
          <div class="sc-text">Set the fields you&rsquo;ll always need. <strong>Contact info &middot; frequent flyer numbers &middot; seat preference &middot; passport info &middot; hospitality information</strong> (dietary, allergies) &middot; swag sizes. Build the same intake every time.</div>
        </div>
      </div>

      <div class="step-card">
        <div class="sc-num">02</div>
        <div class="sc-body">
          <div class="sc-head">Create A Form</div>
          <div class="sc-text">Use a <strong>Google Form, fillable PDF</strong>, or your tour&rsquo;s intake doc of choice. Shareable link. Auto-populates a spreadsheet so you have everything in one place.</div>
        </div>
      </div>

      <div class="step-card">
        <div class="sc-num">03</div>
        <div class="sc-body">
          <div class="sc-head">Reconfirm The Data</div>
          <div class="sc-text"><em>Collecting it is one thing &mdash; making sure it&rsquo;s accurate is another.</em> A transposed passport number is consequential if not caught early. <strong>Double-check what&rsquo;s been entered</strong> before you commit.</div>
        </div>
      </div>

      <div class="step-card">
        <div class="sc-num">04</div>
        <div class="sc-body">
          <div class="sc-head">Connect Them With Business Management</div>
          <div class="sc-text">Inform the Business Manager of the <strong>rate the crew member was hired at.</strong> Request: passport scan, W-4, I-9, voided check, payroll direct deposit forms, and any additional documents the Business Manager needs. The Business Manager owns payroll setup; the TM is the bridge between the new hire and the back office.</div>
        </div>
      </div>
    </div>

      <p class="bc-text-dark">A working <strong>Travel Grid</strong> &mdash; one row per person, columns for hotel nights and flight legs across the run. Tracks who&rsquo;s in which room each night, who&rsquo;s flying which segment, and where the confirmation numbers live. Pulls cleanly from the data captured in the Crew Onboarding Doc. The single working artifact for tour-wide travel logistics. Pinned to DOC-208.</p>

      <p class="bc-text-dark">When the tour is small, "onboarding" might mean a single freelance FOH engineer for a fly date &mdash; or a friend stepping in to run merch for the weekend. <strong>The system is still worth running.</strong> A form for one person is still a form. The passport number still needs to be right. The W-4 still needs to land with whoever&rsquo;s running payroll, even if that&rsquo;s the artist themselves. The smaller the team, the more each piece of information matters &mdash; there&rsquo;s no one else to catch the mistake.</p>

    <div class="page-title">THE ROAD<br>REPORT.</div>
    <div class="page-sub">Your running ledger. The single source of financial truth on the road.</div>

    <p class="para">The Road Report is <strong>the running tour ledger.</strong> Every dollar that comes in or goes out lands on it. Built before the tour and updated every show. <strong>Don&rsquo;t feel like every line needs to be filled up</strong> &mdash; the Road Report scales to the operation of the tour. A solo run touches fewer rows than a thirty-person production. The structure holds at every scale.</p>

    <p class="para">It tracks: <strong>show income</strong> (guarantee + overage), <strong>merch income</strong>, expenses by category (production, transportation, hospitality, fuel, per diems, accommodation, etc.), deposits made, balances owed, and a running total of where the tour stands financially. If a number happens, it ends up on this sheet.</p>

  <div class="body-area">
    <div class="module-tag">— 07 / MONEY IN —</div>
    <div class="page-title">WHEN MONEY<br>COMES IN.</div>
    <div class="page-sub">Logging show income, merch income, and keeping it safe.</div>

    <p class="para">Every show day, money is spent &mdash; and (hopefully) money is made. <strong>Recording income is the first half</strong> of the road report rhythm. It happens at settlement, at the merch table count-out, and any time a check or wire lands while the tour is on the road.</p>

    <div class="sec-head">Record The Income</div>
    <ul class="topics">
      <li>Record every income event in the Road Report. For each:
        <ul>
          <li>Is it <strong>show income or merch income</strong>?</li>
          <li>How much money was received?</li>
          <li>In what form? (cash, check, wire)</li>
          <li>From whom?</li>
        </ul>
      </li>
    </ul>

    <div class="sec-head">Keep It Safe</div>

    <ul class="topics">
      <li><strong>Cash Process</strong>
        <ul>
          <li>There will be a lot of cash at times. <strong>Keep it with you.</strong> Don&rsquo;t lay the bag down in random places.</li>
          <li>Have a safe or bank bag on the bus.</li>
          <li>Deposit often. Don&rsquo;t keep more cash than you&rsquo;re comfortable carrying.</li>
          <li>Note deposits on the Road Report.</li>
          <li>Scan the deposit receipt and send to the Business Manager.</li>
        </ul>
      </li>
      <li><strong>Check Process</strong>
        <ul>
          <li>Scan the check immediately.</li>
          <li>Deposit or send checks to the Business Manager often &mdash; ideally weekly.</li>
          <li>Note on the Road Report.</li>
          <li>Scan the deposit receipt and send to the Business Manager.</li>
        </ul>
      </li>
      <li><strong>Wire Process</strong>
        <ul>
          <li>Request wire confirmation / proof of wire.</li>
          <li>Share proof of wire with the Business Manager.</li>
        </ul>
      </li>
    </ul>

    <p class="para" style="margin-top: 10px;"><strong>Share the Road Report with the Business Manager.</strong> They should have live access, not a weekly email.</p>

    <div class="module-tag">— 07 / MONEY OUT —</div>
    <div class="page-title">WHEN MONEY<br>GOES OUT.</div>

    <div class="pull-quote">
      <p>Use this process every time money goes out on the road.</p>
    </div>

    <div class="sec-head">Record The Expense</div>
    <ul class="topics">
      <li>Scan the receipt <strong>immediately.</strong></li>
      <li>Record the expense with:
        <ul>
          <li>Was the expense paid by cash or card?</li>
          <li>When was the expense incurred?</li>
          <li>What was the expense?</li>
          <li>Who was the vendor?</li>
        </ul>
      </li>
      <li>Provide details and notes on all expenditures.</li>
      <li>Notate amount spent.</li>
    </ul>

    <div class="sec-head">Share With Your Team</div>
    <ul class="topics">
      <li>Share Road Report with your team and Business Manager. <strong>Include all receipt scans.</strong></li>
    </ul>

    <div class="pull-quote">
      <p>Don&rsquo;t be &ldquo;that tour manager&rdquo; who turns in giant envelopes full of receipts at the end of a long tour.</p>
    </div>

    <p class="para">Be a good TM. <strong>Scan everything into a receipt app as you go.</strong> Turn the receipts into one tidy PDF for the whole tour &mdash; or live in the cloud so the Business Manager has it real-time. Either way, the work is done in the moment, not as a desperate final-week archaeology project.</p>

  <div class="body-area">
    <div class="module-tag">— 07 / PER DIEMS —</div>
    <div class="page-title">PER DIEMS.</div>
    <div class="page-sub">The daily cash payment that keeps the crew fed.</div>

    <p class="para">Per diems are the <strong>daily cash payment for crew and band</strong> &mdash; typically $25&ndash;$60 per day depending on tour scale and what catering covers. They&rsquo;re not a salary; they&rsquo;re an honest acknowledgment that the people on the bus need to buy food, coffee, a phone charger, and a sandwich at the airport.</p>

    <p class="para">Common scaling: an <strong>arena tour</strong> might run $50&ndash;$75/day, a <strong>theater run</strong> $40&ndash;$50, a <strong>club run</strong> $25&ndash;$35. The number is set in the budget (Module 03) and ratified by the Business Manager before the first envelope goes out.</p>

    <div class="sec-head">Distribution Methods</div>
    <ul class="topics">
      <li><strong>Cash in envelopes</strong> &mdash; old school, fast, no overhead. Most common on smaller and mid-size tours.</li>
      <li><strong>App-based</strong> (Venmo, Zelle, Cash App) &mdash; useful for partial-tour crew, harder for taxes / recordkeeping.</li>
      <li><strong>Prepaid cards or payroll</strong> &mdash; common on bigger tours where the Business Manager handles distribution. TM tracks but doesn&rsquo;t carry the cash.</li>
    </ul>

    <div class="sec-head">The Weekly Cash-Out</div>

    <p class="para">Per diems are usually distributed <strong>weekly</strong> &mdash; every Sunday or Monday is the standard. The TM hands out envelopes (or app-pays) at a set time, logs each handoff on the Road Report, and reconciles the total against the bank withdrawal. <em>Same day every week.</em> Same place if you can manage it. Predictability is the whole point.</p>

    <div class="sec-head">What To Watch For</div>
    <ul class="topics">
      <li>People will <strong>lose envelopes.</strong> Document each handoff.</li>
      <li>People will ask for <strong>advances.</strong> Establish the rule before show #1 &mdash; yes / no / case-by-case.</li>
      <li><strong>Taxes</strong> &mdash; per diem rates are generally non-taxable up to IRS limits. Past those, they become wages. The Business Manager owns this; rate questions get flagged up the chain.</li>
      <li><strong>End-of-tour reconciliation</strong> &mdash; total cash withdrawn vs. total cash distributed should match.</li>
    </ul>

    <div class="module-tag">— 07 / BOOKKEEPING —</div>
    <div class="page-title">BOOKKEEPING<br>ON THE ROAD.</div>
    <div class="page-sub">Tour accounting is a daily practice &mdash; never a catch-up project.</div>

    <p class="para">Tour accounting needs to be a <strong>daily practice</strong>, or you will fall behind and never catch up. The more you stay on top of this, the easier your life will be &mdash; and the cleaner your books will look. <em>You don&rsquo;t want to make your business manager sad, do you?</em></p>

    <div class="sec-head">Seven Categories To Watch</div>

    <div class="cat-grid">
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 01 —</div>
        <div class="ct-head">Tour Budgets</div>
        <div class="ct-body">The projection and the running actuals. Pulled from Module 03 and lined up next to what&rsquo;s actually happening.</div>
      </div>
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 02 —</div>
        <div class="ct-head">Road Reports</div>
        <div class="ct-body">The daily ledger of income, expenses, and cash flow. The document covered on page eight.</div>
      </div>
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 03 —</div>
        <div class="ct-head">Settlements</div>
        <div class="ct-body">Show-by-show payment reconciliations from each promoter. Module 08 lives here.</div>
      </div>
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 04 —</div>
        <div class="ct-head">Tax Documents</div>
        <div class="ct-body">W-9s, withholding statements, 1099s, state filings. Kept clean and sent to the Business Manager.</div>
      </div>
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 05 —</div>
        <div class="ct-head">Withholding</div>
        <div class="ct-body">State and local taxes deducted at settlement; tracked back to the Business Manager so payroll math closes correctly.</div>
      </div>
      <div class="cat-card">
        <div class="ct-num">— CATEGORY 06 —</div>
        <div class="ct-head">Vendor Invoices</div>
        <div class="ct-body">Production vendors, rental car returns, freight, hotel masters. Scanned, logged, forwarded.</div>
      </div>
      <div class="cat-card full">
        <div class="ct-num">— CATEGORY 07 —</div>
        <div class="ct-head">Payroll</div>
        <div class="ct-body">Crew rates, per diem totals, weekly distribution records. Payroll runs through the Business Manager, but every input upstream of that comes from you &mdash; the rate, the days worked, the per diem count. Get those right and payroll runs itself; get any of them wrong and the Business Manager has to chase you for an answer in the middle of a Tuesday.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>Approach the task of tour accounting in a way that someone could follow your work six months from now and have minimal questions about how you documented things.</p>
    </div>

    <div class="module-tag">— 07 / CALENDARS &amp; COMMS —</div>
    <div class="page-title">CALENDARS &amp;<br>COMMUNICATION.</div>
    <div class="page-sub">The TM is the communication hub. Plan for change.</div>

    <p class="para">Tour management is an <strong>ever-evolving practice in effective communication.</strong> The day you stop adjusting your channels is the day someone misses a lobby call because they were reading an email instead of looking at the calendar.</p>

    <p class="para">Without fail, plans will change while on the road. The right information must get delivered to the people who need it. This could be a change in <strong>travel</strong>, a <strong>production update</strong> that affects the day, or a <strong>financial item</strong> that needs a sign-off before close of business.</p>

    <div class="sec-head">The Dynamic Calendar</div>

    <p class="para">Set up a calendar that updates dynamically. <strong>Google Calendar shared with the band and crew</strong> is the standard.</p>

    <ul class="topics">
      <li>Band and crew have access</li>
      <li>They know to check it</li>
      <li>Travel, show times, and key meetings live on it</li>
      <li>Updates propagate automatically when something shifts</li>
    </ul>

    <div class="sec-head">When Plans Change Last-Minute</div>

    <p class="para">If there&rsquo;s a game-time change, the calendar isn&rsquo;t enough. Use a <strong>more direct + timely means of communication</strong> so everyone&rsquo;s on the same page.</p>

    <ul class="topics">
      <li><strong>Group text</strong> for tour-wide changes</li>
      <li><strong>Direct call / text</strong> for one-off changes affecting specific people</li>
      <li><strong>Updated day sheet</strong> redistributed if the day shifted materially</li>
    </ul>

    <div class="pull-quote">
      <p>The information arriving on time is worth more than the information being polished.</p>
    </div>

  <div class="body-area">
    <div class="module-tag">— 07 / CLEAR COMMS —</div>
    <div class="page-title">CLEAR<br>COMMS.</div>
    <div class="page-sub">Communication up the chain &mdash; clear, proactive, on-time.</div>

    <p class="para">The dynamic between a Tour Manager and a Business Manager is <strong>one of the most important relationships on the tour.</strong> A Business Manager signs off on the work from the road and answers to the artist about the numbers being produced. They&rsquo;re also the person who takes the call at six a.m. when a hotel master goes sideways at checkout.</p>

    <p class="para">A good Business Manager is a partner &mdash; <strong>they trust the numbers coming from the road, the road trusts their guidance,</strong> and the artist&rsquo;s money side runs clean. A bad relationship is its own kind of misery: chased, second-guessed, asked for the same information twice. The relationship is something built, and the build starts on day one.</p>

    <div class="sec-head">What They Want To Know</div>
    <ul class="topics">
      <li>Daily Road Report updates (or live access to one)</li>
      <li>Per diem withdrawals and distributions</li>
      <li>Any <strong>unusual expense</strong> before it lands on a card</li>
      <li>Settlement results <strong>the same night</strong></li>
      <li>Anything weird or off-pattern that they should see early</li>
    </ul>

    <div class="sec-head">How To Be A Good Partner</div>
    <ul class="topics">
      <li><strong>Be proactive, not reactive.</strong> Flag things before they ask.</li>
      <li><strong>Be specific.</strong> &ldquo;Hospitality ran $400 over budget tonight &mdash; venue under-stocked, runner trip &mdash; receipts attached.&rdquo; Not &ldquo;FYI hospitality was high.&rdquo;</li>
      <li><strong>Don&rsquo;t disappear on the road.</strong> Even on light days, a 10-second note keeps the loop alive.</li>
      <li><strong>When something goes wrong, own it fast.</strong> A mistake flagged early is easier than a mistake found two months later.</li>
    </ul>

    <div class="pull-quote">
      <p>The Business Manager is a person, not an inbox. The good ones notice when the road operates well &mdash; and they&rsquo;ll tell the artist.</p>
    </div>

    <div class="page-title">FIELD NOTES.</div>
    <div class="page-sub">Habits that pay off + things that surprise people.</div>

    <div class="fn-grid">
      <div class="fn-col">
        <div class="fn-head">— HABITS —</div>
        <ul>
          <li><strong>Update the Road Report nightly.</strong> Same time of night, same routine.</li>
          <li><strong>Photograph every receipt at the register.</strong> Not later. Not &ldquo;I&rsquo;ll get to it.&rdquo;</li>
          <li><strong>Send the nightly note even on light days.</strong> The streak matters.</li>
          <li><strong>Lock the per diem schedule</strong> on day one and don&rsquo;t drift.</li>
          <li><strong>Carry a digital and a paper copy</strong> of the artist&rsquo;s W-9.</li>
          <li><strong>Cross-check the bank balance</strong> against the Road Report once a week.</li>
        </ul>
      </div>

      <div class="fn-col">
        <div class="fn-head">— SURPRISES —</div>
        <ul>
          <li><strong>Business managers notice consistency more than anything.</strong> A reliable TM is the rarest gift.</li>
          <li><strong>&ldquo;The band card&rdquo; gets used for things you didn&rsquo;t plan for.</strong> Set the rules before the rules find you.</li>
          <li><strong>Most receipt disputes happen weeks after the fact,</strong> not in the moment. Document like you&rsquo;ll be asked in 90 days.</li>
          <li><strong>Cash math feels easy until it isn&rsquo;t.</strong> Carry a small calculator or use your phone with intent.</li>
          <li><strong>Per diems are emotional.</strong> People remember when their envelope was late, even if it was once.</li>
          <li><strong>The Road Report tells a story over time.</strong> A clean one closes faster than a messy one &mdash; months faster.</li>
        </ul>
      </div>
    </div>

    <div class="pull-quote">
      <p>Doing the money right doesn&rsquo;t get you the credit. Doing it wrong gets you the calls. The cleanest TMs are mostly invisible &mdash; which is the point.</p>

      <div class="block">
        <div class="b-tag">— WHAT IT IS —</div>
        <div class="b-text">The money layer of the run. The Road Report. The conversations with the Business Manager. The per diem envelopes. The receipt scans. The running ledger between the projection and the receipt.</div>
      </div>
      <div class="block">
        <div class="b-tag">— WHY IT IS —</div>
        <div class="b-text">Cash moves daily and someone has to track it. The TM is the one on the ground. Doing it well builds trust upstream. Doing it badly makes everything harder for everyone else.</div>
      </div>
      <div class="block">
        <div class="b-tag">— HOW IT WORKS —</div>
        <div class="b-text">Talk to the Business Manager first. Set the system. Track everything daily. Communicate up the chain. Pay the per diems on time. Scan the receipts. Update the Road Report. Send the nightly note. Don&rsquo;t fall behind.</div>
      </div>
    </div>

    <div class="pull-quote">

  <div class="body-area">
    <div class="module-tag">— 08 / OPENING —</div>
    <div class="page-title">THE MOMENT<br>PEOPLE ARE<br>TRUSTING YOU ON.</div>
    <div class="page-sub" style="margin-bottom: 22px;">Settlement is where everything we&rsquo;ve done finally meets the math.</div>

    <p class="para">For all of the planning, execution, and detail we put into a tour, <strong>keeping track and settling everything after the show is a moment people are trusting you on.</strong> The artist. Their business manager. The agent. The tour accountant. None of them are in the room when you sit down with the promoter at the end of the night. You are.</p>

    <p class="para">When you learn how to identify all the items within this sequence, you may start to find <strong>more money on the table</strong> &mdash; money that can go back in your artist&rsquo;s pocket and further the reach of the whole operation. That&rsquo;s not about being adversarial with the promoter. It&rsquo;s about understanding what you signed up for, knowing where the numbers should land, and asking real questions when they don&rsquo;t.</p>

    <div class="pull-quote">
      <p>If the advance is the brain and the day sheet is the heartbeat, the settlement is the receipt &mdash; the night&rsquo;s work translated into the language of the deal.</p>
    </div>

    <div class="sec-head">What this module covers</div>
    <ul class="topics">
      <li><strong>The 10-step sequence</strong> &mdash; from deal memo to nightly report, in the order it happens</li>
      <li><strong>Three real settlement documents</strong> &mdash; a deposit report, a promoter settlement, and a TM settlement, annotated</li>
      <li><strong>The vocabulary</strong> &mdash; the words and acronyms that appear on every settlement sheet, defined plain</li>
      <li><strong>Field notes</strong> &mdash; the habits that pay off and the surprises that catch people the first few times</li>
    </ul>

    <p class="para">A note before we go: <strong>numbers don&rsquo;t lie, but they can be misread.</strong> Most settlement errors aren&rsquo;t fraud &mdash; they&rsquo;re honest mistakes in a column somewhere. Your job is to know the math well enough to find them. The promoter will appreciate you for it; you&rsquo;re both trying to get the night closed cleanly.</p>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— THE SEQUENCE →</span>
    </div>
  </div>

  <div class="body-area">
    <div class="module-tag">— 08 / SEQUENCE AT A GLANCE —</div>
    <div class="page-title">TEN STEPS,<br>IN ORDER.</div>
    <div class="page-sub">Follow this sequence. The order matters.</div>

    <p class="para">Settlement is a sequence, not a single event. Each step sets up the one after it. Skip a step and you&rsquo;ll find yourself at midnight with the promoter, unsure why a line item is what it is. Walk the sequence and the conversation flows.</p>

    <div class="seq-strip">
      <div class="seq-step">
        <div class="seq-num">— 01 —</div>
        <div class="seq-name">Deal Memo</div>
        <div class="seq-desc">Understand the deal. Guarantee, bonuses, versus, the fine print.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 02 —</div>
        <div class="seq-name">Deposit Report</div>
        <div class="seq-desc">Get the latest from the agent. What&rsquo;s been paid up front.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 03 —</div>
        <div class="seq-name">Template Setup</div>
        <div class="seq-desc">Pre-fill what you can. Date, venue, fee, the known fields.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 04 —</div>
        <div class="seq-name">Advance Your Settlement</div>
        <div class="seq-desc">Send W-9, wire info, payment preference. Flag savings ahead.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 05 —</div>
        <div class="seq-name">Pre-Settlement</div>
        <div class="seq-desc">Request a prelim from the promoter leading up to show day.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 06 —</div>
        <div class="seq-name">Budget Expenses</div>
        <div class="seq-desc">Gather and compare actuals to what was budgeted in the deal.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 07 —</div>
        <div class="seq-name">When To Settle</div>
        <div class="seq-desc">A skill of its own. Mid-show or after load-out &mdash; you read the room.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 08 —</div>
        <div class="seq-name">Final Settlement</div>
        <div class="seq-desc">Backup docs included. Every dollar has a reason.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 09 —</div>
        <div class="seq-name">Settle With Promoter</div>
        <div class="seq-desc">Resolve flags, sign both copies, collect payment, keep your copy.</div>
      </div>
      <div class="seq-step">
        <div class="seq-num">— 10 —</div>
        <div class="seq-name">Update + Report</div>
        <div class="seq-desc">Road report updated. Nightly report sent to the team.</div>
      </div>
    </div>

    <div class="pc-callout">
      <div class="pcc-tag">— READ THE SEQUENCE LIKE THIS —</div>
      <div class="pcc-title">STEPS 01-05 HAPPEN BEFORE SHOW DAY. 06-07 ARE THE DAY OF. 08-10 ARE THE CLOSE.</div>
      <div class="pcc-text">The work isn&rsquo;t at midnight at the settlement table. The work is in the days leading up to it. If steps 01 through 05 are clean, <em>everything that happens after gets easier.</em></div>
    </div>

    <div class="module-tag">— 08 / DEAL MEMO + DEPOSITS —</div>
    <div class="page-title">START WITH<br>WHAT YOU KNOW.</div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">01</div>
        <div>
          <div class="sb-title">Deal Memo</div>
          <div class="sb-body">
            <p>Before anything else, you need a <strong>comprehensive understanding of the deal structure</strong> &mdash; what kind of deal is this, what triggers a bonus, what splits apply once thresholds are hit? Read the deal memo end to end. The questions to answer before settlement day:</p>
            <ul>
              <li>Is it a <strong>flat guarantee</strong>, or a guarantee plus a percentage?</li>
              <li>Is there a <strong>versus deal</strong> &mdash; guarantee or X% of net, whichever is greater?</li>
              <li>Are there <strong>bonuses or escalators</strong> at certain sell-through thresholds?</li>
              <li>Are there <strong>nuances</strong> &mdash; merch percentage to venue, holdbacks, hospitality buyouts, anything that affects the final number?</li>
            </ul>
            <p>If something in the deal memo doesn&rsquo;t make sense, ask the agent. <em>Don&rsquo;t walk into settlement guessing.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">02</div>
        <div>
          <div class="sb-title">Deposit Report</div>
          <div class="sb-body">
            <p>Ask your agent and artist representation for the <strong>most up-to-date deposit report.</strong> This tells you how much money the buyer has already paid your artist up front against the guarantee. Without it, you don&rsquo;t know what the balance owed should be at the end of the night.</p>
            <p>A deposit report typically lives across a whole tour run &mdash; one row per show, with the venue, the deal terms, the deposit due, what&rsquo;s been received, and the date it landed. <em>The next page has an example.</em></p>
          </div>
        </div>
      </div>
    </div>

      <span>UP NEXT</span>
      <span class="arrow">— SAMPLE DEPOSIT REPORT →</span>
    </div>
  </div>

  <div class="body-area">
    <div class="module-tag">— 08 / TEMPLATE + ADVANCE —</div>
    <div class="page-title">PRE-FILL,<br>THEN PREPARE.</div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">03</div>
        <div>
          <div class="sb-title">Settlement Template Setup</div>
          <div class="sb-body">
            <p>Fill in what you can on your settlement template <strong>before show day.</strong> Anything you can pre-fill saves time at the table. Lock the fields you already know:</p>
            <ul>
              <li>Date · City · Venue · Capacity</li>
              <li>Artist name · Artist fee (from deal memo) · Deposit received (from deposit report)</li>
              <li>Buyer / Promoter contact info</li>
              <li>Ticket scaling &mdash; price tiers, on-sales, comps allocated</li>
              <li>Any pre-agreed flat expenses you already know (ad pack, rentage, etc.)</li>
            </ul>
            <p>By show day, your template should be 60-70% populated. The actuals fill the rest.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">The Settlement Worksheet</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>
          <span class="kit-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.5" stroke-linejoin="round">
              <rect x="6" y="3" width="13" height="16"/>
              <rect x="4" y="5" width="13" height="16"/>
              <line x1="7" y1="9" x2="14" y2="9"/>
              <line x1="7" y1="12" x2="14" y2="12"/>
              <line x1="7" y1="15" x2="12" y2="15"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">The <strong>Settlement Worksheet</strong> is the TM-side template you populate ahead of show day and reconcile against at the settle — ticket scaling, deposit tracking, venue and promoter expense columns, a clean walkout summary. The <strong>Settlement Guide</strong> walks the ten-step sequence and the math underneath it. Pinned to DOC-214 + DOC-308.</p>
    </div>

    <div class="step-block split">
      <div class="sb-row">
        <div class="sb-num">04</div>
        <div>
          <div class="sb-title">Advance Your Settlement</div>
          <div class="sb-body">
            <p>Just like we stay ahead by advancing the show, we advance the settlement. <strong>Leading up to show day, get the paperwork moving and look for opportunities to save money.</strong></p>
            <div class="split-grid">
              <div class="split-col">
                <h4>— Send the paperwork —</h4>
                <ul>
                  <li>Artist W-9 to the settlement contact</li>
                  <li>Banking details + wire instructions</li>
                  <li>Specify how you want to be paid &mdash; cash, check, or wire</li>
                  <li>If cash: get specific on how it&rsquo;s delivered. Counted twice. Bands or wrappers.</li>
                </ul>
              </div>
              <div class="split-col">
                <h4>— Reflect &amp; adjust —</h4>
                <ul>
                  <li>Recent shows raised any flags worth carrying forward?</li>
                  <li>Could you release holds / comps a few days out and free up tickets to sell?</li>
                  <li>Labor too high or too low for the build? Hospitality counts realistic?</li>
                  <li>Effective communication now = expense savings later</li>
                </ul>
              </div>
            </div>
            <p style="margin-top: 6px;"><em>Advancing the settlement is where money is found before the night even starts.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— STEPS 05 + 06 →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 08 / PRE-SETTLEMENT · BUDGET · TIMING —</div>
    <div class="page-title">CHECK THE NUMBERS,<br>PICK YOUR MOMENT.</div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">05</div>
        <div>
          <div class="sb-title">Pre-Settlement</div>
          <div class="sb-body">
            <p>Leading into show day, <strong>request a pre-settlement from the promoter</strong> so you can get an idea of where things are going to land. Most promoters can have one ready in the afternoon. Reviewing that information <em>on show day, in the afternoon</em>, can solve a lot of issues for you later in the night.</p>
            <p>What you&rsquo;re looking for in the pre-settlement:</p>
            <ul>
              <li>Anything that seems <strong>too high</strong> &mdash; flag and ask for backup</li>
              <li>Anything that seems <strong>too low</strong> &mdash; could this benefit the show or tour if it were raised?</li>
              <li>Expense lines you don&rsquo;t recognize &mdash; ask what they are</li>
              <li>Missing items you expected to see &mdash; ask where they live</li>
            </ul>
            <p><em>If something seems too low, ask whether raising it could directly improve the show.</em> That conversation is harder at midnight; it&rsquo;s easier at 3 PM.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">06</div>
        <div>
          <div class="sb-title">Budget Expenses</div>
          <div class="sb-body">
            <p>Gather all the expenses on your side and <strong>compare them to the budgeted expenses</strong> agreed to in the deal memo. Two columns: <em>what was promised</em> and <em>what showed up</em>. Where the two diverge, you have a conversation point.</p>
            <p>Some divergence is normal &mdash; weather, late-add labor, last-minute hospitality changes. But large gaps either direction earn a question.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">07</div>
        <div>
          <div class="sb-title">When To Settle</div>
          <div class="sb-body">
            <p>Figuring out <strong>when to settle is a skill of its own.</strong> Some TMs settle while the artist is on stage &mdash; the show is sold, the door counts are in, the math is mostly known. Others wait until the show comes down and the load-out is rolling. The right time depends on how prepared you are, the promoter&rsquo;s rhythm, your runway to bus call, and whether you&rsquo;re waiting on any actuals that only land at load-out. <em>A clean settlement is faster than a careful one is slow.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— STEPS 08 + 09 + 10 →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 08 / FINAL · SIGN · REPORT —</div>
    <div class="page-title">RECONCILE, SIGN,<br>REPORT.</div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">08</div>
        <div>
          <div class="sb-title">Final Settlement</div>
          <div class="sb-body">
            <p>When you request the final settlement, it should be delivered to you with <strong>all correlating receipts, invoices, and backup documents</strong> to support every recorded expense. Weigh actuals against budgeted; chase any fluctuations. Then input the actuals into your settlement template so it mirrors the promoter sheet side by side. <strong>Does all the math make sense? Does it give a reason for every dollar?</strong> The total should resolve to three numbers: <em>total expenses, gross box office revenue, final amount due to artist.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">09</div>
        <div>
          <div class="sb-title">Settle With Promoter</div>
          <div class="sb-body">
            <p>Sit down with the promoter. Go over any errors or questions, resolve issues, address the flags you found. Then sign off on the final settlement.</p>
            <ul>
              <li><strong>Both parties sign</strong> &mdash; you and the promoter</li>
              <li><strong>You get a signed copy</strong> to keep on hand &mdash; physical or scanned, ideally both</li>
              <li><strong>Collect your payment</strong> in the form you arranged: cash counted twice, check inspected for accuracy, or wire confirmed sent</li>
            </ul>
            <p>If you arranged cash, photograph it before it&rsquo;s out of sight. <em>Cash is the easiest thing in the world to argue about later.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="step-block">
      <div class="sb-row">
        <div class="sb-num">10</div>
        <div>
          <div class="sb-title">Update + Report</div>
          <div class="sb-body">
            <p>Update your road report <strong>as soon as you&rsquo;ve settled the show.</strong> Sometimes that&rsquo;s same-night, sometimes it&rsquo;s next morning &mdash; but getting ahead of this is a tenet of good tour accounting. Errors are easiest to catch the same night, while everything is fresh.</p>
            <p>Once the road report is updated, <strong>send a nightly report</strong> to the rest of the team:</p>
            <ul>
              <li>Headline numbers &mdash; tickets sold, gross, net to artist</li>
              <li>How the day went &mdash; anything notable, good or bad</li>
              <li>Anything that needs follow-up tomorrow</li>
            </ul>
            <p><em>This is how the BM, agent, and artist stay in the loop without having to ask.</em></p>
          </div>
        </div>
      </div>
    </div>

    <div class="next-up">

      <span class="arrow">— SAMPLE PROMOTER SETTLEMENT →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 08 / VOCABULARY · 1 OF 3 —</div>
    <div class="page-title">SETTLEMENT<br>VOCABULARY.</div>
    <div class="page-sub">The words and acronyms you&rsquo;ll see on every sheet. Defined plain.</div>

    <p class="para">Settlement sheets carry decades of industry shorthand. Here&rsquo;s a working glossary &mdash; not exhaustive, but enough to read most rooms.</p>

    <div class="vocab-section">
      <div class="vs-head">— Variable Expenses (Scale With Ticket Sales) —</div>
      <div class="vocab-grid">
        <div class="term"><strong>ASCAP</strong> &mdash; Performing Rights Organization. <em>American Society of Composers, Authors and Publishers.</em> Licensing fee paid by the venue based on capacity and ticket sales.</div>
        <div class="term"><strong>BMI</strong> &mdash; Performing Rights Organization. <em>Broadcast Music, Inc.</em> Parallel licensing org to ASCAP; venue pays both.</div>
        <div class="term"><strong>SESAC</strong> &mdash; Performing Rights Organization. <em>Society of European Stage Authors and Composers.</em> Third major PRO in the US.</div>
        <div class="term"><strong>GMR</strong> &mdash; Performing Rights Organization. <em>Global Music Rights.</em> Newer PRO; affects venues that license its catalog.</div>
        <div class="term"><strong>Credit Card Fees</strong> &mdash; Percentage taken on credit card ticket sales by the processor (often 3-4%). Sometimes called &ldquo;CC Fees&rdquo; on the sheet.</div>
        <div class="term"><strong>Insurance</strong> &mdash; Cost per head to hold an insurance policy covering the operations of the show. Quoted in $X.XX/head, multiplied by tickets sold.</div>
        <div class="term"><strong>Rentage</strong> &mdash; Percentage-based cost for use of the venue. Usually calculated from gross box office revenue <em>after</em> deduction of facility fee (NBOR).</div>
        <div class="term"><strong>NBOR</strong> &mdash; <em>Net Box Office Revenue.</em> Gross ticket sales minus facility fee and other off-the-top deductions. The base most percentage deals calculate against.</div>
        <div class="term"><strong>Sponsorship Share</strong> &mdash; If the show has tour sponsors, a percentage may flow back to the venue or promoter. Specified in the deal memo.</div>
        <div class="term"><strong>Merch Percentage</strong> &mdash; Venue&rsquo;s cut of merchandise sales. Often 20-25% on soft goods, 10-15% on hard goods, sometimes 0%. Negotiated in the deal memo.</div>
      </div>
    </div>

  <div class="body-area">
    <div class="module-tag">— 08 / VOCABULARY · 2 OF 3 —</div>
    <div class="page-title">FIXED EXPENSES<br>+ DEAL SPLITS.</div>

    <div class="vocab-section">
      <div class="vs-head">— Fixed Expenses (Flat Costs Regardless of Tickets) —</div>
      <div class="vocab-grid">
        <div class="term"><strong>Production</strong> &mdash; Catch-all line covering the production team&rsquo;s base costs &mdash; can include house production manager, basic lighting / audio crew, the venue&rsquo;s standard load-in / load-out.</div>
        <div class="term"><strong>Stagehands</strong> &mdash; Local labor hired through IATSE or non-union pools for load-in, show calls, and load-out. Billed hourly with rate sheets attached.</div>
        <div class="term"><strong>Security</strong> &mdash; Local security guards staffing the venue for the show. Hourly. Headcount agreed in advance.</div>
        <div class="term"><strong>Hospitality</strong> &mdash; The cost of meeting the artist&rsquo;s hospitality rider &mdash; catering counts, dressing-room provisions, runners. Sometimes billed as a flat buyout.</div>
        <div class="term"><strong>Ad Pack</strong> &mdash; Pre-show advertising budget for the show. Radio, print, digital, posters. Quoted as a flat dollar amount, sometimes adjustable based on need.</div>
        <div class="term"><strong>Runners</strong> &mdash; Local drivers/runners during the show day. Hourly or flat. Cover artist transport, errands, food runs.</div>
        <div class="term"><strong>Catering / Buyout</strong> &mdash; Hot meals provided by the venue, or a cash buyout in lieu so the artist team handles their own meals.</div>
        <div class="term"><strong>Parking</strong> &mdash; Bus + truck parking at or near the venue. Flat or per-vehicle.</div>
        <div class="term"><strong>Facility Fee</strong> &mdash; A per-ticket fee added to the price and taken off the top of gross before NBOR is calculated. Quoted as $X/ticket.</div>
        <div class="term"><strong>Box Office</strong> &mdash; The cost of staffing the box office for the show day. Sometimes called &ldquo;BO&rdquo; on the sheet.</div>
      </div>
    </div>

    <div class="vocab-section">
      <div class="vs-head">— Deal Splits &amp; Structures —</div>
      <div class="vocab-grid">
        <div class="term"><strong>Flat Guarantee</strong> &mdash; Artist gets paid a fixed dollar amount regardless of ticket sales. Simplest deal structure.</div>
        <div class="term"><strong>Versus Deal</strong> &mdash; Artist gets the greater of: (a) the guarantee, or (b) a percentage of net (often 85% NBOR). &ldquo;X versus Y%&rdquo;.</div>
        <div class="term"><strong>Door Deal</strong> &mdash; Pure percentage split with no guarantee. Common at very small or very large rooms.</div>
        <div class="term"><strong>Plus Deal</strong> &mdash; Guarantee plus a percentage starting after a threshold. &ldquo;X plus 85% over Y.&rdquo;</div>
        <div class="term"><strong>Bonuses / Escalators</strong> &mdash; Additional payouts triggered by hitting specific sell-through or revenue thresholds.</div>
        <div class="term"><strong>Walkout Potential</strong> &mdash; Theoretical maximum the artist could earn at full sell-through under the current deal structure.</div>
        <div class="term"><strong>Net Net Show</strong> &mdash; Net Box Office Revenue minus all expenses (variable + fixed). The pool the artist percentage applies to.</div>
        <div class="term"><strong>Cost Per Head</strong> &mdash; Total show expenses divided by tickets sold. A quick read on how expensive the night was.</div>
      </div>
    </div>

    <div class="module-tag">— 08 / VOCABULARY · 3 OF 3 —</div>
    <div class="page-title">MONEY MOVEMENT<br>+ DOCUMENTS.</div>

    <div class="vocab-section">
      <div class="vs-head">— How the Money Moves —</div>
      <div class="vocab-grid">
        <div class="term"><strong>Deposit</strong> &mdash; Money paid by the buyer up front against the guarantee. Usually 10-50% of the guarantee, paid weeks before the show.</div>
        <div class="term"><strong>Balance Due</strong> &mdash; What&rsquo;s owed to the artist at settlement after subtracting the deposit and any withholding from the total earned.</div>
        <div class="term"><strong>Holdback</strong> &mdash; A portion of the artist&rsquo;s payment held until a condition is met (e.g., post-show paperwork, no damage to the venue). Should be returned promptly.</div>
        <div class="term"><strong>Wire</strong> &mdash; Electronic bank-to-bank transfer. Most common form for higher-dollar settlements. Requires wire instructions from artist&rsquo;s banking.</div>
        <div class="term"><strong>Check</strong> &mdash; Paper check, usually made to the artist&rsquo;s touring entity. Inspect for accuracy before leaving.</div>
        <div class="term"><strong>Cash</strong> &mdash; Physical cash. Count twice, photograph, log it the same night. Common for smaller settlements or per the deal.</div>
        <div class="term"><strong>Withholding</strong> &mdash; State or local income tax withheld from the settlement payment. Varies by state. Usually 0-7% of net to artist.</div>
        <div class="term"><strong>W-9</strong> &mdash; IRS form identifying the artist&rsquo;s tax entity. Required by the buyer to issue payment in compliance with US tax law.</div>
      </div>
    </div>

    <div class="vocab-section">
      <div class="vs-head">— Documents in the Settlement Family —</div>
      <div class="vocab-grid">
        <div class="term"><strong>Deal Memo</strong> &mdash; The binding offer / acceptance document spelling out the deal structure. Read end to end before settlement.</div>
        <div class="term"><strong>Deposit Report</strong> &mdash; Multi-show tracker of guarantees, deposits due, payments received. From the agent.</div>
        <div class="term"><strong>Pre-Settlement</strong> &mdash; Promoter&rsquo;s draft of the settlement, prepared in advance of show day or in the afternoon. Used to flag issues early.</div>
        <div class="term"><strong>Promoter Settlement</strong> &mdash; The promoter&rsquo;s formal final settlement, presented at end of night with backup documentation.</div>
        <div class="term"><strong>TM Settlement</strong> &mdash; Your independent reconciliation of the same math, used to verify and to record what was agreed.</div>
        <div class="term"><strong>Backup / Receipts</strong> &mdash; The receipts, invoices, and documentation supporting each expense line. Should accompany the final settlement.</div>
        <div class="term"><strong>Ticket Audit</strong> &mdash; A box-office report showing scanned, sold, comped, killed tickets &mdash; the underlying numbers for the gross.</div>
        <div class="term"><strong>Signed Settlement</strong> &mdash; The final signed document. Both parties sign. You keep a copy. <em>This is the receipt.</em></div>
      </div>
    </div>

  <div class="body-area">
    <div class="module-tag">— 08 / FIELD NOTES —</div>
    <div class="page-title">FIELD NOTES.</div>
    <div class="page-sub">Habits that pay off + things that surprise people.</div>

    <div class="fn-grid">
      <div class="fn-col">
        <div class="fn-head">— HABITS —</div>
        <ul>
          <li><strong>Keep the contract open during settle.</strong> Print or pull up the deal memo. Refer to it without apology.</li>
          <li><strong>Photograph cash before it&rsquo;s out of sight.</strong> Bands counted. Stacks on the table. Two angles.</li>
          <li><strong>Sign two copies.</strong> Promoter keeps one, you keep one. Snap a phone photo of yours before you leave.</li>
          <li><strong>Log the night-of total</strong> in your road report before the bus rolls. Errors are easiest to catch while everything is fresh.</li>
          <li><strong>Thank the box office.</strong> They worked the night running ticket math; their counts feed yours.</li>
          <li><strong>Save the backup.</strong> All receipts and invoices that came with the final settlement get scanned and filed.</li>
        </ul>
      </div>

        <div class="fn-head">— SURPRISES —</div>
        <ul>
          <li><strong>The promoter wants you to feel good about it too.</strong> Most are pros &mdash; clean settlement is a relationship asset for them.</li>
          <li><strong>&ldquo;Found money&rdquo; is a real thing.</strong> Holds released, comps reduced, advertised expenses lower than budgeted. It adds up over a tour.</li>
          <li><strong>Withholding catches first-timers.</strong> State tax can be 5-7% in some states; your balance due will look smaller than your earned amount.</li>
          <li><strong>Cash settlements get heavier than expected.</strong> $30K in $20s is meaningful weight. Have a plan for where it goes.</li>
          <li><strong>The math almost always ties.</strong> If it doesn&rsquo;t, it&rsquo;s usually one line item entered wrong &mdash; not malice. Look for the column.</li>
          <li><strong>Settling mid-show takes nerve.</strong> First time you do it, you&rsquo;ll feel rushed. By the fifth time, it&rsquo;s the easiest path.</li>
        </ul>
      </div>
    </div>

  <div class="body-area">
    <div class="module-tag">— DOC-109 / CLOSING —</div>
    <div class="page-title">MODULE <span class="accent">NINE.</span></div>
    <div class="page-sub">(The bonus module.)</div>

    <p class="para">Just kidding &mdash; this isn&rsquo;t a whole added module. But I did want this portion to carry the weight as if it were one. So here it is:</p>

    <div class="sec-head">Take Care Of Your People.</div>

    <p class="para">Take care of your tour. Take care of the venue staff. Thank them. Take the time. The systems we just walked through can become day-in and day-out &mdash; but whatever your system is, make sure there&rsquo;s an aspect to it that includes a thank-you, an appreciation, or even just a moment of curiosity &mdash; <em>what are you doing, and how are you doing it?</em> Real questions, asked with intent.</p>

    <p class="para">As elaborate as some systems are &mdash; and as big as some shows get &mdash; <strong>it&rsquo;s people that put the systems in motion.</strong> Every page in these modules is just thinking on paper until somebody walks into a building and starts the day. Without people taking that first step to implement it, none of this matters. Tools, templates, strategies &mdash; all of them are downstream of someone choosing to use them.</p>

    <div class="pull-quote">
      <p>The systems are great. The people are what move them. It&rsquo;s you. It&rsquo;s me. It&rsquo;s us.</p>
    </div>

    <div class="sec-head">And Taking Care Of <span class="accent">Yourself.</span></div>

    <p class="para">Taking care of your people includes taking care of you. <strong>Bottom line &mdash; this can come in a lot of different ways.</strong> I&rsquo;d be remiss not to point a way toward some real help in this space, because some aspects of this industry aren&rsquo;t normal, and they can be taxing in ways the work itself doesn&rsquo;t make obvious. Long stretches away from home. Sleep on a moving bus. The pressure of running someone else&rsquo;s calendar. The come-down after a great show. The silence after a bad one.</p>

    <p class="para">If any of that ever lands heavy &mdash; for you or for somebody you&rsquo;re touring with &mdash; these are real, working resources built specifically for people on the road. Bookmark them. Pass them along. Use them if you need them.</p>

    <div class="resources-block">
      <div class="rb-tier">— 24/7 Crisis &amp; Global Support —</div>
      <div class="rb-item"><strong>Backline</strong> (<code style="font-family: 'JetBrains Mono', monospace; color: var(--orange);">backline.care</code>) &mdash; A central hub connecting music professionals and their families with trusted care providers. Case management, support groups (including <em>The Green Room</em>), and a 24/7 mental health crisis line: <span class="rb-num">call 1-855-BLINE99</span> or <span class="rb-num">text 254-639</span>.</div>
      <div class="rb-item"><strong>Music Industry Therapist Collective</strong> &mdash; Confidential drop-in welfare coaching and therapy sessions, designed specifically for the unpredictable schedules of life on tour.</div>

      <div class="rb-tier second">— Financial &amp; Medical Safety Nets —</div>
      <div class="rb-item"><strong>MusiCares</strong> &mdash; The <em>Resilience on the Road Toolkit</em>, plus emergency financial assistance, addiction recovery, and physical / mental health resources.</div>
      <div class="rb-item"><strong>Music Health Alliance</strong> &mdash; Healthcare advocacy, financial assistance, and a nationwide Mental Health Fund for music professionals.</div>

      <div class="rb-disclaimer">Contact info above is current as of this writing. Phone numbers and resources change &mdash; verify before sharing if it&rsquo;s been a while. Most venues also post resources around backstage; keep an eye out and know what your room has on hand.</div>
    </div>

    <p class="para" style="margin-top: 10px;">None of this is to make the letter heavy. It&rsquo;s because the road is a beautiful thing and it&rsquo;s also a hard thing &mdash; and the people who do it best are the ones who know where the help lives <em>before</em> they need it.</p>

  </div>
