  <div class="body-area">
    <div class="module-tag">— 02 / THE DEAL —</div>
    <div class="page-title">THE DEAL</div>
    <div class="page-sub">How the show gets booked, and what&apos;s actually in the contract.</div>

    <p class="para">Before the tour, there is a deal. The agent takes the artist&apos;s calendar and routes the run — calling promoters in each market, fielding offers, lining up dates. Each promoter offers a guarantee, a door deal, or some hybrid. Representation signs off. A contract gets issued, and attached to it is the rider. That packet is the founding document of every show.</p>

    <div class="deal-flow">
      <div class="df-step">
        <div class="df-num">— 01 —</div>
        <div class="df-name">AGENT ROUTES</div>
      </div>
      <div class="df-arrow">→</div>
      <div class="df-step">
        <div class="df-num">— 02 —</div>
        <div class="df-name">PROMOTER OFFER</div>
      </div>
      <div class="df-arrow">→</div>
      <div class="df-step">
        <div class="df-num">— 03 —</div>
        <div class="df-name">COUNTER</div>
      </div>
      <div class="df-arrow">→</div>
      <div class="df-step">
        <div class="df-num">— 04 —</div>
        <div class="df-name">CONFIRM</div>
      </div>
      <div class="df-arrow">→</div>
      <div class="df-step final">
        <div class="df-num">— 05 —</div>
        <div class="df-name">CONTRACT<br>+ RIDER</div>
      </div>
    </div>

    <div class="sec-head">The shape of the offer</div>
    <ul class="topics">
      <li><strong>Guarantee</strong> — a flat fee paid by the promoter regardless of ticket sales. The artist gets the same number whether the room sells out or sells half.</li>
      <li><strong>Door deal</strong> — the artist takes a percentage of net ticket revenue after expenses. Higher upside, more risk.</li>
      <li><strong>Hybrid (versus / plus)</strong> — guarantee against a percentage of net (whichever is higher), or guarantee plus a percentage above a defined break-even.</li>
      <li><strong>Walkout deal</strong> — settled the night of the show against actuals. Common at festivals and at the deal-by-deal indie level. (Covered in depth in Module 08.)</li>
    </ul>

    <div class="pull-quote">
      <p>The deal is the floor. The rider is the blueprint of how the show actually shows up in the room.</p>
    </div>

    <p class="para">The deal answers the financial question — <em>what is each show worth, and on what terms.</em> The rider answers the operational one — <em>what has to be true on the day for the show to happen as designed.</em> They live in the same packet for a reason. One without the other is incomplete.</p>

    <div class="next-up">
      <span>NEXT</span>
      <span class="arrow">— READING THE RIDER →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 02 / THE RIDER —</div>
    <div class="page-title">READING THE RIDER<br>LIKE A WORKING DOC</div>
    <div class="page-sub">Two documents. Two audiences. One source of truth on show day.</div>

    <p class="para">Every rider is actually two documents bound together — a hospitality rider and a technical rider. Different readers, different stakes, different pages of your binder. Knowing which is which keeps you fluent in the room.</p>

    <div class="rider-compare">
      <div class="rc-col left">
        <div class="rc-tag">— DOCUMENT A —</div>
        <div class="rc-title">HOSPITALITY RIDER</div>
        <ul>
          <li>Dressing room counts and layout</li>
          <li>Catering — meal counts, dietary, timing</li>
          <li>Green room provisions and beverages</li>
          <li>Towels, ice, hand soap, the small stuff</li>
          <li>Crew meals and timing relative to load-in</li>
          <li>Runner availability and runner duties</li>
          <li>Wifi, parking, security access</li>
        </ul>
      </div>
      <div class="rc-col right">
        <div class="rc-tag">— DOCUMENT B —</div>
        <div class="rc-title">TECHNICAL RIDER</div>
        <ul>
          <li>Stage dimensions, weight loads, rigging points</li>
          <li>Power requirements — voltage, amps, distro</li>
          <li>PA spec, console preference, monitor count</li>
          <li>Lighting plot or rig spec</li>
          <li>Backline list — what tours, what venue provides</li>
          <li>Crew call — how many hands, what skill levels</li>
          <li>Load-in / sound check / set / load-out timing</li>
        </ul>
      </div>
    </div>

    <div class="pull-quote">
      <p>The rider is your opening position. The advance is the negotiation. The day of show is the result.</p>
    </div>

    <p class="para">Writing your own rider — or reading someone else&apos;s — the principle is the same. Be specific where it matters. Be flexible where it doesn&apos;t. Flag the deal-breakers in plain language so a tired venue rep at 9 AM doesn&apos;t miss them.</p>

    <p class="para">The rider is alive. It changes as the tour learns what the road actually looks like. Update it between runs. Don&apos;t carry a five-year-old document into a tour that&apos;s grown.</p>

      <span>NEXT</span>
      <span class="arrow">— DESIGNING TO THE ROUTE →</span>
    </div>

    <div class="page-title">DESIGNING THE PACKAGE<br>TO FIT THE ROUTE</div>
    <div class="page-sub">Build to the median. Plan the upscale. Plan the flex.</div>

    <p class="para">The vision tells you what the show is. The route tells you what it has to fit inside. Once the design is locked, the work shifts to making it travel — across rooms that are never the same shape twice. The rule of thumb: <strong>design to the median across the route.</strong> Not the largest room. Not the smallest. The shape most of the route looks like.</p>

        <div class="sq b"></div><div class="sq b"></div><div class="sq b"></div><div class="sq b"></div>
        <div class="sq b"></div><div class="sq b"></div><div class="sq t"></div><div class="sq t"></div>
      </div>

      <div class="route-bands">

    <p class="para">Build to the median once. Then design the B version and the flex mode <em>at the same time</em> — not when you arrive at a venue and find a problem. Three packages, one design language.</p>

    <div class="sec-head">Stay in rhythm with your vendor</div>
    <p class="para">The other voice in the room during this phase — and the one most easily overlooked — is your production vendor. The shop renting you the rig, the trucks, the consoles. Their inventory shapes what&apos;s actually buildable. If you fall in love with a specific fixture, the vendor can tell you whether there are 200 of them on the West Coast or whether you&apos;ll be borrowing from three sub-rentals to make a count. They know what&apos;s tight, what&apos;s plentiful, what travels well, what fails on the road. Let them in early — during design, not during budget — and the package gets sharper. They&apos;ll often steer you toward selections that serve the creative <em>and</em> save real money, because they know what&apos;s already on the floor. The vendor relationship deepens in <strong>Module 03</strong> — budget is where the design and the inventory finally have to reconcile.</p>

    <div class="page-title">VENUE, MARKET,<br>PRODUCTION LOAD</div>
    <div class="page-sub">Three forces shaping every show on the route.</div>

    <p class="para">Every date on a tour is a negotiation between three forces. The room you&apos;re playing. The market you&apos;re playing in. And the production load you&apos;re bringing in. None of them is fixed. All of them talk to each other.</p>

    <div class="sec-head">How the forces talk to each other</div>
    <ul class="topics">
      <li><strong>Venue ↔ Load</strong> — the room sets the upper limit on what your rig can be. Ceiling height, weight load, power, dock access. The advance reconciles design ambition against what the building can hold.</li>
      <li><strong>Market ↔ Venue</strong> — the size of the market determines what room you can play. Bigger market, bigger room. Smaller market, smaller room — and the production has to flex to match.</li>
      <li><strong>Market ↔ Load</strong> — the market also drives local labor cost, union jurisdiction, freight in/out, and trucking distances. Two markets the same size can still run twenty-percent apart in production cost depending on local conditions.</li>
    </ul>

    <p class="para">The deep work on advancing each room — the line-by-line reconciliation between rider, venue, and show — lives in <strong>Module 04</strong>. This page is the systems view. Understand the triangle first; the line items make sense after.</p>

    <div class="module-tag">— FIELD NOTES —</div>
    <div class="page-title">THINGS THAT<br>SURPRISE PEOPLE</div>
    <div class="page-sub">A few things the deal-and-design phase teaches you only by living it.</div>

    <p class="para">Some of this lands harder once you&apos;ve been around a few of these. Knowing it ahead of time means you&apos;ll catch the dynamic when it shows up.</p>

    <div class="sec-head">The vision conversation has to happen twice</div>
    <p class="para">Once at the front, before any design exists — you&apos;re extracting intent. And once again after the first rendering — because seeing it changes what the artist wants. Plan for both. The second conversation isn&apos;t a redo; it&apos;s the design earning the vision.</p>

    <div class="sec-head">Renderings sell the show internally before the audience ever sees it</div>
    <p class="para">A rendering isn&apos;t just for the production team. It&apos;s the document that gets shown to the label, to management, to the artist&apos;s inner circle, to the people writing checks. Half of the rendering&apos;s job is building belief. Treat it that way — and budget for at least one polished pass, not just the technical one.</p>

    <div class="sec-head">A tour can pivot a design mid-run, but it&apos;s harder than people think</div>
    <p class="para">When the rooms shift — bigger venues get added, a leg gets re-routed through smaller markets — the package has to flex. The B version and flex mode you designed at the start are what saves you. Mid-run redesigns without a pre-built adaptation plan are the most expensive thing a tour can do.</p>

    <div class="sec-head">Creative-led versus production-led tours</div>
    <p class="para">Some tours start from the design and work outward — the show drives the budget, the routing, the crew size. Others start from the deal and the route, and the design has to fit inside what&apos;s already locked. Knowing which kind of tour you&apos;re on tells you who has the final word in any given disagreement. It&apos;s usually obvious within the first three production calls.</p>

    <div class="page-title">WHAT IT IS,<br>WHY IT IS,<br>HOW IT WORKS</div>

    <div class="trio">
      <div class="block">
        <div class="b-tag">— WHAT IT IS —</div>
        <div class="b-text">Two parallel tracks — the deal and the design — that meet at the show on stage. The contract frames the tour. The vision fills it. The package translates one into the other.</div>
      </div>
      <div class="block">
        <div class="b-tag">— WHY IT IS —</div>
        <div class="b-text">A show that travels well comes from a vision held at the center and a build sized to the route. Skip the vision and the show feels hollow. Skip the route fit and the rig breaks the building.</div>
      </div>
      <div class="block">
        <div class="b-tag">— HOW IT WORKS —</div>
        <div class="b-text">Start with the vision. Translate it — with a creative team or with frameworks built for smaller scale. Read the deal. Read the rider. Build to the median. Plan the upscale and the flex. Hand the package to the road.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>The design is what the budget has to price. Hold this module — and Module 03 will read like the next sentence.</p>
    </div>

    <p class="para">Module 03 — <strong>Building Your Budget</strong> — turns the design and the deal into a stack of line items. Trucks. Buses. Crew. Backline. Production. Per diems. Insurance. It&apos;s also where the vendor relationship deepens — design and inventory finally have to reconcile against real numbers. Then the income side. Then the math that decides whether the tour is real.</p>

  <div class="body-area">
    <div class="module-tag">— 03 / OPENING —</div>
    <div class="page-title">THIS IS<br>ABOUT MONEY.</div>
    <div class="page-sub">Which means it's about people. Treat it accordingly.</div>

    <p class="para">A quick framing note before we walk this through. Budgeting lives in a specific seat — usually the tour manager&apos;s, sometimes the production manager&apos;s, occasionally both at once. To keep this module clear, we&apos;re going to write it as if we&apos;re talking directly to that seat. If that&apos;s not where you sit yet, this is still your read — take it as a window into how the budget gets built, and pull the pieces that scale to your operation. The principles hold at every scale; we&apos;ll flag the variants along the way.</p>

    <p class="para">A budget isn&apos;t a math exercise. It&apos;s the map of where the money flows — and the money flows to lives. To rent payments. To meals. To kids&apos; schools. The number on the page is the number behind every paycheck the tour will write.</p>

      <div class="stack-col">

    <p class="para">A budget that&apos;s wrong by 5% can wipe a six-month run of work. A budget that&apos;s right can give the artist their next album, the crew their next mortgage payment, and you the peace of mind without waking up at 3 AM wondering if you forgot to log a receipt or coded an expense wrong. Treat every line item like someone&apos;s rent depends on it. Because it does.</p>

    <p class="para">None of that means the weight has to land on you. <strong>This module exists because the math is real and the stakes are real</strong> — and because a tour manager working with the right tools, the right templates, and the right insights doesn&apos;t carry it alone. The system carries it with you.</p>

    <p class="para">Throughout this module we&apos;ll spell out the categories, the line items first-timers miss, the way income and expenses talk to each other, and the working tools we lean on. Use them. Adapt them. Make them yours. The goal isn&apos;t to make you a finance person. It&apos;s to put the heaviest parts of the job on rails so the rest of your work can breathe.</p>

  <div class="body-area">
    <div class="module-tag">— 03 / TWO BUDGETS —</div>
    <div class="page-title">EVERY TOUR HAS<br>TWO BUDGETS</div>
    <div class="page-sub">The one on paper. The one that actually plays out across sixty cities.</div>

    <p class="para">Every working tour has two budgets running at the same time. The first one is built before the run — assumptions, quotes, estimates, market research. It&apos;s the number you commit to. The second one is the one that actually happens — sixty days of receipts, deposits, fuel costs, market labor, weather. <strong>The job is to make those two numbers look as much alike as possible.</strong></p>

    <div class="budget-compare">
      <div class="bc-col left">
        <div class="bc-tag">— BUDGET A —</div>
        <div class="bc-title">THE PAPER BUDGET</div>
        <ul>
          <li>Built from quotes, market rates, prior-tour data</li>
          <li>Locked before the first show</li>
          <li>Assumes average conditions across the run</li>
          <li>The version the office, management, and the artist sign off on</li>
          <li>Includes contingency for what you can&apos;t predict</li>
          <li>Defended in spreadsheets and pre-tour calls</li>
        </ul>
      </div>
      <div class="bc-col right">
        <div class="bc-tag">— BUDGET B —</div>
        <div class="bc-title">THE ROAD BUDGET</div>
        <ul>
          <li>Built from actual receipts, actual deposits, actual costs</li>
          <li>Updated every show day</li>
          <li>Reflects real conditions — fuel, freight, labor, sales</li>
          <li>The version the road report tracks live</li>
          <li>Burns through contingency when reality bites</li>
          <li>Reconciled against the paper budget every week</li>
        </ul>
      </div>
    </div>

    <div class="pull-quote">
      <p>A budget isn&apos;t a prediction. It&apos;s a position. It tells you where you can absorb a hit and where you can&apos;t.</p>
    </div>

    <p class="para">When the two budgets diverge — and they will — the gap is a story. Either you missed something in the paper version, or something on the road shifted. Both are useful information. Catching the gap early is what turns budget work from a guessing game into a working system.</p>

    <div class="binder-callout">
      <div class="kit-title-row">

      <p class="bc-text-dark">The paper budget doesn&rsquo;t live in your head — it lives in a model. The <strong>Master Budget</strong> is the consolidated planning sheet every line of this module gets built into: income tiers, the full expense stack, contingency, the working P&amp;L. The <strong>Master Budget Guide</strong> walks it tab by tab. Pinned to DOC-201 + DOC-302.</p>

  <div class="body-area">
    <div class="module-tag">— 03 / INCOME —</div>
    <div class="page-title">WHAT<br>COMES IN</div>
    <div class="page-sub">Before you spend, know what you actually have.</div>

    <p class="para">Most tour-management training jumps straight to expenses, but the income side gets the budget started. As deals land and shows get secured, start calculating all of the income and the potential ways it fluctuates — and identify where the variables sit. Getting an accurate picture of a tour&apos;s gross income is usually simpler than projecting every single expense across the whole tour. A clear calculation on projected income should be priority number one — it&apos;s the framework and the basis for where your budgets and expenses land as you plan and design the rest of the tour.</p>

    <div class="income-stack">
      <div class="is-tag">— TYPICAL INCOME LINES, BY RELATIVE WEIGHT —</div>
      <div class="is-row">
        <div class="is-name">Guarantees</div>
        <div class="is-bar"><div class="fill" style="width: 85%;"></div></div>
        <div class="is-note">— USUALLY THE LARGEST —</div>
      </div>
      <div class="is-row">
        <div class="is-name">Door / Splits / Overages</div>
        <div class="is-bar"><div class="fill" style="width: 55%;"></div></div>
        <div class="is-note">— WHEN ROOMS HIT —</div>
      </div>
      <div class="is-row">
        <div class="is-name">Merch (Net)</div>
        <div class="is-bar"><div class="fill" style="width: 40%;"></div></div>
        <div class="is-note">— VENUE TAKES A CUT —</div>
      </div>
      <div class="is-row">
        <div class="is-name">VIP / M&amp;G</div>
        <div class="is-bar"><div class="fill" style="width: 20%;"></div></div>
        <div class="is-note">— TOUR-DEPENDENT —</div>
      </div>
      <div class="is-row">
        <div class="is-name">Sponsor / Brand</div>
        <div class="is-bar"><div class="fill" style="width: 15%;"></div></div>
        <div class="is-note">— IF SECURED —</div>
      </div>
      <div class="is-row">
        <div class="is-name">Day-of (Misc)</div>
        <div class="is-bar"><div class="fill" style="width: 5%;"></div></div>
        <div class="is-note">— ROUNDING ERROR —</div>
      </div>
    </div>

    <div class="sec-head">A few things worth flagging</div>
    <ul class="topics">
      <li><strong>Merch is gross-vs-net.</strong> Most venues take a percentage off the top. The number you build the budget against is net, not gross.</li>
      <li><strong>Door deals are projections.</strong> If half the run is on splits, your income line is a range, not a fixed number. Plan for the floor.</li>
      <li><strong>VIP and sponsor revenue is conditional.</strong> Don&apos;t book the tour against money that isn&apos;t in writing. If it lands, it&apos;s upside.</li>
      <li><strong>Get specific on the timing.</strong> When does each line actually pay? Some clear day-of, some clear at settlement, some clear weeks after.</li>
    </ul>

  <div class="body-area">
    <div class="module-tag">— 03 / WATCH-OUTS —</div>
    <div class="page-title">LINE ITEMS<br>FIRST-TIMERS MISS</div>
    <div class="page-sub">The categories that quietly eat budgets when nobody&apos;s looking.</div>

    <p class="para">There are line items that don&apos;t announce themselves. They aren&apos;t exotic. They&apos;re ordinary, common, and easy to underweight when you&apos;re building from a blank page. These are the ones experienced PMs check first — because these are the ones that quietly eat budgets when nobody&apos;s looking.</p>

    <div class="alerts">
      <div class="alert">
        <div class="alert-num">— 01 —</div>
        <div class="alert-name">THE PRODUCTION FEE FLOOR</div>
        <div class="alert-sub">The &ldquo;house&rdquo; tax.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>New PMs often budget for what they bring — their crew, their console. They forget that the venue often mandates the use of in-house personnel (riggers, house audio techs) or equipment (forklifts, spot operators) to satisfy local union collective bargaining agreements (CBAs).</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Assuming a venue is &ldquo;plug-and-play.&rdquo;</div>
        <div class="alert-row"><span class="row-label">Fix</span>Early, detailed communication with the venue&apos;s production manager to obtain their local CBA requirements and house equipment rates.</div>
      </div>
      <div class="alert">
        <div class="alert-num">— 02 —</div>
        <div class="alert-name">DAY-OFF COSTS</div>
        <div class="alert-sub">The silent killer.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>A 30-date tour is actually a 40-to-45-day tour once travel, rehearsal, and off-days are included. The tour might not be earning a show fee, but the buses are still idling, the hotels are still booked, and the crew still needs per diem.</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Budgeting solely on the number of show days.</div>
        <div class="alert-row"><span class="row-label">Fix</span>Calculate the daily burn rate — bus + hotel + per diem — and multiply it by the entire duration of the tour, not just show nights.</div>
      </div>
      <div class="alert">
        <div class="alert-num">— 03 —</div>
        <div class="alert-name">INSURANCE &amp; COI</div>
        <div class="alert-sub">The administrative hurdle.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>General Liability is one thing, but naming every venue, promoter, and city municipality as &ldquo;additionally insured&rdquo; on a Certificate of Insurance can trigger high administrative fees from brokers. International touring requires specific ATA Carnets for gear and specialized liability insurance.</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Thinking insurance is a one-time, cheap fee.</div>
        <div class="alert-row"><span class="row-label">Fix</span>Allocate a dedicated &ldquo;Insurance &amp; Compliance&rdquo; line item, and budget for brokers who specialize in entertainment.</div>
      </div>
      <div class="alert">
        <div class="alert-num">— 04 —</div>
        <div class="alert-name">LOCAL LABOR MULTIPLIERS</div>
        <div class="alert-sub">The regional variance.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>Loading in at a non-union venue in a small town costs significantly less than a union house (IATSE Local 1) in a major city. Local union rules around meal breaks, minimum call times (4-hour or 8-hour guarantees), and overtime (double-time after 8 or 10 hours) can cause costs to skyrocket.</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Using a flat national average ($25/hr) when the real rate in tier-one cities is $60+/hr.</div>
        <div class="alert-row"><span class="row-label">Fix</span>City-by-city, union-vs-non-union, data-driven forecasting.</div>
      </div>
      <div class="alert">
        <div class="alert-num">— 05 —</div>
        <div class="alert-name">FREIGHT IN AND OUT</div>
        <div class="alert-sub">The hidden logistics.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>Touring is logistics. Freight is the cost of moving set pieces, audio, video, and lighting that don&apos;t fit on the bus. Overnight LTL (less-than-truckload), specialized handling for fragile gear, and the massive expense of air-freighting across an ocean (or between non-contiguous dates) is often underestimated.</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Confusing freight with trucking (moving the band) and using a guesstimate for shipping costs.</div>
        <div class="alert-row"><span class="row-label">Fix</span>Get specialized routing logistics quotes based on exact weight, volume, and urgency.</div>
      </div>
      <div class="alert">
        <div class="alert-num">— 06 —</div>
        <div class="alert-name">CREW HOTELS BY MARKET</div>
        <div class="alert-sub">The calendar trap.</div>
        <div class="alert-row"><span class="row-label">Why it eats budget</span>A hotel room in Nashville during CMA Fest or Austin during SXSW can be 4× the price of a standard chain hotel. If the routing ignores local event calendars, the hotel budget will fail.</div>
        <div class="alert-row"><span class="row-label">The Trap</span>Budgeting a flat $150/night/room for the whole tour.</div>
        <div class="alert-row"><span class="row-label">Fix</span>Route-mapping hotel costs. Use travel management companies who specialize in live entertainment and know local market seasonality.</div>
      </div>
    </div>

  <div class="body-area">
    <div class="module-tag">— 03 / THE VENDOR —</div>
    <div class="page-title">THE VENDOR<br>RELATIONSHIP</div>
    <div class="page-sub">Where design meets inventory, and inventory meets the budget.</div>

    <p class="para">Module 02 introduced the vendor as the third voice in the design phase. This is where that relationship lands a real number. The vendor&apos;s quote isn&apos;t a placeholder — it&apos;s an actual price, shaped by what they have on the floor, what&apos;s in demand that season, and what they&apos;d rather not rent at all. A good vendor relationship is what turns a vague design budget into a defensible one.</p>

    <p class="para">The principle is simple: <strong>let your vendor in early, treat them like a partner, and they&apos;ll save you real money.</strong> The shop knows what&apos;s plentiful and what&apos;s scarce. They know what travels well and what fails on the road. They know what their competitors are renting at and what the regional floor is. Most of that knowledge they&apos;ll share — if the relationship is built on trust, not just on price.</p>

    <div class="vendor-grid">
      <div class="vc do">
        <div class="vc-tag">— DO —</div>
        <div class="vc-title">BUILD THE RELATIONSHIP</div>
        <ul>
          <li>Bring them in during design, not at quote time</li>
          <li>Share the renderings as they evolve — they&apos;ll spot inventory issues early</li>
          <li>Ask what&apos;s tight, what&apos;s plentiful, what&apos;s aging out</li>
          <li>Treat their input as creative collaboration</li>
          <li>Reward loyalty — repeat business buys flexibility on rate</li>
          <li>Pay clean and pay on time</li>
        </ul>
      </div>
      <div class="vc dont">
        <div class="vc-tag">— DON&apos;T —</div>
        <div class="vc-title">BURN THE BRIDGE</div>
        <ul>
          <li>Shop the same package to five vendors against each other</li>
          <li>Treat the quote as a starting point for a long negotiation</li>
          <li>Spec fixtures the vendor flagged as scarce, then act surprised</li>
          <li>Lean on sub-rentals as a routine cost-saver</li>
          <li>Push for terms that make the vendor lose money</li>
          <li>Pay slow, ask for favors fast</li>
        </ul>
      </div>
    </div>

    <div class="pull-quote">
      <p>A good vendor will tell you when you&apos;re under-budgeting yourself. Listen when they do.</p>
    </div>

    <p class="para"><strong>One quiet risk to flag:</strong> sub-rentals. When your vendor doesn&apos;t have an item on the floor, they source it from another shop. The price moves, the reliability drops, and the chain of custody gets murky. If your design depends on inventory the vendor has to sub-rent at scale, you&apos;ll feel it the first time something breaks on a Saturday in a market three hours from any backup. The chain of custody is murky and the gear isn&apos;t yours to control.</p>

  <div class="body-area">
    <div class="module-tag">— 03 / FIXED VS VARIABLE —</div>
    <div class="page-title">WHAT LOCKS,<br>WHAT MOVES</div>
    <div class="page-sub">The lens that turns a paper budget into a defensible one.</div>

    <p class="para">Some line items lock the day you sign. They are what they are — the fee, the rental, the deposit. Others swing weekly across the run — fuel prices, hotel rates, freight, crew availability. <strong>Knowing which is which is the difference between a budget you can defend and one that gets eaten alive on the road.</strong></p>

    <div class="fv-grid">
      <div class="fv-col">
        <div class="fv-tag">— LOCKS AT SIGNING —</div>
        <div class="fv-title">FIXED LINES</div>
        <ul>
          <li>Production rental contracts</li>
          <li>Bus and truck deposits</li>
          <li>Crew salaries and contracts</li>
          <li>Insurance premiums</li>
          <li>Visa and carnet fees</li>
          <li>Vendor flat-rate quotes</li>
          <li>Production fees and management commissions</li>
        </ul>
      </div>
      <div class="fv-col">
        <div class="fv-tag">— MOVES WEEKLY —</div>
        <div class="fv-title">VARIABLE LINES</div>
        <ul>
          <li>Fuel for buses and trucks</li>
          <li>Freight, especially air and overnight</li>
          <li>Hotel rates by market and date</li>
          <li>Local labor rates by city and union</li>
          <li>Catering buyouts when you can&apos;t feed in-house</li>
          <li>Per diem currency exchange (international)</li>
          <li>Settlement-side venue deductions</li>
        </ul>
      </div>
    </div>

    <p class="para">The discipline: <strong>budget the variable lines against the upper end of their range, not the average.</strong> Fuel goes up more often than it goes down. Hotel rates spike around events you didn&apos;t know were happening. Local labor costs more in tier-one cities. Building cushion into the variable side leaves the contingency line free for the surprises you genuinely can&apos;t predict.</p>

    <div class="pull-quote">
      <p>A defended budget knows what&apos;s locked, what&apos;s loose, and where the cushion lives.</p>
    </div>

    <div class="page-title">INCOME MEETS<br>EXPENSE</div>
    <div class="page-sub">Where the math decides whether the tour is real.</div>

    <p class="para">Once you have the income stack and the expense stack, you have a working tour P&amp;L — a profit-and-loss view of the run. The tour P&amp;L answers the question that every artist, business manager, and label is asking: <em>does this run make money, and if so, when, and how much.</em></p>

        <strong>BREAK-EVEN POINT</strong> &nbsp;&middot;&nbsp; THE SHOW NUMBER WHERE INCOME PASSES EXPENSE FOR THE RUN

    <div class="sec-head">A few principles</div>
    <ul class="topics">
      <li><strong>Net per show vs. net per tour are different numbers.</strong> Some shows clear, some don&apos;t. The run is what matters.</li>
      <li><strong>Most tours lose money in the first two weeks.</strong> Production load-in costs, opening-night problems, early-route adjustments. The break-even comes mid-run.</li>
      <li><strong>The artist usually gets paid from net, after the run closes.</strong> Per-show advances exist but are tour-specific.</li>
      <li><strong>If the P&amp;L doesn&apos;t work on paper, it won&apos;t work on the road.</strong> Don&apos;t book a tour you can&apos;t close.</li>
    </ul>

  <div class="body-area">
    <div class="module-tag">— 03 / THE ROAD AHEAD —</div>
    <div class="page-title">WHERE THE BUDGET<br>MEETS THE ROAD</div>
    <div class="page-sub">The road&rsquo;s still far off. The forecasting isn&rsquo;t.</div>

    <p class="para">The first show still feels far off. But the tour is already moving — the wheels turned the day it got booked. The budget work that counts most happens right here, before a single truck rolls. This is the forecasting stage: an honest estimate of what&rsquo;s coming across all three fronts — the budget, the operations, and the show. Get ahead of it while the runway is still long.</p>

    <div class="sec-head">Put Tangible Numbers To It</div>
    <p class="para">This stage is where assumptions become figures. Start pricing the real cost of getting this tour on the road:</p>
    <ul class="topics">
      <li><strong>Crew costs</strong> — who&rsquo;s on payroll, and what they&rsquo;re paid.</li>
      <li><strong>Vendor costs</strong> — audio, lighting, video, backline.</li>
      <li><strong>Bus costs</strong> — leases, fuel, driver day rates.</li>
      <li><strong>Trucking costs</strong> — trucks, fuel, mileage across the route.</li>
      <li><strong>Everything after</strong> — the lines that surface as the plan firms up.</li>
    </ul>

    <p class="para">It starts with the people. Get your crew set — the first real commitment of the tour — then figure out who you actually need on the road, what you&rsquo;re bringing, and an honest number for what all of it costs.</p>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">Crew Onboarding</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>
          <span class="kit-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.5" stroke-linejoin="round">
              <rect x="6" y="3" width="13" height="16"/>
              <rect x="4" y="5" width="13" height="16"/>
              <line x1="7" y1="9" x2="14" y2="9"/>
              <line x1="7" y1="12" x2="14" y2="12"/>
              <line x1="7" y1="15" x2="12" y2="15"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">If you&rsquo;re in this planning phase, start arranging your crew now and set clear expectations with a smooth onboarding. The <strong>Crew Onboarding</strong> form consolidates each person&rsquo;s information in one organized, accessible place — you get an early read on the cost, they get the certainty of being booked. Pinned to DOC-203.</p>
    </div>

    <p class="para">Once the crew and the gear are settled, there&rsquo;s still the question of moving them. A few semi-trucks and a few buses from one city to the next, night after night, adds up to a large stack — and it&rsquo;s one of the first real tests of whether the budget holds.</p>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">Truck Routing</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>
          <span class="kit-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.5" stroke-linejoin="round">
              <rect x="6" y="3" width="13" height="16"/>
              <rect x="4" y="5" width="13" height="16"/>
              <line x1="7" y1="9" x2="14" y2="9"/>
              <line x1="7" y1="12" x2="14" y2="12"/>
              <line x1="7" y1="15" x2="12" y2="15"/>
            </svg>
          </span>
        </div>
      </div>
      <p class="bc-text-dark">The <strong>Truck Routing</strong> template helps you gauge and forecast the cost of getting your tour from city to city — a solid structure to plan from. Getting from venue to venue is one of the first steps of a successful tour, and the freight to move it is rarely small. Pinned to DOC-207.</p>

  <div class="body-area">
    <div class="module-tag">— 03 / STRESS TEST —</div>
    <div class="page-title">STRESS-TESTING<br>THE BUDGET</div>
    <div class="page-sub">Before you commit, ask the hard questions.</div>

    <p class="para">A budget that looks clean on paper is the easiest one to break. Before you commit, run the model against the things that actually go wrong on tours. <strong>What if</strong> is the most useful question you&apos;ll ask in this whole process.</p>

    <div class="stress-cards">
      <div class="sc">
        <div class="sc-num">— SCENARIO 01 —</div>
        <div class="sc-q">FUEL JUMPS 15%</div>
        <div class="sc-a">Where does it land in the model? Bus, truck, ground, freight. Does the contingency cover it, or does it eat into net?</div>
      </div>
      <div class="sc">
        <div class="sc-num">— SCENARIO 02 —</div>
        <div class="sc-q">A DATE GETS PULLED</div>
        <div class="sc-a">You absorb a day off — bus, hotel, per diems with zero income. Multiply by lost guarantee. How many can the run absorb before it&apos;s underwater?</div>
      </div>
      <div class="sc">
        <div class="sc-num">— SCENARIO 03 —</div>
        <div class="sc-q">A LATE-ADD FLY DATE</div>
        <div class="sc-a">Backline rentals in market, local crew, hotels by airport. The math is different and usually more expensive than a bus date.</div>
      </div>
      <div class="sc">
        <div class="sc-num">— SCENARIO 04 —</div>
        <div class="sc-q">VENDOR SUB-RENTS KEY GEAR</div>
        <div class="sc-a">Two key fixtures come from a sub. Cost goes up, reliability goes down. What&apos;s the swap-in plan if one fails mid-run?</div>
      </div>
      <div class="sc">
        <div class="sc-num">— SCENARIO 05 —</div>
        <div class="sc-q">A MARKET UNDER-PERFORMS</div>
        <div class="sc-a">On a door deal, the income slips. On a guarantee, it doesn&apos;t — but the next round of routing might. Track the trend.</div>
      </div>
      <div class="sc">
        <div class="sc-num">— SCENARIO 06 —</div>
        <div class="sc-q">A KEY CREW MEMBER DROPS</div>
        <div class="sc-a">Replacement at short notice usually means a higher rate, more travel, more onboarding time. Budget for one of these per run.</div>
      </div>
    </div>

    <p class="para">Run each scenario against the model and write down the answer. If a single scenario breaks the run, your contingency is too thin. If three of them break it, the budget needs another pass before it gets committed.</p>

        <span class="scale-mark">

        </span>

      <div class="module-tag">— 03 / SMALLER STACK —</div>
      <div class="page-title">THE SMALLER<br>STACK</div>
      <div class="page-sub">Lean runs. Same principles. Smaller stack. Same care.</div>
    </div>

    <p class="para">Most of what we just walked through is built for a tour with full production, a bus, a crew, a deal stack with multiple income lines. Most touring isn&apos;t that. This page is for the one- or two-person operations, or the run where the band splits each role up among themselves. Most touring is a van, a sprinter, a bandwagon, a station wagon with a trailer. One driver who&apos;s also playing in the band. Hotels every fourth night, couches the rest. Per diems that add up to a tank of gas. <strong>This is real touring too.</strong> The principles in this module still apply. The financials of a scaled-down tour need to be treated with the same discipline as a large tour &mdash; maybe more. There&apos;s no contingency, so every line counts twice.</p>

    <div class="sec-head sec-head-tight">What changes at this scale</div>
    <ul class="topics">
      <li><strong>Backline = what you carry.</strong> Your own amps, drum hardware, pedalboards. Loaded in trash bags or pelican cases. Production rental isn&apos;t a line item — it&apos;s a future state.</li>
      <li><strong>Catering = what you grab.</strong> A gas-station sandwich, the venue&apos;s drink tickets, a post-show diner. Hospitality riders are aspirational.</li>
      <li><strong>Crew = the band.</strong> The driver is also the merch person and also the tour manager. Per diems matter <em>more</em> at this scale, not less, because there&apos;s no float to absorb a missed meal.</li>
      <li><strong>Income is binary.</strong> Ticket money plus merch money equals the entire P&amp;L. Lose a show, you lose the run.</li>
    </ul>

    <p class="para">If you&apos;re running at this scale: a working spreadsheet, a clean per-show settlement note, and a habit of scanning every receipt the moment it&apos;s in your hand will carry you further than any budget software. The road report template at the end of this module works at any scale — adapt it down.</p>

    <div class="sec-head sec-head-tight">A few quick tips at this scale</div>
    <div class="tips-block">
      <div class="tip-card">
        <div class="tip-title">Budget a small tip line for local crew</div>
        <div class="tip-text">When it&apos;s just you, or you and a manager, you&apos;re leaning on the local staff and crew for almost every part of the show. Build an extra <strong>$50 or so per show</strong> into the budget and tip the people who really showed up — slip your monitor tech a twenty, your front-of-house engineer a thank-you. It costs little, it goes a long way, and that front-of-house tech you took care of in Cleveland might be the one you&apos;re calling for your next tour.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">Treat merch as float, not profit</div>
        <div class="tip-text">At this scale, merch money is the cash that pays for gas, the late-night diner, and the next set of strings. It looks like profit on the back end. Treat it like operating capital and you&apos;ll always have what you need.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">Scan every receipt the moment you have it</div>
        <div class="tip-text">No accountant, no admin, no office support — you&apos;re the whole back office. The habit of photographing each receipt into a single folder on your phone the moment it&apos;s in your hand is the single biggest difference between a clean tour close and three weeks of guesswork.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">Pay yourself a per diem, even if it&apos;s small</div>
        <div class="tip-text">Even when the money&apos;s tight, a fixed daily number for food and incidentals — separate from the operating account — keeps personal spending from quietly bleeding the tour. <strong>$25 a day</strong> on the road still builds the discipline.</div>
      </div>
    </div>

    <div class="page-title">WHAT IT IS,<br>WHY IT IS,<br>HOW IT WORKS</div>

    <div class="fn-list">
      <div class="fn-item">
        <div class="fn-name">A good budget gets revised three times before the first show</div>
        <div class="fn-text">Quotes change. Markets shift. The first version is never the final version. The discipline is to keep the model live without losing the original assumptions.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Crew per diems are the most-watched line by the crew themselves</div>
        <div class="fn-text">Everybody else looks at totals. The crew counts dollars per day. Don&apos;t shortchange this — it&apos;s where loyalty lives.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">The line items you didn&apos;t think mattered are the ones that move the most</div>
        <div class="fn-text">Hotel rates. Local labor. Freight. The exotic stuff stays close to forecast. The boring stuff is what eats budgets.</div>
      </div>
    </div>

    <div class="trio">
      <div class="block">
        <div class="b-tag">— WHAT IT IS —</div>
        <div class="b-text">A working position on what the tour costs, what it earns, and where the cushion lives. Not a prediction — a defensible plan that holds up across sixty cities of weather, fuel, and surprises.</div>
      </div>
      <div class="block">
        <div class="b-tag">— WHY IT IS —</div>
        <div class="b-text">Live touring is one-shot. A 5% miss compounds into wiped runs and missed paychecks. The budget is the document that protects the people behind every line item.</div>
      </div>
      <div class="block">
        <div class="b-tag">— HOW IT WORKS —</div>
        <div class="b-text">Income stack meets expense stack. Fixed gets pinned, variable gets cushioned. Vendor relationship sharpens design cost. Stress-test before you commit. Road report keeps it honest.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>The budget gives you what you can spend. The advance is where you protect it.</p>
    </div>

  /* PAGE 2 — ARCHITECTURAL BRIDGE DIAGRAM */
  /* Drafted in BB cover-art voice: two pylons + a span line, labels above and below. */
  .bridge-diagram {
    margin: 14px 0 16px;
    padding: 14px 12px 12px;
    background: var(--black);
    background-image:
      linear-gradient(rgba(27,58,92,0.32) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,58,92,0.32) 1px, transparent 1px);
    background-size: 18px 18px;
    border: 1px solid rgba(244,241,234,0.25);
    position: relative;
    overflow: hidden;
  }
  .bridge-diagram::before,
  .bridge-diagram::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--orange);
    opacity: 0.65;
  }
  .bridge-diagram::before {
    top: 6px; left: 6px;
    border-right: 0;
    border-bottom: 0;
  }
  .bridge-diagram::after {
    bottom: 6px; right: 6px;
    border-left: 0;
    border-top: 0;
  }
  .bridge-diagram .bd-eyebrow {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .bridge-diagram .bd-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    gap: 0;
  }
  /* LEFT + RIGHT PYLON */
  .bridge-diagram .bd-pylon {
    background: var(--blue);
    border: 1px solid rgba(244,241,234,0.6);
    padding: 14px 16px 16px;
    position: relative;
    min-height: 168px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .bridge-diagram .bd-pylon .bd-pylon-title {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.4px;
    color: var(--bone);
    line-height: 1.3;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .bridge-diagram .bd-pylon .bd-pylon-rule {
    width: 38px;
    height: 2px;
    background: var(--orange);
    margin-bottom: 9px;
  }
  .bridge-diagram .bd-pylon .bd-pylon-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .bridge-diagram .bd-pylon .bd-pylon-list li {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    font-weight: 500;
    line-height: 1.5;
    color: rgba(244,241,234,0.92);
    padding: 2px 0;
    position: relative;
    padding-left: 12px;
  }
  /* Small orange tick before each list item */
  .bridge-diagram .bd-pylon .bd-pylon-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 9px;
    width: 6px;
    height: 1.5px;
    background: var(--orange);
  }

  /* CENTER SPAN — chevron exchange */
  .bridge-diagram .bd-span {
    position: relative;
    width: 152px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }
  /* Chevron rows */
  .bridge-diagram .bd-chev-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 0 6px;
  }
  /* One chevron — drawn as two diagonal strokes meeting at a point */
  .bridge-diagram .bd-chev {
    display: inline-block;
    width: 11px;
    height: 14px;
    position: relative;
  }
  .bridge-diagram .bd-chev::before,
  .bridge-diagram .bd-chev::after {
    content: "";
    position: absolute;
    left: 0;
    width: 11px;
    height: 2.5px;
    background: var(--orange);
    border-radius: 1px;
  }
  .bridge-diagram .bd-chev::before {
    top: 2px;
    transform-origin: right center;
    transform: rotate(35deg);
  }
  .bridge-diagram .bd-chev::after {
    bottom: 2px;
    transform-origin: right center;
    transform: rotate(-35deg);
  }
  /* Right-pointing chevrons (top row — flow A → B) */
  .bridge-diagram .bd-chev-right .bd-chev {
    /* default — points right */
  }
  .bridge-diagram .bd-chev-right .bd-chev:nth-child(1) { opacity: 0.45; }
  .bridge-diagram .bd-chev-right .bd-chev:nth-child(2) { opacity: 0.72; }
  .bridge-diagram .bd-chev-right .bd-chev:nth-child(3) { opacity: 1; }
  /* Left-pointing chevrons (bottom row — flow B → A) */
  .bridge-diagram .bd-chev-left .bd-chev {
    transform: scaleX(-1);
  }
  .bridge-diagram .bd-chev-left .bd-chev:nth-child(1) { opacity: 1; }
  .bridge-diagram .bd-chev-left .bd-chev:nth-child(2) { opacity: 0.72; }
  .bridge-diagram .bd-chev-left .bd-chev:nth-child(3) { opacity: 0.45; }

  /* Center plate that sits between the two chevron rows */
  .bridge-diagram .bd-span-plate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 2;

  .bridge-diagram .bd-span-label {

  <div class="body-area">
    <div class="module-tag">— 04 / OPENING —</div>
    <div class="page-title">WHAT THE<br>ADVANCE IS</div>
    <div class="page-sub" style="margin-bottom: 14px;">Before the trucks roll, both sides get on the same page.</div>

    <p class="para">Advancing a show is the <strong>logistical planning phase</strong> where a touring production and a venue align on every technical, hospitality, and scheduling detail before the tour truck arrives. Essentially, it means confirming all expectations <em>in writing</em> so there are zero surprises on show day. Done right, advancing a show is quick and efficient. Neglecting it, however, creates confusion and preventable show-day issues.</p>

    <div class="sub-head">The <span class="accent">Process.</span></div>

    <p class="para">The advancing process typically begins after the initial booking confirmation. At this stage, it means starting detailed discussions with the venue PM or rep for the show. This takes place over a series of emails, phone calls, and shared documents. During this process, <strong>the two sides cross-reference the tour&rsquo;s specific needs with the venue&rsquo;s actual capabilities.</strong></p>

    <!-- Architectural-spec bridge diagram: the advance as the span between TM + venue PM -->
    <div class="bridge-diagram">
      <div class="bd-eyebrow">— FIG. 04.01 / THE ADVANCE SPAN —</div>
      <div class="bd-row">

        <!-- LEFT PYLON — tour side -->
        <div class="bd-pylon">
          <div class="bd-pylon-title">What the artist needs to put the show on the road.</div>
          <div class="bd-pylon-rule"></div>
          <ul class="bd-pylon-list">
            <li>Touring Production Manager</li>
            <li>Tour Manager</li>
            <li>Production Coordinator</li>
          </ul>
        </div>

        <!-- CENTER SPAN — the advance, drawn as a flowing chevron exchange -->
        <div class="bd-span">
          <!-- Top row of chevrons pointing right -->
          <div class="bd-chev-row bd-chev-right">
            <span class="bd-chev"></span>
            <span class="bd-chev"></span>
            <span class="bd-chev"></span>
          </div>
          <!-- Center plate -->
          <div class="bd-span-plate">
            <div class="bd-span-label">THE ADVANCE</div>
            <div class="bd-span-dim">CONFIRMED IN WRITING</div>
          </div>
          <!-- Bottom row of chevrons pointing left -->
          <div class="bd-chev-row bd-chev-left">
            <span class="bd-chev"></span>
            <span class="bd-chev"></span>
            <span class="bd-chev"></span>
          </div>
        </div>

        <!-- RIGHT PYLON — venue side -->
        <div class="bd-pylon">
          <div class="bd-pylon-title">What the venue can actually provide on show day.</div>
          <div class="bd-pylon-rule"></div>
          <ul class="bd-pylon-list">
            <li>Venue Production Manager</li>
            <li>Show Rep</li>
            <li>Venue Department Heads</li>
          </ul>
        </div>

      </div>
      <div class="bd-caption">The advance is the exchange between what the tour needs and what the venue can deliver. The work is making sure that exchange holds.</div>
    </div>

    <div class="sub-head">The Core Elements Of An <span class="accent">Advance.</span></div>

    <p class="para">Your advance with a venue should cover and confirm every detail relating to <strong>Schedule, Tech, Hospitality, Crew &amp; Labor, Logistics, and Settlement.</strong></p>

    <p class="para">You can&apos;t just assume everything is going to go smoothly. Actually — you should assume everything will be complete chaos <em>unless</em> you advance the show.</p>

    <p class="para">A quick framing note before we walk this through. Advancing is one of the most role-specific things on a tour — the Production Manager is usually driving it, sometimes the Tour Manager is, often the two are working in tandem. Rather than describe the work in the abstract, this module walks through a real scenario: a theater-scale tour for a fictional five-piece band, <strong>The Blue Printers</strong>, with full production and a working crew. You&apos;ll see the rider, the org chart, the email templates, the call agenda, and the show advance packet built out for this exact run. Names, dates, venues. Real artifacts.</p>

    <p class="para">If your tour is at a different scale — a van and a trailer, a four-on-the-floor club run, a festival fly date — this module still teaches you the work. We&apos;ll flag the variants along the way. The principles compress and expand; the discipline doesn&apos;t change.</p>

    <div class="next-up">
      <span>UP NEXT</span>
      <span class="arrow">— THE EXAMPLE TOUR →</span>
    </div>
  </div>
</div>

    <div class="page-title">THE EXAMPLE<br>TOUR</div>

    <p class="para" style="margin-top: 14px;">The scenario: a headlining tour for the rock band <strong>The Blue Printers</strong>. The Blue Printers are a five-piece band — vocalist, guitar player, bass player, keys player, and drummer. They&apos;ll be hitting middle-to-upper-level theaters, 1,200 to 3,000 cap rooms across 32 shows, and bringing the following equipment with them.</p>

    <div class="spec-tag">— TOUR SPEC SHEET —</div>
    <div class="spec-band">THE BLUE PRINTERS</div>

    <div class="spec-grid">

      <div class="spec-block full">
        <div class="spec-head">Transportation &amp; Vehicles</div>
        <div class="transport-grid">
          <div class="transport-col">
            <div class="transport-col-tag">— 3 BUSES —</div>
            <div class="transport-row"><span class="tr-key">BUS 1</span><span class="tr-val">Band</span></div>
            <div class="transport-row"><span class="tr-key">BUS 2</span><span class="tr-val">Crew</span></div>
            <div class="transport-row"><span class="tr-key">BUS 3</span><span class="tr-val">Management, wardrobe, merch</span></div>
            <div class="transport-note"><em>One bus will be pulling a trailer.</em></div>
          </div>
          <div class="transport-col">
            <div class="transport-col-tag">— 3 TRUCKS —</div>
            <div class="transport-row"><span class="tr-key">A TRUCK</span><span class="tr-val">Wardrobe and Rigging</span></div>
            <div class="transport-row"><span class="tr-key">B TRUCK</span><span class="tr-val">Audio and Backline</span></div>
            <div class="transport-row"><span class="tr-key">C TRUCK</span><span class="tr-val">Lighting and Video</span></div>
            <div class="transport-note"><em>Semi tractors with 53&apos; trailers.</em></div>
          </div>
        </div>
      </div>

      <div class="spec-block">
        <div class="spec-head">Video</div>
        <div class="spec-body">
          <span class="spec-stamp">LED Wall —</span>32 ft × 16 ft, hanging on 6 motors. All video LED product, processing, and cabling traveling with tour production. <em>No IMAG or cameras with the tour.</em>
        </div>
      </div>

      <div class="spec-block">
        <div class="spec-head">Lighting</div>
        <div class="spec-body">
          <div class="spec-line"><span class="spec-stamp">Fly Package —</span>a large fly package hanging on 20 motor points.</div>
          <div class="spec-line"><span class="spec-stamp">Floor Package —</span>all lighting fixtures, cabling, and control traveling with tour production.</div>
        </div>
      </div>

      <div class="spec-block">
        <div class="spec-head">Audio</div>
        <div class="spec-body">
          <span class="spec-stamp">FOH, Monitors, Wedges, IEMs —</span>front-of-house control package, monitor control package with wedges, in-ear monitors, all microphones and cables. <em>Since most theaters already have a PA hung and installed, no main PA system traveling.</em>
        </div>
      </div>

      <div class="spec-block">
        <div class="spec-head">Backline</div>
        <div class="backline-grid">
          <div class="bl-item">Drum kit</div>
          <div class="bl-item">Guitar</div>
          <div class="bl-item">Bass</div>
          <div class="bl-item">Keys</div>
          <div class="bl-item">Amps</div>
        </div>
      </div>

    </div>

    <p class="para">Now that we have a good understanding and framework of what&apos;s going on on this tour, let&apos;s see what kind of crew support the tour brings to effectively execute this on a day-to-day basis.</p>

    <p class="para">With video being a large upstage LED wall, they&apos;re going to bring <strong>two LED techs</strong> — one of which is also the VJ for the show.</p>

    <p class="para">With the substantial fly package and floor package of lighting, they&apos;re going to bring an <strong>LD and one lighting tech.</strong></p>

    <p class="para">In the audio department, they&apos;re going to bring a <strong>front-of-house audio engineer, a monitor engineer, and a patch tech.</strong></p>

    <p class="para"><strong>One backline tech</strong> will be going out for the band. And a <strong>lead rigger</strong> to handle the tour&apos;s 26 motor points — 6 for video, 20 for lighting.</p>

    <p class="para">Now that we know all the production crew they&apos;re bringing out on their tour, let&apos;s keep this in mind as we look at the next page and examine what these roles are responsible for, along with the role of the rest of the touring party.</p>

      <p class="bc-text-dark">These aren&rsquo;t roles you have to bring. The org chart is dictated by the needs of the tour — at smaller scale, most of these roles get covered by the people already working at the venue. Read this chart for what each role <em>does</em>, then look at your own run and ask: <strong>which of these does the venue already have, and where can I lean into the overlap?</strong> If the venue has an LD, a front-of-house engineer, and a monitor engineer, get connected with them ahead of the show, send your input list and stage plot early, and lay the groundwork so they can hit the ground running on show day. The work doesn&rsquo;t go away — it just gets shared with the house.</p>

    <div class="page-title">BUILDING<br>YOUR RIDER</div>

    <p class="para" style="margin-top: 14px;">Before you reach out to a single venue, you need the rider in hand. <strong>The rider is the founding document of every show</strong> — the source of truth the venue is reading from before you even pick up the phone.</p>

    <p class="para">Every rider is two documents in one packet: the <strong>technical rider</strong> for the venue&apos;s TD and house technical staff, and the <strong>hospitality rider</strong> for the venue&apos;s hospitality lead and catering. Some artists combine into one document. Either works.</p>

    <div class="rider-split">
      <div class="rs-col">
        <div class="rs-tag">— DOCUMENT A —</div>
        <div class="rs-title">TECHNICAL RIDER</div>
        <ul>
          <li>General info — artist, tour, version, team contacts</li>
          <li>PA / Sound System spec</li>
          <li>Consoles (FOH and monitors)</li>
          <li>Monitor systems and mixes</li>
          <li>Input list — channels, sources, mics, stands, phantom</li>
          <li>Backline — artist-supplied vs venue-supplied</li>
          <li>Auxiliary equipment + stage plot</li>
          <li>Final notes — anything venue-specific or unusual</li>
        </ul>
      </div>
      <div class="rs-col">
        <div class="rs-tag">— DOCUMENT B —</div>
        <div class="rs-title">HOSPITALITY RIDER</div>
        <ul>
          <li>Dressing room counts and provisions</li>
          <li>Catering counts — crew lunch, dinner, band dinner</li>
          <li>Dietary restrictions and allergies</li>
          <li>Beverage list and stock requests</li>
          <li>Towels, water, snack provisions</li>
          <li>Runner availability and runner duties</li>
          <li>M&amp;G logistics and post-show needs</li>
          <li>WiFi, parking, security access notes</li>
        </ul>
      </div>
    </div>

    <p class="para">Building one from scratch is real work. The good news — <strong>you don&apos;t have to.</strong> Module 2 already pointed you to the Backstage Blueprint Rider Builder and Stage Plot Builder — the web tools that draft the rider for you. And the binder backs them up with the working papers: a fill-in template and a walkthrough guide for every piece of the packet.</p>

    <div class="module-tag">— 04 / WHEN YOU START —</div>
    <div class="page-title">THE ADVANCE<br>CADENCE</div>

    <p class="para" style="margin-top: 14px;">Now that you have a sense of the rider — <em>when</em> does this whole thing actually kick off? The advance is how you plan ahead for show day. Every milestone gets locked weeks before the truck arrives, and the bigger the production, the longer the runway. Knowing the cadence up front lets you plan every step of the work you&apos;re about to do.</p>

    <p class="para">For the Blue Printers — theaters, 32 shows, touring lighting and video, traveling monitors and backline — we want <strong>six weeks of runway minimum</strong>, intensifying in the final two.</p>

    <div class="sec-head">How it shapes up across scales</div>
    <p class="para">The scale changes the timing but not the general structure. Bigger production = longer advance window. This cadence is still a good structure to maintain on any scale — <em>the clock just runs at a different speed depending on your tour and your scale.</em></p>
    <ul class="topics">
      <li><strong>Arena / amphitheater tour</strong> — 8 to 9 weeks out</li>
      <li><strong>Theater / mid-scale tour (the Blue Printers)</strong> — 6 to 7 weeks out</li>
      <li><strong>Club / indie run</strong> — 5 to 6 weeks out</li>
    </ul>

    <div class="cad-block">
      <div class="cad-tag">— THE ADVANCE CADENCE —</div>
      <div class="cad-title">LAY THE GROUNDWORK NOW,<br>HAVE A SMOOTH SHOW DAY LATER</div>

      <div class="cad-row">
        <div class="cad-marker">
          <div class="cm-tag">6 WEEKS OUT</div>
          <div class="cm-event">Handoff</div>
        </div>
        <div class="cad-marker">
          <div class="cm-tag">5 WEEKS OUT</div>
          <div class="cm-event">Outreach</div>
        </div>
        <div class="cad-marker">
          <div class="cm-tag">4 WEEKS OUT</div>
          <div class="cm-event">Tech Packs</div>
        </div>
        <div class="cad-marker">
          <div class="cm-tag">3 WEEKS OUT</div>
          <div class="cm-event">Advance Call</div>
        </div>
        <div class="cad-marker">
          <div class="cm-tag">2 WEEKS OUT</div>
          <div class="cm-event">Internal Lock</div>
        </div>
        <div class="cad-marker">
          <div class="cm-tag">1 WEEK OUT</div>
          <div class="cm-event">Final Lock</div>
        </div>
        <div class="cad-marker day">
          <div class="cm-tag">SHOW DAY</div>
          <div class="cm-event">Roll</div>
        </div>
      </div>

      <div class="cad-windows">
        <div class="cad-window-row">
          <div class="cw-key">6 → 5 WEEKS</div>
          <div><strong>Handoff &amp; outreach.</strong> Routing locks. Build the show grid. Send the template email to every venue on the route.</div>
        </div>
        <div class="cad-window-row">
          <div class="cw-key">5 → 4 WEEKS</div>
          <div><strong>Response window.</strong> Venues come back with tech packs and contacts. Start reviewing each against the rider.</div>
        </div>
        <div class="cad-window-row">
          <div class="cw-key">4 → 3 WEEKS</div>
          <div><strong>Advance call.</strong> Book and run a call with each venue. Run the standing agenda. Send the recap within 24 hours.</div>
        </div>
        <div class="cad-window-row">
          <div class="cw-key">3 → 2 WEEKS</div>
          <div><strong>Internal lock.</strong> Your team&apos;s roster, gear, travel, hospitality counts all lock down.</div>
        </div>
        <div class="cad-window-row">
          <div class="cw-key">2 → 1 WEEK</div>
          <div><strong>Final lock.</strong> Last changes accepted. Generate and distribute the show advance packet.</div>
        </div>
        <div class="cad-window-row">
          <div class="cw-key">SHOW DAY</div>
          <div><strong>Show day.</strong> Everything you locked plays out. The advance was the brain — now the day sheet is the heartbeat.</div>
        </div>
      </div>
    </div>

    <p class="para" style="margin-top: 14px;">Your team is set. The rider is built. The cadence is mapped. <strong>Now we make the first move.</strong> Let&apos;s look at how to start the advance toward the venue side and how to best approach the conversation.</p>

    <p class="para">At every venue along the run, you&apos;ll be in touch with a handful of people. One person might wear two or three of these hats at smaller rooms — your job is to find out who handles what and route the conversation accordingly.</p>

    <div class="venue-roles">
      <div class="vr">
        <div class="vr-name">Venue PM<br>/ Tech Director</div>
        <div class="vr-desc">Your main point person. Owns the technical day.</div>
      </div>
      <div class="vr">
        <div class="vr-name">Promoter<br>Rep</div>
        <div class="vr-desc">The show&apos;s promoter contact. Owns the deal side.</div>
      </div>
      <div class="vr">
        <div class="vr-name">House Dept.<br>Heads</div>
        <div class="vr-desc">House FOH, house LD, head rigger, hospitality lead.</div>
      </div>
    </div>

    <p class="para">A clean way to start is one outreach email per venue, sent early in the cycle. The template below is what you build once, then personalize per show. <strong>Same core questions to every venue. Different intro per relationship.</strong></p>

    <div class="email-mock">
      <div class="email-mock-header">
        <span class="em-stamp">— FIRST OUTREACH EMAIL · TEMPLATE —</span>
        <span class="em-meta">REF: ADVANCE-OUT-01</span>
      </div>
      <div class="email-mock-fields">
        <div><span class="em-key">SUBJECT</span>THE BLUE PRINTERS · BLUEBACK THEATER · 10/14 · PRODUCTION ADVANCE</div>
        <div><span class="em-key">TO</span>venue.pm@blueback-theater.com</div>
        <div><span class="em-key">CC</span>tm@blueprinters.tour · agent@representation.tld</div>
        <div><span class="em-key">ATT</span>BP_TechRider_v3.pdf · BP_HospRider_v2.pdf · BP_StagePlot.pdf</div>
      </div>
      <div class="email-mock-body">
        <p>Hi <span class="em-personalize">[Venue PM Name]</span>,</p>

        <p>My name is <span class="em-personalize">[Your Name]</span> and I&apos;m the Production Manager for <strong>The Blue Printers</strong> on their upcoming headline tour. We&apos;re excited to be coming through <strong>Blueback Theater</strong> on <strong>October 14</strong> and I wanted to reach out to start the advance.</p>

        <p>I&apos;ve copied our Tour Manager <span class="em-personalize">[TM Name]</span> on this thread. Attached you&apos;ll find our current tech rider and hospitality rider — please take a chance to look it over.</p>

        <p>I&apos;d love to set up a call to go over all the key points. In the meantime, a few quick questions to help us get rolling:</p>

        <div class="em-questions">
          <span class="em-q-label">— STANDARD ADVANCE QUESTIONS —</span>
          <ol>
            <li>When is the earliest our buses can arrive?</li>
            <li>How late can our buses and trucks stay before they need to depart?</li>
            <li>Who is your best contact for bus and truck arrival?</li>
            <li>Who is your best contact for day-of-show production?</li>
            <li>Who is your best contact for hospitality and ground transport?</li>
            <li>Who is your best contact for security?</li>
            <li>Please confirm: venue name, address, primary contact, and house capacity for this show.</li>
            <li>If you have a current tech pack available, please send it along.</li>
          </ol>
        </div>

        <p>Looking forward to a great show with you all. Let me know your availability for a call in the coming weeks and I&apos;ll get us on the books.</p>

        <p>Thanks,<br>
        <span class="em-personalize">[Your Name]</span><br>
        Production Manager · The Blue Printers</p>
      </div>
    </div>

    <div class="email-cap">— BUILD ONCE · PERSONALIZE PER VENUE · SEND EARLY —</div>

    <p class="para" style="margin-top: 12px;">Send the template to every venue on the route. As responses come in, schedule individual advance calls with each one to dive deeper. <strong>The email opens the door. The call walks through it.</strong></p>

      <span>NEXT</span>

  <div class="body-area">
    <div class="module-tag">— 04 / THE ADVANCE CALL —</div>
    <div class="page-title">THE ADVANCE CALL<br>&amp; THE SIX BUCKETS</div>

    <p class="para" style="margin-top: 14px;">This is the main event of the advance. The template email opened the door. The tech packs gave you the data. <strong>The advance call is where you and the venue actually talk</strong> — and where every detail of show day gets reconciled in real time. The call typically runs <strong>30 to 60 minutes for a theater-scale run</strong>, longer for arena tours. You&apos;ll have one of these with every venue on the route.</p>

    <div class="sec-head">Who&apos;s on the call</div>
    <ul class="topics">
      <li><strong>Your side</strong> — Production Manager driving the call, often Tour Manager (especially for hospitality and settlement sections)</li>
      <li><strong>Their side</strong> — Venue PM or Tech Director (primary), often the Promoter Rep for deal questions, sometimes house department heads if technical questions get specific</li>
    </ul>

    <p class="para">The call follows the same standing agenda we mentioned at the open of this module. <strong>Six buckets. Same order. Every call.</strong> Hold them in your head and the call runs itself.</p>

    <div class="six-agenda">
      <div class="sa-tag">— THE SIX BUCKETS OF AN ADVANCE CALL —</div>
      <div class="sa-row">
        <div class="sa-num">— 01 —</div>
        <div class="sa-name">SCHEDULE</div>
        <div class="sa-desc">Get-in, lunch, sound check, doors, set times, curfew, load-out window.</div>
      </div>
      <div class="sa-row">
        <div class="sa-num">— 02 —</div>
        <div class="sa-name">TECH</div>
        <div class="sa-desc">PA, consoles, lighting, video, rigging points, power, stage dimensions.</div>
      </div>
      <div class="sa-row">
        <div class="sa-num">— 03 —</div>
        <div class="sa-name">HOSPITALITY</div>
        <div class="sa-desc">Catering counts, dietary, dressing rooms, runners, M&amp;G, water, towels.</div>
      </div>
      <div class="sa-row">
        <div class="sa-num">— 04 —</div>
        <div class="sa-name">CREW &amp; LABOR</div>
        <div class="sa-desc">Local hands per department, call times, OT rules, who runs the call.</div>
      </div>
      <div class="sa-row">
        <div class="sa-num">— 05 —</div>
        <div class="sa-name">LOGISTICS</div>
        <div class="sa-desc">Bus parking, truck loading, shore power, hotel, hospital, security access.</div>
      </div>
      <div class="sa-row">
        <div class="sa-num">— 06 —</div>
        <div class="sa-name">SETTLEMENT</div>
        <div class="sa-desc">Time, contact, format, deductions, payment form, deal terms.</div>
      </div>
    </div>

    <div class="sec-head">How the call actually flows</div>
    <p class="para">Lead with schedule — get the shape of the day locked first, everything else hangs off it. Move bucket to bucket but stay flexible — if a tech question opens up while you&apos;re on schedule, follow it. <strong>Take notes in real time.</strong> End every call with open items: <em>what&apos;s still unresolved, who owns it, when&apos;s it locked by.</em></p>

    <div class="pull-quote">
      <p>Email reconciles facts. The phone call surfaces judgment.</p>
    </div>

    </div>

  <div class="body-area">
    <div class="module-tag">— 04 / DEEPER —</div>
    <div class="page-title">INSIDE EACH<br>BUCKET</div>

    <p class="para" style="margin-top: 14px;">The six buckets are the shape of the conversation. The actual <em>content</em> — what you ask, what you confirm — is where the depth lives. Below is what every advance call covers under each heading. Use this as your script in the meeting, then build your own from there as you live in the work.</p>

    <div class="bucket-stack">
      <div class="bs-row">
        <div class="bs-name">01 / Schedule</div>
        <div class="bs-items"><strong>COVER:</strong> What time can we get in? When&apos;s crew lunch? Sound check window? Doors? Set times for opener, support, headliner? Curfew? Load-out window? When does the venue need us out?</div>
      </div>
      <div class="bs-row">
        <div class="bs-name">02 / Tech</div>
        <div class="bs-items"><strong>COVER:</strong> PA model and config. Console at FOH and monitors. Mic locker available. RF coordination. Lighting rig patched. Video LED package and content path. Rigging point load capacity and motor count. House gear we need to fly around. Backline what venue supplies vs touring. Tuning times.</div>
      </div>
      <div class="bs-row">
        <div class="bs-name">03 / Hospitality</div>
        <div class="bs-items"><strong>COVER:</strong> Catering counts — crew lunch, crew dinner, band dinner. Dietary restrictions. Dressing room count and provisions. Runners — how many, what hours? Towels, water, beer, M&amp;G setup.</div>
      </div>
      <div class="bs-row">
        <div class="bs-name">04 / Crew &amp; Labor</div>
        <div class="bs-items"><strong>COVER:</strong> Local hands per department. Call times. Meal break rules. OT tracking. Who runs the local call — your stage manager, their head rigger, the IATSE local steward?</div>
      </div>
      <div class="bs-row">
        <div class="bs-name">05 / Logistics</div>
        <div class="bs-items"><strong>COVER:</strong> Bus parking — where, restrictions, shore power available? Truck dock dimensions and access route. Nearest hotel for drivers. Nearest hospital. Security access at load-in.</div>
      </div>
      <div class="bs-row">
        <div class="bs-name">06 / Settlement</div>
        <div class="bs-items"><strong>COVER:</strong> What time? Who&apos;s the rep? Format — meet in office, deal memo signed? Deductions (rent, production, performance rights, taxes). Payment form (wire, check, ACH). Anything unusual to flag now?</div>
      </div>
    </div>

    <p class="para"><strong>Miss a bucket, the day pays for it.</strong> Walk every advance call through every section — even the short ones. The questions you skip become the surprises you handle on show day.</p>
