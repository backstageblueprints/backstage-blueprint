    <div class="module-tag">— 04 / FIELD NOTES —</div>
    <div class="page-title">FIELD<br>NOTES</div>

    <div class="fn-section-title">What Goes Wrong</div>
    <div class="fn-section-sub">When the advance is thin — the patterns that quietly kill a calm day.</div>

    <div class="gotchas compact">
      <div class="gv">
        <div class="gv-num">— GOTCHA 01 —</div>
        <div class="gv-q">VERBAL COMMITMENTS NOT IN WRITING</div>
        <div class="gv-a">Venue tells you "yeah, no problem" on the call. Forgets half of it by show day. Without the recap, you have no paper trail.</div>
      </div>
      <div class="gv">
        <div class="gv-num">— GOTCHA 02 —</div>
        <div class="gv-q">OUTDATED TECH PACKS</div>
        <div class="gv-a">PA spec lists last year&apos;s console. Stage dimensions are pre-renovation. Always confirm critical specs verbally and document.</div>
      </div>
      <div class="gv">
        <div class="gv-num">— GOTCHA 03 —</div>
        <div class="gv-q">WRONG VENUE CONTACT</div>
        <div class="gv-a">Advancing with the booker when you should be advancing with the TD. At smaller rooms, technical and business questions go to different people.</div>
      </div>
      <div class="gv">
        <div class="gv-num">— GOTCHA 04 —</div>
        <div class="gv-q">PARKING THAT ISN&apos;T PARKING</div>
        <div class="gv-a">"Bus parking" turns out to be street with overnight restrictions. Shore power is 30A on a bus that needs 50A. Confirm specifics, not categories.</div>
      </div>
      <div class="gv">
        <div class="gv-num">— GOTCHA 05 —</div>
        <div class="gv-q">CATERING COUNTS WRONG</div>
        <div class="gv-a">Crew adds (vendor reps, manager guests, extra locals) didn&apos;t make it into the count. Dietary surfaces at the meal. Update late and precisely.</div>
      </div>
      <div class="gv">
        <div class="gv-num">— GOTCHA 06 —</div>
        <div class="gv-q">CHANGES AFTER FINAL LOCK</div>
        <div class="gv-a">Venue moves you to a different room. House engineer can&apos;t be there until 1 PM. Push back. Charge late changes back through the promoter at settlement.</div>
      </div>
    </div>

    <div class="fn-section-title">Things That Surprise People</div>
    <div class="fn-section-sub">A few things the advance teaches you only by living it.</div>

    <div class="fn-list compact">
      <div class="fn-item">
        <div class="fn-name">The advance call is half information, half signal</div>
        <div class="fn-text">When the venue knows you&apos;re sharp, they show up sharper. The questions you ask early train the venue to take the show seriously. Vague advance, vague day.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">The most stressed PMs stopped doing the forward-look</div>
        <div class="fn-text">Skip the weekly internal walkthrough and you become reactive. You&apos;re firefighting the city you&apos;re in instead of preparing for the one you&apos;re going to.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Festival advances are their own animal</div>
        <div class="fn-text">A headline date is your show. A festival date is somebody else&apos;s. Stage manager runs the day. Fixed changeover, fixed set. You fit into their system.</div>
      </div>

    <div class="module-tag">— 05 / OPENING —</div>
    <div class="page-title">THE DAY<br>OF SHOW</div>
    <div class="page-sub" style="margin-bottom: 22px;">The day the advance built — now playing out in real time.</div>

    <p class="para">Show day is a sequence. Bus arrival, load-in, set up, line check, sound check, catering, doors, opener, headliner, encore, merch, load-out, settlement, bus call. <strong>The order rarely changes. The times change every day.</strong> That&apos;s why the day sheet exists.</p>

    <p class="para">If the advance was the four-to-eight weeks of phone calls and recap emails that built the plan, the day of show is where that plan plays out. Every recap from every advance call is being executed right now. Every detail you locked four weeks ago is showing up — or not — on the floor of the venue. The day rewards the work you did before you arrived.</p>

    <p class="para">In our scenario, two people are conducting this day in parallel. The <strong>Tour Manager</strong> runs the day off-stage — the artist, the people, the money, the relationships. The <strong>Production Manager</strong> runs the day on-stage — the rig, the crew, the technical, the build. They share the same calendar. They&apos;re chasing different things. They converge at sound check, at doors, at the show, at load-out.</p>

    <div class="pc-callout">
      <div class="pcc-tag">— ROLE SPOTLIGHT —</div>
      <div class="pcc-title">THE PRODUCTION COORDINATOR</div>
      <div class="pcc-text">The next step up to solidify and grow The Blue Printers&apos; touring operation would be bringing along a Production Coordinator. A skilled Production Coordinator is a huge help in supporting larger crews on a tour run — managing day-of-show operations, working alongside the PM and TM, keeping the day&apos;s many moving parts coordinated. We&apos;ll touch on what a Production Coordinator handles across this module — but for our particular scenario, the Blue Printers Tour is running without one. The TM and PM cover the day between the two of them. <em>(Probably a budget call, if we had to guess.)</em></div>
    </div>

    <div class="pull-quote">
      <p>The advance is the brain. The day sheet is the heartbeat. Settlement is the receipt. Today we meet the day in motion.</p>
    </div>

    <p class="para">In this module we&apos;ll look at the day sheet itself, the rhythm of a show day, the two parallel timelines that run through it, and the practical beats that fill in the day — catering, the production office, sound check, doors, show, load-out. Then the failure modes, the lived-it wisdom, and the close.</p>

  <div class="body-area">
    <div class="module-tag">— 05 / THE RHYTHM —</div>
    <div class="page-title">THE RHYTHM<br>OF A SHOW DAY</div>

    <p class="para" style="margin-top: 12px;">Every show day flows through six phases. The names change a little tour to tour, but the structure holds. <strong>Master the rhythm and the day stops feeling like 18 hours and starts feeling like a sequence you&apos;re moving through.</strong></p>

    <div class="rhythm-strip">
      <div class="phase">
        <div class="phase-num">— PHASE 01 —</div>
        <div class="phase-name">PRE-LOAD</div>
        <div class="phase-desc">Personal time, parking check, schedule verify, hotel ops for drivers.</div>
      </div>
      <div class="phase">
        <div class="phase-num">— PHASE 02 —</div>
        <div class="phase-name">VENUE ACCESS</div>
        <div class="phase-desc">Step inside the building. Runner connect, walkthrough, signs up, crew briefed.</div>
      </div>
      <div class="phase">
        <div class="phase-num">— PHASE 03 —</div>
        <div class="phase-name">SETUP</div>
        <div class="phase-desc">Load-in, rig build, production office, look-ahead to tomorrow.</div>
      </div>
      <div class="phase">
        <div class="phase-num">— PHASE 04 —</div>
        <div class="phase-name">PRE-DOORS</div>
        <div class="phase-desc">Sound check, VIP, guest list lock, dinner, dressing rooms ready.</div>
      </div>
      <div class="phase">
        <div class="phase-num">— PHASE 05 —</div>
        <div class="phase-name">DOORS &amp; SHOW</div>
        <div class="phase-desc">Pre-show routine, doors, opener, headliner, settlement, encore.</div>
      </div>
      <div class="phase">
        <div class="phase-num">— PHASE 06 —</div>
        <div class="phase-name">OUT</div>
        <div class="phase-desc">Load-out, road report, drivers briefed, bus call, roll.</div>
      </div>
    </div>

    <div class="fn-section-title" style="margin-top: 14px;">Two Timelines, One Day</div>
    <div class="fn-section-sub">Both the TM and PM move through these phases in parallel — chasing different concerns.</div>

    <div class="converge-stage" style="margin-top: 8px;">
      <div class="converge-grid">
        <div class="converge-col tm">
          <div class="cc-tag">— THE TOUR MANAGER —</div>
          <div class="cc-title">RUNS THE DAY OFF-STAGE</div>
          <ul>
            <li>The artist — arrival, schedule, comfort</li>
            <li>The people — band, crew, guests</li>
            <li>Hospitality, catering, runners</li>
            <li>VIP &amp; meet-and-greet flow</li>
            <li>Guest list, settlement, road report</li>
          </ul>
        </div>
        <div class="converge-col pm">
          <div class="cc-tag">— THE PRODUCTION MANAGER —</div>
          <div class="cc-title">RUNS THE DAY ON-STAGE</div>
          <ul>
            <li>The rig — lights, video, audio, scenic</li>
            <li>The crew — load-in, build, departments</li>
            <li>Stage, power, rigging, technical</li>
            <li>Local labor — call, coordination, breaks</li>
            <li>Sound check, show readiness, load-out</li>
          </ul>
        </div>
      </div>

      <div class="converge-shared">
        <div class="cs-tag">— WHERE THEY CONVERGE —</div>
        <div class="cs-list">
          The <strong>walkthrough</strong> aligns everyone. <strong>Sound check</strong> is the day&apos;s first big test. <strong>Doors</strong> hands the front-of-house to venue ops. The <strong>show</strong> is where every line of the day sheet lands. <strong>Load-out</strong> is the reverse choreography of load-in. Both conductors are at every one of these.
        </div>
      </div>
    </div>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">The Day Sheet</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>
          <span class="kit-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.5" stroke-linejoin="round">

          <div class="item-body">The box office likes credential requests as early as possible. Set a daily reminder so this never falls off the list.</div>

          <div class="item-body">If you&apos;re not part of the show itself, use this time to advance future shows, finish other work, and start settling.</div>

        <div class="item">
          <div class="item-title">Load Out</div>
          <div class="item-body">Pack up your gear. Help your crew if they need you. Being the TM doesn&apos;t mean you never push cases.</div>
        </div>

        <div class="item">
          <div class="item-title">Road Report</div>
          <div class="item-body">Track all show income, merch income, and tour expenses. Share the link with your business manager.</div>

        </div>

        <div class="item">
          <div class="item-title">Schedule</div>
          <div class="item-body">Verify the day&apos;s schedule, then push it everywhere — printed sheets backstage, on the bus, anywhere people will look.</div>
        </div>

        <div class="item">
          <div class="item-title">Walkthrough</div>

        </div>

        <div class="item">
          <div class="item-title">Look Ahead</div>

          <div class="item-title">Sound Check &amp; VIP</div>

        <div class="item">
          <div class="item-title">Power &amp; Tech</div>
          <div class="item-body">The aspect your department leads — cover any nuances or changes of approach for the day before load-in so everyone&apos;s clear on what they&apos;re doing. Distro placement, console patch, video feed, RF coordination, intercom — all called out and confirmed.</div>
        </div>

          <div class="item-body">Quarterback the check. Flag anything drifting from rider. Time-box every band so the schedule holds for VIP and dinner.</div>

        <div class="item">
          <div class="item-title">Pre-Show Routine</div>
          <div class="item-body">Organize your responsibilities every night before the show. Build a checklist so nothing important gets skipped — rig ready, lights set, monitor world clear, backline cabled, comms hot.</div>

        <div class="item">
          <div class="item-title">Show</div>

          <div class="item-title">Venue Walk / Dummy Check</div>

          <div class="item-title">Walkthrough &amp; Signs</div>

        </div>

        <div class="item">
          <div class="item-title">Walk &amp; Talk with Rigging</div>
          <div class="item-body">Primary focus is rigging the stage. Walk the points with your head rigger — confirm motors and loads, mark where things land on the stage, downstage edge, FOH spike, monitor world. Adapt to the room before load-in starts.</div>

          <div class="item-body">Eat. Step off the floor for ten minutes. If catering is on site, work the room briefly with the crew — last calm moment before doors.</div>

          <div class="item-body">Hand the room over to venue ops. Stage is locked, monitor world set, lights pre-set, audience walking in. Your job shifts from build to watch.</div>

  <div class="body-area">
    <div class="module-tag">— 05 / CATERING + HOSPITALITY —</div>
    <div class="page-title">FOOD, ROOMS,<br>&amp; THE LITTLE THINGS</div>

    <div class="ch-intro-row">
      <div class="ch-intro-text">
        <p>The first hour inside the venue is a lay-of-the-land sweep. Where are the <strong>showers</strong>, how many, and what&apos;s the path? Get <strong>towels staged in an accessible spot</strong> so crew waking up off the bus can shower first thing in the morning. It&apos;s the smallest thing that sets the tone for everything that follows.</p>
        <p>The walkthrough is also when <strong>production signs</strong> get hung — production office, dressing rooms, stage, catering, dock, bus parking. A new city, an unfamiliar building, and a stack of pre-printed signs that point everyone exactly where they belong.</p>
        <p><strong>Ask the local venue staff</strong> how they navigate the building and what they&apos;ve seen work best — which artists go in which room, where to stage signs, the smartest spots to set up shop. They run this room every night. Their pattern recognition saves you from learning the hard way.</p>
      </div>
      <div class="signs-mini">
        <div class="signs-mini-label">— SIGN EXAMPLES —</div>
        <div class="sign-mini">CATERING</div>
        <div class="sign-mini sm">PRODUCTION<br>OFFICE</div>
        <div class="sign-mini sm">DRESSING<br>ROOMS</div>
        <div class="sign-mini">STAGE</div>
        <div class="sign-mini sm">
          <div>
            <span class="sign-mini-tag"><span class="the">The</span>Blue Printers</span>
            CREW
          </div>
        </div>
        <div class="sign-mini sign-mini-arrow"></div>
      </div>
    </div>

    <p class="para" style="margin-top: 10px;">Catering and hospitality run on a schedule woven through the rest of the day. A crew that eats on time and has a clean dressing room performs better. <strong>Both are deceptively important.</strong> Skip either one and you&apos;ll feel it by load-out.</p>

    <div class="ch-grid">
      <div class="ch-card">
        <div class="ch-tag">— MORNING —</div>
        <div class="ch-name">CATERING<br>BREAKFAST</div>
        <div class="ch-desc">Most venues will have catering running right out of the gate. As soon as crew steps inside, a full breakfast is ready — eggs, hot food, coffee, fruit. Sets the tone for the day.</div>
      </div>
      <div class="ch-card">
        <div class="ch-tag">— MIDDAY —</div>
        <div class="ch-name">CREW LUNCH</div>
        <div class="ch-desc">Hot meal, scheduled to land during a natural break in load-in. Hot food on time keeps the build moving.</div>
      </div>
      <div class="ch-card">
        <div class="ch-tag">— AFTERNOON —</div>
        <div class="ch-name">DRESSING ROOM PREP</div>
        <div class="ch-desc">Rider provisions stocked. Water, towels, snacks, hot beverages. Door-tagged with names. Showers prepped.</div>
      </div>
      <div class="ch-card">
        <div class="ch-tag">— PRE-DOORS —</div>
        <div class="ch-name">BAND DINNER</div>
        <div class="ch-desc">Often a buyout, sometimes in-venue. Either way, locked in advance, served on time, dietary handled.</div>
      </div>
      <div class="ch-card">
        <div class="ch-tag">— SHOW —</div>
        <div class="ch-name">SHOW DRINKS</div>
        <div class="ch-desc">Beverage stock backstage during the show. Cold towels, water bottles to the stage between sets.</div>
      </div>
      <div class="ch-card">
        <div class="ch-tag">— POST-SHOW —</div>
        <div class="ch-name">LATE PLATE</div>
        <div class="ch-desc">After the show, a snack or hot plate available for crew during load-out. Drivers eat too.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>A crew that eats on time will work harder for you. Take care of food and rooms — it&apos;s the cheapest morale you can buy.</p>
    </div>

    <p class="para">Runners and the venue&apos;s hospitality lead are your best allies here. Walk the dressing rooms with them early in the day, hand off the rider, and check back at every meal time. <strong>The TM owns this rhythm</strong> — and on tours that travel a <em>Production Coordinator</em>, this is one of the areas they greatly assist, keeping crew fed and taken care of across every base.</p>

    <div class="next-up">
      <span>NEXT</span>

  <div class="body-area">
    <div class="module-tag">— 05 / THE PO —</div>
    <div class="page-title">THE PRODUCTION<br>OFFICE</div>

    <p class="para" style="margin-top: 14px;">Every show day has a <strong>production office.</strong> Sometimes it&apos;s a real office. Sometimes it&apos;s a dressing room with a folding table and the WiFi password taped to the wall. Whatever the space, it&apos;s where the day&apos;s paper, comms, and decisions live. Set it up first thing in the morning.</p>

    <div class="po-stage">
      <div class="po-tag">— WHAT THE PO HOLDS —</div>
      <div class="po-grid">
        <div class="po-item"><strong>Day sheet</strong> — taped to the wall, multiple copies stacked</div>
        <div class="po-item"><strong>Advance packet</strong> — printed, in a binder, open to today</div>
        <div class="po-item"><strong>Venue contacts</strong> — names, numbers, where they sit</div>
        <div class="po-item"><strong>Local crew list</strong> — by department, with call times</div>
        <div class="po-item"><strong>Hospitality rider</strong> — taped near the catering door</div>
        <div class="po-item"><strong>Settlement folder</strong> — contract, manifest waiting, deal terms</div>
        <div class="po-item"><strong>Cash box / float</strong> — locked, with the TM</div>
        <div class="po-item"><strong>Comms — radios, chargers</strong> — distributed at the start of the day</div>
        <div class="po-item"><strong>Power strips</strong> — laptops, phones, runners&apos; chargers</div>
        <div class="po-item"><strong>Snacks &amp; coffee</strong> — keeps people coming in, helps build relationships</div>
      </div>
    </div>

    <p class="para">The PO is also <strong>the meeting place of the day.</strong> The venue PM stops in. The promoter rep stops in. The security lead stops in. Settlement happens here. <em>Keep it organized. Keep it stocked. Keep it open.</em></p>

    <p class="para">At smaller scale, the TM and PM share the PO. At arena scale, the production coordinator runs it day to day. Either way, it&apos;s the day&apos;s anchor — when something goes sideways, this is where everyone converges to sort it out.</p>

      <span>NEXT</span>
      <span class="arrow">— SOUND CHECK →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 05 / SOUND CHECK —</div>
    <div class="page-title">SOUND CHECK</div>
    <div class="page-sub" style="margin-bottom: 18px;">The day&apos;s first big convergence.</div>

    <p class="para">Sound check is the first moment the whole day comes together. The TM is making sure the artist is on time, fed, and ready. The PM is making sure the gear is set, the crew is in position, the room is dialed. The band shows up to play. <strong>It&apos;s the first test of whether the day is calm or not.</strong></p>

    <div class="sec-head">Timing</div>
    <p class="para">Protect the window. Sound check has a habit of getting compressed — load-in ran long, the bass amp needs a swap, VIP showed up early. The good PM/TM duo holds the line: <em>sound check starts at the time on the day sheet.</em> Compromise once and it compromises every show.</p>

    <div class="sec-head">Comms during check</div>
    <p class="para">Everyone in position. FOH dialing the room. Monitor world reading the band. The PM at front of stage with eyes on the rig and ears on the comms. Stage manager calling cues. <strong>Talk to each other.</strong> The day&apos;s first real conversation between the team happens here.</p>

    <div class="sec-head">What follows the check</div>
    <ul class="topics">
      <li><strong>Meet &amp; greet / photos</strong> — disciplined window, owned by the TM, runners moving people through</li>
      <li><strong>Opening Act sound check</strong> — shorter window, often line check only</li>
      <li><strong>Dinner</strong> — band and crew, often a buyout window for the band</li>
      <li><strong>Dressing rooms tidied</strong> — runners refresh towels, water, snacks before doors</li>
    </ul>

    <div class="pull-quote">
      <p>Sound check is the moment to fix what tomorrow&apos;s rider should already say. Document everything that shifts.</p>
    </div>

  <div class="body-area">
    <div class="module-tag">— 05 / THE REMAINING BEATS —</div>
    <div class="page-title">DOORS, SHOW,<br>LOAD-OUT</div>

    <p class="para" style="margin-top: 14px;">The day&apos;s remaining beats run in sequence, each with its own choreography. By the time you hit doors, the day&apos;s heavy lifting is done. By the time you hit load-out, the day&apos;s memory is what holds it together.</p>

    <div class="three-beat">
      <div class="tb">
        <div class="tb-tag">— BEAT 01 —</div>
        <div class="tb-name">DOORS</div>
        <div class="tb-text">Pre-show routine for the artist. Box office in motion. Security on the doors and at the pit. Merch open and stocked. <strong>The handoff to venue ops is now in effect.</strong> Crew downshifts; venue staff takes over the front-of-house.</div>
      </div>
      <div class="tb">
        <div class="tb-tag">— BEAT 02 —</div>
        <div class="tb-name">THE SHOW</div>
        <div class="tb-text">Opener plays, changeover, headliner. TM watches show flow, settles in the back. PM on comms, eyes on the rig. The road report fills in real time — show income, merch income recorded as it comes through.</div>
      </div>
      <div class="tb">
        <div class="tb-tag">— BEAT 03 —</div>
        <div class="tb-name">LOAD-OUT</div>
        <div class="tb-text">Reverse load-in. Departments tear down on cue. Local crew works to the truck. <strong>Bus call drives everything.</strong> The clock is hard. Drivers get briefed on the next routing while the floor empties.</div>
      </div>
    </div>

    <p class="para">Three patterns separate good show flow from rough show flow:</p>
    <ul class="topics">
      <li><strong>Comms discipline</strong> — radios stay open, departments talk to each other, the PM is reachable</li>
      <li><strong>Real-time documentation</strong> — road report updated during the show, not after</li>
      <li><strong>Bus call as a hard line</strong> — load-out plans backward from bus call, not forward from set end</li>
    </ul>

    <div class="pull-quote">
      <p>The show is the reason the day exists. Everything before it is preparation. Everything after it is reset for tomorrow.</p>
    </div>

    </div>

  <div class="body-area">
    <div class="module-tag">— 05 / WATCH-OUTS —</div>
    <div class="page-title">WHEN THE DAY<br>GOES SIDEWAYS</div>
    <div class="page-sub" style="margin-bottom: 14px;">Calm response is what separates a clean day from a chaotic one.</div>

    <p class="para">Even with a perfect advance, things go sideways on show day. The runner doesn&apos;t show. The artist is late. The amp blows mid-set. A festival date gets cancelled by weather. <strong>The advance covered the predictable. The day still has its surprises.</strong> Good show-day execution is a calm response to whatever arrives — because the predictable stuff is already handled.</p>

    <div class="sideways-grid">
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 01 —</div>
        <div class="sg-q">THE RUNNER DOESN&apos;T SHOW UP</div>
        <div class="sg-a">Loop in the venue contact immediately. Hand them the rider list. Often the venue can supply a stand-in or get the runner in within an hour. Don&apos;t let hospitality slip.</div>
      </div>
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 02 —</div>
        <div class="sg-q">LOAD-IN IS RUNNING BEHIND</div>
        <div class="sg-a">Equipment issues, labor problems, or a notoriously bad load-in path — a long push from trucks, cramped corridors, lots of shuffling. An hour or two of delay cascades through the rest of the day. Compress sound check, reshuffle VIP, push dinner, hold doors as the hard line.</div>
      </div>
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 03 —</div>
        <div class="sg-q">A CREW MEMBER IS INJURED</div>
        <div class="sg-a">Stop. Get them medical attention. Document immediately. Adjust the call to cover their absence. Insurance and HR side starts moving in parallel — call the office.</div>
      </div>
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 04 —</div>
        <div class="sg-q">VENUE WALKS BACK AN ADVANCE COMMITMENT</div>
        <div class="sg-a">Pull up the recap email from the advance. Walk them through what was agreed. If it sticks, escalate to promoter. The recap is your protection.</div>
      </div>
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 05 —</div>
        <div class="sg-q">ARTIST, BAND, OR OPENING ACT IS LATE</div>
        <div class="sg-a">Compress sound check — line check only if needed. Move VIP earlier or later. Push dinner to a buyout. Doors don&apos;t move. They arrive, you adapt.</div>
      </div>
      <div class="sg">
        <div class="sg-num">— SIDEWAYS 06 —</div>
        <div class="sg-q">EQUIPMENT FAILS MID-SET</div>
        <div class="sg-a">The backline tech, FOH eng, and monitor eng all know their swap plan. The show keeps moving. A bass cab dies — backup is on. A console crashes — reboot, retain settings.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>Calm is the asset. Panic is the cost. The crew watches you when something breaks — be the one whose body language says &quot;we&apos;ve got this.&quot;</p>
    </div>

  <div class="body-area">
    <div class="module-tag">— 05 / FIELD NOTES —</div>
    <div class="page-title">FIELD<br>NOTES</div>

    <div class="fn-section-title">Show-Day Habits Worth Keeping</div>
    <div class="fn-section-sub">Small disciplines that compound across a tour.</div>

    <div class="fn-list">
      <div class="fn-item">
        <div class="fn-name">Walk the building twice — once with the venue, once alone</div>
        <div class="fn-text">The first walkthrough is for alignment. The second is for you — to spot the exits, find the quiet corner, learn the routes you&apos;ll need later when the day gets busy.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Get signs up before crew wakes up</div>
        <div class="fn-text">Production office, dressing rooms, catering, dock. Crew walking off the bus into a new city shouldn&apos;t have to ask where the shower is. It&apos;s the first impression of the day.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Eat with the crew when you can</div>
        <div class="fn-text">Crew dinner isn&apos;t just food — it&apos;s the day&apos;s only group conversation. The TM and PM eating with the crew gives the day a center of gravity. Don&apos;t always work through it.</div>
      </div>
    </div>

    <div class="fn-section-title">Things That Surprise People</div>
    <div class="fn-section-sub">A few things show day teaches you only by living it.</div>

    <div class="fn-list">
      <div class="fn-item">
        <div class="fn-name">The day is long but the show is short</div>
        <div class="fn-text">Fifteen hours of setup for ninety minutes of show. Build the day around the moment. Don&apos;t exhaust the crew or yourself before doors.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Doors changes the air in the building</div>
        <div class="fn-text">The pre-doors energy and the post-doors energy are completely different rooms. Your job shifts from building to executing. Recognize the shift.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Load-out tells you who your crew really is</div>
        <div class="fn-text">After a long day, exhausted, the load-out is when crew character shows. Who&apos;s still helping after their department is packed? Who&apos;s asking what else needs to roll? Pay attention.</div>
      </div>
    </div>

    <div class="fn-section-title">Ways to Simplify</div>
    <div class="fn-section-sub">How show day compresses when the tour is smaller &mdash; and what still holds.</div>

    <div class="fn-list">
      <div class="fn-item">
        <div class="fn-name">At smaller scale, you are the day sheet</div>
        <div class="fn-text">When there&apos;s no TM and PM splitting the day, one person holds the rhythm in their head and on their phone. A simple Notes app entry with the day&apos;s times, the venue contact, and the WiFi password gets you 90% of the way. The discipline is the same; the document just lives in your pocket instead of on the wall.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">The production office can be a corner of the dressing room</div>
        <div class="fn-text">A folding chair, a power strip, and the venue WiFi turn any backstage corner into the day&apos;s anchor. What matters isn&apos;t the room &mdash; it&apos;s that everyone knows where to find you when something needs sorting.</div>
      </div>
      <div class="fn-item">
        <div class="fn-name">Lean on the venue for what your tour can&apos;t carry</div>
        <div class="fn-text">Smaller tours rely heavily on the venue&apos;s staff, gear, and rhythm. Show up early, introduce yourself to the house FOH and the door staff, and treat the venue team like part of the tour for the day. The day runs smoother when the people around you want it to.</div>
      </div>
    </div>

    <div class="page-title">WHAT IT IS,<br>WHY IT IS,<br>HOW IT WORKS</div>

    <div class="trio">
      <div class="block">
        <div class="b-tag">— WHAT IT IS —</div>
        <div class="b-text">The day the advance built — now playing out in real time. Bus arrival to bus call, every detail you locked weeks ago showing up on the floor of the venue.</div>
      </div>
      <div class="block">
        <div class="b-tag">— WHY IT IS —</div>
        <div class="b-text">Live performance is one-shot. The day rewards the work you did before you arrived. Good show-day execution is calm in the face of the unexpected because the expected is already handled.</div>
      </div>
      <div class="block">
        <div class="b-tag">— HOW IT WORKS —</div>
        <div class="b-text">Six phases. Two parallel conductors — TM off-stage, PM on-stage. Anchored by the day sheet. Run through the production office. Locked at sound check. Delivered at the show. Closed at load-out.</div>
      </div>
    </div>

    <div class="pull-quote">
      <p>The day sheet is the heartbeat. The two timelines are the rhythm. Now we look at the systems that move people safely through the building.</p>
    </div>

  .doc-stamp .doc-rev { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--orange); border-bottom: 1px solid var(--orange); padding-bottom: 1px; }
  .doc-stamp .pg-num { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-top: 2px; line-height: 1.4; }
  .doc-stamp .pg-num .pg-of { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 8px; letter-spacing: 1.8px; color: rgba(244,241,234,0.5); margin-left: 2px; }

  /* COVER */
  .cover-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 60px; position: relative; }
  .cover-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--orange); margin-bottom: 18px; }
  .cover-main { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 88px; letter-spacing: 2px; line-height: 0.92; color: var(--bone); margin-bottom: 8px; }
  .cover-sub { font-family: 'Archivo', sans-serif; font-weight: 300; font-size: 22px; letter-spacing: 5px; color: var(--bone); margin-top: 14px; }
  .cover-rule { width: 80px; height: 2px; background: var(--orange); margin: 30px auto 24px; }
  .cover-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: rgba(244,241,234,0.55); line-height: 1.7; max-width: 480px; }
  .cover-corners .corner { position: absolute; width: 28px; height: 28px; border: 1.5px solid var(--orange); }
  .cover-corners .tl { top: 40px; left: 60px; border-right: 0; border-bottom: 0; }
  .cover-corners .tr { top: 40px; right: 60px; border-left: 0; border-bottom: 0; }
  .cover-corners .bl { bottom: 40px; left: 60px; border-right: 0; border-top: 0; }
  .cover-corners .br { bottom: 40px; right: 60px; border-left: 0; border-top: 0; }

  /* CONTENT PAGE */
  .page2 { background: #FFFFFF; color: var(--black); }
  .page2::before { display: none; }
  .page2 .page-header { background: var(--black); background-image: linear-gradient(rgba(27,58,92,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(27,58,92,0.2) 1px, transparent 1px); background-size: 22px 22px; border-bottom: 2px solid var(--orange); }
  .page2 .body-area { padding: 22px 36px 26px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page2 .module-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--orange); margin-bottom: 6px; }
  .page2 .page-title { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 44px; letter-spacing: 1px; line-height: 0.98; color: var(--black); margin-bottom: 6px; }
  .page2 .page-sub { font-family: 'Archivo', sans-serif; font-weight: 300; font-size: 16px; letter-spacing: 1px; line-height: 1.2; color: var(--black); margin-bottom: 14px; }
  .page2 .para { font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 400; line-height: 1.55; color: var(--black); margin-bottom: 9px; }
  .page2 .para strong { font-weight: 700; }
  .page2 .para em { font-style: italic; }
  .page2 .pull-quote { border-left: 3px solid var(--orange); padding: 10px 16px; margin: 12px 0; background: rgba(14,14,14,0.04); }
  .page2 .pull-quote p { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; line-height: 1.5; color: var(--black); margin-bottom: 0; }
  .page2 .sec-head { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--black); margin: 12px 0 6px; padding-bottom: 3px; border-bottom: 0.5px solid rgba(14,14,14,0.25); }
  .page2 ul.topics { list-style: none; margin: 0 0 6px 0; padding: 0; }
  .page2 ul.topics > li { font-family: 'Inter', sans-serif; font-size: 12px; line-height: 1.5; color: var(--black); padding: 3px 0 3px 16px; position: relative; }
  .page2 ul.topics > li::before { content: ''; position: absolute; left: 0; top: 9px; width: 5px; height: 5px; background: var(--orange); }
  .page2 ul.topics > li strong { font-weight: 700; }
  .page2 ul.topics > li ul { list-style: none; margin: 4px 0 2px 0; padding: 0; }
  .page2 ul.topics > li ul li { font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.45; color: rgba(14,14,14,0.85); padding: 1px 0 1px 14px; position: relative; }
  .page2 ul.topics > li ul li::before { content: '—'; position: absolute; left: 0; top: 1px; color: var(--orange); font-size: 10px; }

  /* PC callout */
  .pc-callout {
    margin: 12px 0;
    padding: 12px 14px;
    background: var(--black);
    color: var(--bone);
    border-left: 3px solid var(--orange);
  }
  .pc-callout .pcc-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 2.5px; color: var(--orange); margin-bottom: 4px; }
  .pc-callout .pcc-title { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--bone); margin-bottom: 6px; }
  .pc-callout .pcc-text { font-family: 'Inter', sans-serif; font-size: 11px; line-height: 1.5; color: var(--bone); }
  .pc-callout .pcc-text em { color: var(--orange); font-style: normal; font-weight: 700; }

  /* Next-up footer */
  .next-up { margin-top: auto; padding-top: 10px; border-top: 0.5px solid rgba(14,14,14,0.2); display: flex; justify-content: space-between; align-items: baseline; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: rgba(14,14,14,0.55); }
  .next-up .arrow { color: var(--orange); }

  /* BINDER CALLOUT (FROM THE BINDER pattern) */
  .binder-callout {
    margin: 12px 0 10px;
    padding: 14px 16px 15px;
    background: rgba(212,100,30,0.06);
    border: 1px solid var(--orange);
    color: var(--black);
    position: relative;
  }
  .binder-callout .bc-title-dark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 6px;
    line-height: 1.15;
  }
  .binder-callout p.bc-text-dark {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    line-height: 1.55;
    color: var(--black);
    margin: 0;
  }
  .binder-callout p.bc-text-dark strong { font-weight: 700; }
  .kit-title-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 6px; }
  .kit-title-row > .bc-title-dark { margin-bottom: 0; flex: 1; min-width: 0; }
  .kit-eyebrow { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .kit-mark { flex-shrink: 0; width: 22px; height: 22px; display: inline-block; order: 2; }
  .kit-mark svg { display: block; width: 100%; height: 100%; }
  .kit-eyebrow .kit-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 2.5px; color: var(--orange); line-height: 1; }

  /* ============================================ */
  /* PAGE 3 — CREDENTIALS TIER VISUAL              */
  /* ============================================ */
  .cred-board {
    margin: 6px 0 8px;
    border: 0.5px solid rgba(14,14,14,0.25);
    background: rgba(14,14,14,0.02);
    padding: 14px 16px 16px;
  }
  .cred-board-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    text-align: center;
    margin-bottom: 12px;
  }
  .cred-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cred-row {
    display: grid;
    grid-template-columns: 96px 1fr;
    align-items: stretch;
    gap: 0;
    border: 0.5px solid rgba(14,14,14,0.35);
  }
  .cred-pass {
    background: var(--black);
    color: var(--bone);
    padding: 8px 10px 9px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-right: 2px solid var(--orange);
  }
  .cred-pass .cp-band {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--orange);
    margin-bottom: 2px;
  }
  .cred-pass .cp-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--bone);
    line-height: 1.05;
  }
  .cred-grant {
    padding: 8px 12px 9px;
    background: #FFFFFF;
  }
  .cred-grant .cg-row1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 10.5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 2px;
  }
  .cred-grant .cg-row2 {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
    color: rgba(14,14,14,0.78);
  }
  .cred-row.tier-aaa .cred-pass { background: var(--orange); }
  .cred-row.tier-aaa .cred-pass .cp-band,
  .cred-row.tier-aaa .cred-pass .cp-name { color: var(--bone); }
  .cred-row.tier-aaa .cred-pass { border-right-color: var(--black); }

  /* ============================================ */
  /* PAGE 4 — PASS SYSTEM GRID                     */
  /* ============================================ */
  .pass-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 10px 0 10px;
  }
  .pass-card {
    border: 0.5px solid rgba(14,14,14,0.25);
    border-top: 2px solid var(--orange);
    padding: 9px 12px 10px;
    background: rgba(14,14,14,0.02);
  }
  .pass-card .pc-head {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 11.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 4px;
  }
  .pass-card .pc-body {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.45;
    color: var(--black);
  }
  .pass-card .pc-body strong { font-weight: 700; color: var(--orange); }

  /* ============================================ */
  /* PAGE 5 — SAMPLE PASS BOARD                    */
  /* ============================================ */
  .passboard {
    flex: 1;
    margin: 4px 0 0;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 14px;
    min-height: 0;
  }
  .pb-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .pb-col-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--orange);
    border-bottom: 1px solid var(--orange);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  /* Wristbands (left column) */
  .pb-bands {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .pb-band {
    border-radius: 14px;
    padding: 7px 14px 7px 12px;
    display: grid;
    grid-template-columns: 56px 1fr 70px;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(14,14,14,0.15);
  }
  .pb-band::before,
  .pb-band::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(14,14,14,0.35);
  }
  .pb-band::before { left: 3px; }
  .pb-band::after { right: 3px; }
  .pb-band .pbb-logo {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 8.5px;
    letter-spacing: 0.5px;
    line-height: 1;
    text-transform: uppercase;
    color: var(--bone);
    background: var(--black);
    padding: 5px 6px;
    text-align: center;
    border-radius: 3px;
    min-width: 50px;
  }
  .pb-band .pbb-logo span {
    display: block;
    font-weight: 300;
    font-size: 6.5px;
    letter-spacing: 1.5px;
    margin-top: 1px;
    color: var(--orange);
  }
  .pb-band .pbb-role {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 12.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--black);
    line-height: 1.1;
  }
  .pb-band .pbb-role .pbb-sub {
    display: block;
    font-weight: 400;
    font-size: 8px;
    letter-spacing: 1.5px;
    margin-top: 1px;
    text-transform: uppercase;
    color: rgba(14,14,14,0.7);
  }
  .pb-band .pbb-color {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px;
    letter-spacing: 1px;
    color: rgba(14,14,14,0.7);
    text-align: right;
    text-transform: uppercase;
    line-height: 1.2;
  }
  /* Band color variants */
  .pb-band.bg-orange   { background: #F58A2C; }
  .pb-band.bg-red      { background: #C03B3B; }
  .pb-band.bg-red .pbb-role,
  .pb-band.bg-red .pbb-color,
  .pb-band.bg-red .pbb-role .pbb-sub { color: #F4F1EA; }
  .pb-band.bg-red .pbb-color { color: rgba(244,241,234,0.7); }
  .pb-band.bg-red .pbb-role .pbb-sub { color: rgba(244,241,234,0.7); }
  .pb-band.bg-lime     { background: #B6CD3D; }
  .pb-band.bg-gold     { background: #D9C26A; }
  .pb-band.bg-blue     { background: #3B6FAE; }
  .pb-band.bg-blue .pbb-role,
  .pb-band.bg-blue .pbb-color,
  .pb-band.bg-blue .pbb-role .pbb-sub { color: #F4F1EA; }
  .pb-band.bg-blue .pbb-color { color: rgba(244,241,234,0.7); }
  .pb-band.bg-blue .pbb-role .pbb-sub { color: rgba(244,241,234,0.7); }
  .pb-band.bg-stageblack { background: var(--black); }
  .pb-band.bg-stageblack .pbb-role,
  .pb-band.bg-stageblack .pbb-color,
  .pb-band.bg-stageblack .pbb-role .pbb-sub { color: #F4F1EA; }
  .pb-band.bg-stageblack .pbb-color { color: rgba(244,241,234,0.7); }
  .pb-band.bg-stageblack .pbb-role .pbb-sub { color: rgba(244,241,234,0.7); }
  .pb-band.bg-stageblack .pbb-logo { background: var(--orange); color: var(--black); }
  .pb-band.bg-stageblack .pbb-logo span { color: rgba(14,14,14,0.7); }
  .pb-band.bg-pink     { background: #E8B4C2; }

  /* Laminate credentials (right column) */
  .pb-lams {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    flex: 1;
    min-height: 0;
  }
  .pb-lam {
    background: var(--black);
    color: var(--bone);
    border: 1px solid rgba(14,14,14,0.3);
    padding: 6px 7px 7px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    min-height: 100px;
    box-shadow: 0 1px 0 rgba(14,14,14,0.15);
  }
  .pb-lam::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px;
    height: 1px;
    background: var(--orange);
    opacity: 0.6;
  }
  .pb-lam .lam-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 6px;
    letter-spacing: 1.5px;
    color: rgba(244,241,234,0.55);
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 4px;
    text-align: center;
    line-height: 1.2;
  }
  .pb-lam .lam-head strong {
    color: var(--orange);
    font-weight: 700;
  }
  .pb-lam .lam-art {
    flex: 1;
    background:
      linear-gradient(135deg, transparent 0 38%, rgba(212,100,30,0.18) 38% 42%, transparent 42% 58%, rgba(212,100,30,0.12) 58% 62%, transparent 62%),
      linear-gradient(rgba(244,241,234,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,241,234,0.04) 1px, transparent 1px),
      var(--black);
    background-size: 100% 100%, 12px 12px, 12px 12px, auto;
    border: 0.5px solid rgba(244,241,234,0.1);
    margin: 0 0 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
  }
  .pb-lam .lam-mark {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--orange);
    text-shadow: 0 0 6px rgba(212,100,30,0.3);
  }
  .pb-lam .lam-role {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--bone);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .pb-lam .lam-access {
    font-family: 'JetBrains Mono', monospace;
    font-size: 6px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: rgba(244,241,234,0.7);
    text-align: center;
    line-height: 1.35;
    border-top: 0.5px solid rgba(244,241,234,0.2);
    padding-top: 3px;
  }
  /* AAA variant — red laminate (tour leadership: TM, PM) */
  .pb-lam.lam-aaa {
    background: #C03B3B;
    color: var(--bone);
  }
  .pb-lam.lam-aaa::before { background: var(--black); opacity: 0.4; }
  .pb-lam.lam-aaa .lam-head { color: rgba(244,241,234,0.85); }
  .pb-lam.lam-aaa .lam-head strong { color: var(--bone); }
  .pb-lam.lam-aaa .lam-art {
    background:
      linear-gradient(135deg, transparent 0 38%, rgba(14,14,14,0.18) 38% 42%, transparent 42% 58%, rgba(14,14,14,0.12) 58% 62%, transparent 62%),
      linear-gradient(rgba(14,14,14,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14,14,14,0.06) 1px, transparent 1px),
      #C03B3B;
    border-color: rgba(14,14,14,0.18);
  }
  .pb-lam.lam-aaa .lam-mark { color: var(--bone); text-shadow: 0 0 6px rgba(14,14,14,0.25); }
  .pb-lam.lam-aaa .lam-access {
    color: rgba(244,241,234,0.9);
    border-top-color: rgba(14,14,14,0.25);
  }

  /* TOUR variant — orange laminate (mid-tier tour: Tour Crew) */
  .pb-lam.lam-tour {
    background: var(--orange);
    color: var(--bone);
  }
  .pb-lam.lam-tour::before { background: var(--black); opacity: 0.4; }
  .pb-lam.lam-tour .lam-head { color: rgba(244,241,234,0.85); }
  .pb-lam.lam-tour .lam-head strong { color: var(--black); }
  .pb-lam.lam-tour .lam-art {
    background:
      linear-gradient(135deg, transparent 0 38%, rgba(14,14,14,0.18) 38% 42%, transparent 42% 58%, rgba(14,14,14,0.12) 58% 62%, transparent 62%),
      linear-gradient(rgba(14,14,14,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14,14,14,0.06) 1px, transparent 1px),
      var(--orange);
    border-color: rgba(14,14,14,0.15);
  }
  .pb-lam.lam-tour .lam-mark { color: var(--black); text-shadow: none; }
  .pb-lam.lam-tour .lam-access {
    color: rgba(244,241,234,0.95);
    border-top-color: rgba(14,14,14,0.25);
  }

  .pb-footnote {
    margin-top: 8px;
    padding: 8px 12px 9px;
    background: rgba(14,14,14,0.04);
    border-left: 3px solid var(--orange);
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.5;
    color: var(--black);
  }
  .pb-footnote strong { font-weight: 700; }

  /* ============================================ */
  /* PAGE 6 — PEOPLE FLOW DIAGRAM                  */
  /* ============================================ */
  .flow-board {
    flex: 1;
    margin: 6px 0 0;
    border: 0.5px solid rgba(14,14,14,0.25);
    background: rgba(14,14,14,0.02);
    padding: 12px 16px 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .flow-svg-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .flow-svg-wrap svg { width: 100%; height: 100%; max-height: 100%; display: block; }
  .flow-legend {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid rgba(14,14,14,0.2);
  }
  .flow-legend .leg-item {
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .flow-legend .leg-swatch {
    width: 18px;
    height: 3px;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .flow-legend .leg-body {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    line-height: 1.35;
    color: var(--black);
  }
  .flow-legend .leg-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 900;
    font-size: 9.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 1px;

  <div class="body-area">
    <div class="module-tag">— 06 / OPENING —</div>
    <div class="page-title">SHOW DAY<br>AS CHOREOGRAPHY.</div>
    <div class="page-sub" style="margin-bottom: 22px;">The other half of the day is a question of <em>where</em>.</div>

    <p class="para">Module 05 was about the day&rsquo;s rhythm &mdash; bus arrival, load-in, sound check, doors, show, load-out, bus call. Module 06 is the layer running underneath all of that. <strong>Show day is people moving through space.</strong> Audience flowing in and out. Crew working from load-in to load-out. Artist moving from bus to dressing room to stage to encore. VIPs cycling through pre-show experiences. Security holding the lines that keep everything separate but coordinated.</p>

    <p class="para">This module is about that spatial layer &mdash; <em>who can be where, how they got there, and what protects them on the way.</em> The day&rsquo;s timing already lives in Module 05. This one covers credentials, the routes people travel through your venue, the security partnership that makes all of it work, and what happens when something goes sideways.</p>

    <div class="pull-quote">
      <p>If the day sheet is the <em>when</em>, this module is the <em>where</em> and the <em>who&rsquo;s allowed</em>.</p>
    </div>

    <div class="sec-head">What this module covers</div>
    <ul class="topics">
      <li><strong>Credentials</strong> &mdash; pass types, what each tier grants, where they come from</li>
      <li><strong>People flow</strong> &mdash; audience, artist, crew, and VIP paths through the venue</li>
      <li><strong>Security as partnership</strong> &mdash; the day-of meeting, the agenda, and the deployment plan</li>
      <li><strong>VIP &amp; meet-and-greet logistics</strong> &mdash; the micro-flow inside the spatial layer</li>
      <li><strong>Infrastructure</strong> &mdash; barricade, photo pit, wayfinding, the hardware doing the work</li>
      <li><strong>Emergencies</strong> &mdash; protocols, the TM&rsquo;s role, the calls you make and don&rsquo;t make</li>
    </ul>

    <p class="para">A note before we go: <strong>you&rsquo;re not the security expert.</strong> The local team is. Your job is to give them the picture of what your show is, lead with their expertise, and leave the meeting with their cell number in your phone. We&rsquo;ll come back to that. Hold the thought.</p>

      <span>UP NEXT</span>
      <span class="arrow">— CREDENTIALS 101 →</span>
    </div>

  <div class="body-area">
    <div class="module-tag">— 06 / CREDENTIALS —</div>
    <div class="page-title">CREDENTIALS 101.</div>
    <div class="page-sub">What a pass is, what it grants, and how the tiers stack.</div>

    <p class="para">A credential is permission to be somewhere. That&rsquo;s it. The pass on someone&rsquo;s chest is a fast visual answer to a security guard&rsquo;s question: <em>are you supposed to be here?</em> A well-designed pass system makes that answer obvious at a glance and impossible to fake without effort.</p>

    <p class="para">Most touring shows run a <strong>tiered pass system</strong>. Higher tiers grant access to more of the building. Lower tiers grant access to less. The system doesn&rsquo;t need to be elaborate &mdash; what it needs is to be clear, color-coded, and understood by everyone enforcing it.</p>

    <div class="cred-board">
      <div class="cred-board-tag">— TYPICAL TIER STACK —</div>
      <div class="cred-stack">
        <div class="cred-row tier-aaa">
          <div class="cred-pass"><div class="cp-band">— TIER 01 —</div><div class="cp-name">All Access</div></div>
          <div class="cred-grant"><div class="cg-row1">Anywhere in the building</div><div class="cg-row2">Production, dressing rooms, stage, FOH, backstage, bus area. Limited issue &mdash; key crew and tour leadership only.</div></div>
        </div>
        <div class="cred-row">
          <div class="cred-pass"><div class="cp-band">— TIER 02 —</div><div class="cp-name">Working Crew</div></div>
          <div class="cred-grant"><div class="cg-row1">Backstage, stage, production</div><div class="cg-row2">Day-of-show working crew &mdash; touring techs, local labor, runners. Not VIP areas or guest spaces.</div></div>
        </div>
        <div class="cred-row">
          <div class="cred-pass"><div class="cp-band">— TIER 03 —</div><div class="cp-name">Backstage</div></div>
          <div class="cred-grant"><div class="cg-row1">Backstage hallways, hospitality</div><div class="cg-row2">Vendors, guest crew, family/friends with backstage privileges. Not the stage during the show, not the production office.</div></div>
        </div>
        <div class="cred-row">
          <div class="cred-pass"><div class="cp-band">— TIER 04 —</div><div class="cp-name">VIP</div></div>
          <div class="cred-grant"><div class="cg-row1">VIP areas + soundcheck party</div><div class="cg-row2">Paid VIP package guests. Access to pre-show experience, M&amp;G if part of the package, premium seating area. Not backstage proper.</div></div>
        </div>
        <div class="cred-row">
          <div class="cred-pass"><div class="cp-band">— TIER 05 —</div><div class="cp-name">Photo Pass</div></div>
          <div class="cred-grant"><div class="cg-row1">Photo pit, first three songs</div><div class="cg-row2">Credentialed press photographers. Specific time-window, specific zone. Gear rules attached &mdash; usually no flash, no video.</div></div>
        </div>
        <div class="cred-row">
          <div class="cred-pass"><div class="cp-band">— TIER 06 —</div><div class="cp-name">Press</div></div>
          <div class="cred-grant"><div class="cg-row1">Designated press area</div><div class="cg-row2">Working press. Often paired with a separate photo pass if they&rsquo;re shooting. Press box, lobby interviews, sometimes a quick post-show.</div></div>
        </div>
      </div>
    </div>

    <p class="para" style="margin-top: 6px;">Pass formats vary by scale &mdash; <strong>printed laminate</strong> for most touring shows, <strong>wristband or sticker</strong> for higher-volume nights, <strong>RFID</strong> for festival-scale runs where the read-rate matters. The format follows the venue. The tier logic doesn&rsquo;t change.</p>

  <div class="body-area">
    <div class="module-tag">— 06 / DESIGNING YOUR SYSTEM —</div>
    <div class="page-title">DESIGNING<br>YOUR PASS SYSTEM.</div>

    <p class="para">A pass system is a small set of decisions made in advance. <strong>How many tiers do you need?</strong> Most theater and club tours run with three or four. Arena tours add VIP and press tiers. <strong>What does each tier grant?</strong> Write it down &mdash; security will enforce what you wrote, not what you meant. <strong>Where do the passes come from?</strong> Usually a mix: the box office often handles VIP and ticketed credentials; the production office handles working crew and backstage. The venue may print them, you may print them, or the promoter may.</p>

    <p class="para"><strong>&ldquo;All Access&rdquo; doesn&rsquo;t mean what people think it means.</strong> It means you&rsquo;re allowed to be anywhere in the building during normal operating conditions. It does not mean you can drag a friend backstage during the show. Some tours print this directly on the pass to settle the conversation before it happens. Be deliberate about who gets one.</p>

    <p class="para"><strong>Photo passes have rules attached</strong> &mdash; first three songs, no flash, no video, stay in the pit, exit when the runner waves you out. Make sure those rules are printed on the pass or on a separate photographer agreement. The agreement is also where you spell out what they can and can&rsquo;t do with the photos afterward.</p>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">PASS SHEET / CREDENTIAL MAP</div>
        <div class="kit-eyebrow">
          <span class="kit-label">— FROM THE BINDER —</span>
          <span class="kit-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#D4641E" stroke-width="1.5" stroke-linejoin="round">

              <line x1="7" y1="15" x2="12" y2="15"/>

      <p class="bc-text-dark">A fillable <strong>Pass Sheet / Credential Map</strong> &mdash; one page that locks the tier system, the color codes, the count per tier, and what each tier grants. Print and hand to your security lead at the day-of meeting. The document that turns &ldquo;I think&rdquo; into &ldquo;here&rsquo;s the plan.&rdquo; Pinned to DOC-211.</p>
    </div>

    <div class="pull-quote">
      <p>The pass system on paper is the conversation you&rsquo;re going to have with security in real life. Lock it on paper first.</p>
    </div>

  <div class="body-area">
    <div class="module-tag">— 06 / SAMPLE PASS BOARD —</div>
    <div class="page-title">PASS BOARD.</div>
    <div class="page-sub" style="margin-bottom: 10px;">An example for The Blue Printers &mdash; Blueback Theater, Oct 14, 2026.</div>

    <p class="para" style="margin-bottom: 10px;"><strong>Scale the board to your show.</strong> What lives on it should match how people are actually moving through your building &mdash; the bigger or more layered your operation, the more tiers you&rsquo;ll need; the simpler the show, the simpler the board. <em>Expand it or trim it</em> to fit the day. Whatever you build, the rule stays the same: <strong>spell it out simply enough that anyone glancing at the board knows what their credential lets them do.</strong></p>

    <div class="passboard">

      <div class="pb-col">
        <div class="pb-col-head">— WRISTBANDS · 6 ISSUE —</div>
        <div class="pb-bands">

          <div class="pb-band bg-red">
            <div class="pbb-logo">BB<span>10.14</span></div>
            <div class="pbb-role">All Access <span class="pbb-sub">Tour Leadership</span></div>
            <div class="pbb-color">Cherry<br>Red</div>
          </div>

          <div class="pb-band bg-stageblack">

            <div class="pbb-color">Stage<br>Black</div>
          </div>

          <div class="pb-band bg-gold">

    <div class="page-title">FOUR STREAMS<br>THROUGH ONE BUILDING.</div>
    <div class="page-sub">Audience, artist, working crew, VIP. They cross. They can&rsquo;t collide.</div>

  <div class="body-area">
    <div class="module-tag">— 06 / SECURITY AS PARTNERSHIP —</div>
    <div class="page-title">LEAD WITH<br>THEIR EXPERTISE.</div>
    <div class="page-sub">The single most important relationship you build on show day.</div>

    <p class="para"><strong>You&rsquo;re not the security expert. The local security lead is.</strong> They&rsquo;ve worked this venue more times than you have. They know the doors, the bottlenecks, the trouble spots, and the local crowd&rsquo;s pattern of behavior. If you walk in trying to tell them how to run their building, the meeting goes poorly and the show suffers. If you walk in carrying their context, sharing yours, and asking real questions, you walk out with a partner.</p>

    <p class="para">The meeting itself is short &mdash; typically <strong>15 to 20 minutes</strong> in the early afternoon, after load-in is well under way but before doors get close. Find them at the venue, shake their hand, and ask if you can sit down for twenty minutes to walk through the day. They&rsquo;ll say yes. Bring a copy of the day sheet and the pass sheet. Bring a pen.</p>

    <div class="pc-callout">
      <div class="pcc-tag">— THE FRAME —</div>
      <div class="pcc-title">YOU KNOW YOUR SHOW. THEY KNOW THEIR VENUE.</div>
      <div class="pcc-text">Your job is to tell them what your show looks like &mdash; the demographic, the energy, the moments where things might spike. Their job is to tell you how their team is prepared to handle each of those moments. <em>You&rsquo;re combining two pictures, not arguing about one.</em></div>
    </div>

    <p class="para">Leave the meeting with one thing above all else: <strong>their cell number in your phone.</strong> If something happens in the show &mdash; a fan jumping the barricade, a medical issue, an active threat &mdash; you don&rsquo;t want to be searching for whose radio to grab. You want to text the lead, who is already expecting your number to come up.</p>

    <p class="para">A few quiet things that signal partnership rather than supervision: introduce yourself by first name. Thank them in advance for the day. Ask their team&rsquo;s name when you spot security on a post during the show. Bring water to barricade in the afternoon if the venue&rsquo;s hot. None of it is performative if you mean it.</p>

    <div class="pull-quote">
      <p>The next page is the meeting agenda. Use it as a checklist on the first few tours. After that, it&rsquo;ll live in your head.</p>
    </div>

      <span class="arrow">— THE MEETING AGENDA →</span>
    </div>
  </div>
</div>

  <div class="body-area">
    <div class="module-tag">— 06 / MEETING AGENDA —</div>
    <div class="page-title">THE DAY-OF<br>SECURITY MEETING.</div>
    <div class="page-sub">Eight buckets. About twenty minutes. Bring the day sheet.</div>

    <div class="agenda-grid">
      <div class="agenda-card">
        <div class="ac-num">— BUCKET 01 —</div>
        <div class="ac-head">Show Overview</div>
        <div class="ac-body">What kind of show is this? Demographic, energy, music style. Typical crowd response &mdash; pushy, calm, dance-heavy. Does the artist go into the crowd? Are fans ever invited onstage?</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 02 —</div>
        <div class="ac-head">Entry &amp; Exit</div>
        <div class="ac-body">How are fans getting in and out? Bag checks, wanding, metal detectors? What can fans bring &mdash; bags, cameras, water bottles? Re-entry policy?</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 03 —</div>
        <div class="ac-head">Schedule</div>
        <div class="ac-body">Walk the day sheet with them. Confirm doors, openers, headliner, hard curfew. Print extras for their team to distribute across posts.</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 04 —</div>
        <div class="ac-head">Credentials</div>
        <div class="ac-body">Hand them the pass sheet. Walk the tiers and what each grants. Confirm counts. Address the &ldquo;all access&rdquo; question before it becomes one.</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 05 —</div>
        <div class="ac-head">VIP / Soundcheck Party</div>
        <div class="ac-body">If you&rsquo;re running VIP, walk the timeline. What&rsquo;s the screening for guests entering the VIP space? Where does the M&amp;G happen? Who escorts?</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 06 —</div>
        <div class="ac-head">Deployment Plan</div>
        <div class="ac-body">Where is security posted, and when do those posts go live? Barricade guidelines: rotate often, hydrate, lift carefully, watch the front row. Uniformed officers stay back from the stage.</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 07 —</div>
        <div class="ac-head">Post-Show</div>
        <div class="ac-body">Vehicles moving in or out around bus call? Big merch push? Is the artist meeting fans outside? Anything special about how this room empties?</div>
      </div>

      <div class="agenda-card">
        <div class="ac-num">— BUCKET 08 —</div>
        <div class="ac-head">Emergency Protocols</div>
        <div class="ac-body">Fire, medical, active threat. What&rsquo;s the venue plan? Who calls 911? Where are evac paths? Where does the artist go if you have to stop the show?</div>
      </div>
    </div>

    <div class="pull-quote" style="margin-top: 6px;">
      <p>Last beat of the meeting: exchange numbers. Thank them for being part of the show. Mean it.</p>
    </div>

  <div class="body-area">
    <div class="module-tag">— 06 / DEPLOYMENT —</div>
    <div class="page-title">WHERE SECURITY<br>STANDS.</div>
    <div class="page-sub">The posts that matter and why each one is there.</div>

    <p class="para">Your security lead will build the deployment plan based on what they&rsquo;ve learned about your show. These are the typical posts that need a body, and the reason each one exists. Use this as a reference when reviewing their plan &mdash; if a post on this list isn&rsquo;t covered, ask why.</p>

    <div class="deploy-board">
      <div class="deploy-row">
        <div class="dep-post">Stage Door / Load-In</div>
        <div class="dep-why">Controls who enters back-of-house from the alley or lot. Verifies credentials of anyone arriving after load-in is done. The artist&rsquo;s primary entry point.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Dressing Room Area</div>
        <div class="dep-why">Sits between hallway and dressing rooms. Quiet post most of the day. Becomes critical pre-show and during the encore when guests want to slip in.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Bus Lot / Trucks</div>
        <div class="dep-why">Keeps the lot calm. Stops curious wanderers, manages friends-and-family arriving by car, watches for anything moving toward the buses post-show.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Every Backstage Entry / Exit</div>
        <div class="dep-why">Wherever the public side touches the back-of-house side, a credential check happens there. Lobby doors, dressing-room hallway, side stage.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">FOH</div>
        <div class="dep-why">Watches the mix world during the show. Polite about it. Fans wander up to ask questions; engineers can&rsquo;t answer them mid-set.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Behind Barricade (Pit)</div>
        <div class="dep-why">The most demanding seat in the room. Rotates often. Catches crowd-surfers, pulls fainted fans up, hands water. <strong>Plainclothes only &mdash; uniformed officers near the stage kill the vibe.</strong></div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Merch Area</div>
        <div class="dep-why">Light presence. Keeps the line orderly, watches for the post-show rush. <strong>Ask security not to push fans away from the merch table.</strong> The line is your revenue.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">Lobby / Doors</div>
        <div class="dep-why">Public ingress and egress. The face of the security operation for ticket-buyers. Sets the tone for the night before anyone hits the room.</div>
      </div>
      <div class="deploy-row">
        <div class="dep-post">VIP / Soundcheck Party</div>
        <div class="dep-why">Active only pre-show. Manages entry into the VIP space, the photo line, and the handoff back out to the general floor when the package wraps.</div>
      </div>
    </div>

  <div class="body-area">
    <div class="module-tag">— 06 / VIP &amp; M&amp;G —</div>
    <div class="page-title">VIP &amp; MEET-<br>AND-GREET FLOW.</div>
    <div class="page-sub">The micro-flow inside the bigger one &mdash; moving select people to the artist safely.</div>

    <p class="para">VIP is a paid experience for fans. The package usually includes early venue entry, a small soundcheck-party experience, a photo or signing with the artist, some swag, and a return to a premium seat or pit position. <strong>It runs on tight choreography</strong> &mdash; the artist is doing a stage performance later, and pre-show energy is currency.</p>

    <div class="mg-flow">
      <div class="mg-step">
        <div class="ms-num">— STEP 01 —</div>
        <div class="ms-name">Check-In</div>
        <div class="ms-desc">VIP entry, separate from general doors. Credential issued. List checked.</div>
      </div>
      <div class="mg-step">
        <div class="ms-num">— STEP 02 —</div>
        <div class="ms-name">Soundcheck Party</div>
        <div class="ms-desc">Hold area with light hospitality. Artist soundcheck visible from the back of the room.</div>
      </div>
      <div class="mg-step">
        <div class="ms-num">— STEP 03 —</div>
        <div class="ms-name">Photo / M&amp;G</div>
        <div class="ms-desc">Choreographed line. ~10 seconds per fan. Security holds the rear, coordinator waves through.</div>
      </div>
      <div class="mg-step">
        <div class="ms-num">— STEP 04 —</div>
        <div class="ms-name">Swag Handoff</div>
        <div class="ms-desc">Pre-bundled. Off to the side of the photo handoff so the line keeps moving.</div>
      </div>
      <div class="mg-step">
        <div class="ms-num">— STEP 05 —</div>
        <div class="ms-name">Release to Seat</div>
        <div class="ms-desc">Back to premium seating or VIP pit. Security at the handoff door watches for stragglers.</div>
      </div>
    </div>

    <div class="sec-head">A few practical mechanics</div>
    <ul class="topics">
      <li><strong>Ten seconds per fan</strong> at the photo line is a useful planning number. 30 guests = 5 minutes. 60 = 10. Build the schedule against the math.</li>
      <li><strong>Photo backdrop on the artist&rsquo;s left</strong>, the coordinator waving people through on the right. Camera operator&rsquo;s position is fixed. Same shot every time.</li>
      <li><strong>The artist enters last</strong>, exits first. Walk them in, walk them out. Crew clears the room while the line is still re-seating.</li>
      <li><strong>One person owns this</strong> &mdash; the TM, the PM, or a dedicated VIP coordinator on bigger tours. Don&rsquo;t leave M&amp;G unowned and assume it&rsquo;ll run itself.</li>
      <li><strong>Have a hard stop.</strong> If the line bogs down, the coordinator cues a wrap. The artist needs forty-five minutes of quiet before show.</li>
    </ul>

  <div class="body-area">
    <div class="module-tag">— 06 / INFRASTRUCTURE —</div>
    <div class="page-title">THE HARDWARE<br>DOING THE WORK.</div>
    <div class="page-sub">Barricade, photo pit, backstage flow, cable paths, crowd flow. The pieces that hold the spatial layer together.</div>

    <div class="infra-grid">
      <div class="infra-card">
        <div class="ic-head">Barricade</div>
        <div class="ic-body">A physical barrier between the audience and the stage, set the venue&rsquo;s standard distance from the lip. Straight barricade for theaters and clubs; <strong>mojo barricade</strong> for arena-scale, with a curved or angled front and a wider photo pit. Some shows add a B-stage extension or thrust &mdash; barricade follows the artist.</div>
      </div>
      <div class="infra-card">
        <div class="ic-head">Photo Pit</div>
        <div class="ic-body">The space between the barricade and the stage. Photographers shoot <strong>the first three songs</strong> from the pit, then exit. Security holds the front row from the pit side. A small first-aid station often lives in or just behind it.</div>
      </div>
      <div class="infra-card">
        <div class="ic-head">Backstage Flow</div>
        <div class="ic-body">Cover the artist + touring party zones with care &mdash; <strong>keep the artist in an area that allows for some privacy.</strong> Door signage matters: label each room so security knows whose room is whose. Walk the paths and tag every turn with clear signage. Some intersections will be used by many people &mdash; keep the language simple and direct, covering a wide base of who might be at each step.</div>
      </div>
      <div class="infra-card">
        <div class="ic-head">Cable Paths</div>
        <div class="ic-body">Where audio snakes, lighting power, video runs cross public flow. Tape them flat. Cover with ramp where audience walks. <strong>Trip hazards are operational risks</strong> &mdash; a fan with a sprained ankle changes the night.</div>
      </div>
      <div class="infra-card full">
        <div class="ic-head">Crowd Flow &amp; Egress</div>
        <div class="ic-body">Talk this through with venue security &mdash; they know how their room releases energy on a busy night. <strong>Crowd energy needs somewhere to go.</strong> If the room peaks and there&rsquo;s no space for that energy to travel, you get pressure: people pushed into barricade, pinned in corners, trapped behind columns, squeezed into pinch points and boxed-in areas. A healthy floor has <strong>multiple directions</strong> for movement to release into &mdash; back of room, lobby, side aisles, a clear barricade line that holds without funneling people inward. Walk the floor with security in the afternoon and look for where flow could get blocked. Routing and infrastructure that don&rsquo;t allow crowds to move freely become safety problems the second the energy spikes.</div>
      </div>
    </div>

    <div class="binder-callout">
      <div class="kit-title-row">
        <div class="bc-title-dark">DOOR SIGNS &amp; WAYFINDING PACK</div>
        <div class="kit-eyebrow">

      <p class="bc-text-dark">A printable <strong>Wayfinding Pack</strong> &mdash; production office, dressing rooms, catering, stage, crew, plus directional arrows. Ready to print and post during walkthrough. Same family as the mini sign tiles you saw in Module 05. Pinned to DOC-212.</p>
    </div>

    <div class="pull-quote">
      <p>Lean on the venue&rsquo;s leadership. They watch different tours deploy into their building every week of the year &mdash; they have real insight into what works and what hasn&rsquo;t.</p>
    </div>
