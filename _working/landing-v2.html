<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1B3D6E">
<title>Backstage Blueprint — Production · Live · Touring Systems</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Preload the flat backdrop + four crossfade images -->
<link rel="preload" as="image" href="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/BACKGROUND_XLR_CLICK_1.png">
<link rel="preload" as="image" href="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONECTOR_2.png">
<link rel="preload" as="image" href="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_3.png">
<link rel="preload" as="image" href="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_4.png">
<link rel="preload" as="image" href="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_5.png">

<style>
/* =========================================================
   PALETTE & TUNABLES
   ========================================================= */
:root {
  --navy:        #1B3D6E;
  --navy-deep:   #142C4F;
  --orange:      #D85A1F;
  --cream:       #F2EBDD;
  --glow-color:  255, 245, 215;

  /* Phase 1 cable breath */
  --breath-duration: 6s;

  /* Slam (lift + drop + snap to flat) */
  --slam-duration: 460ms;

  /* Rhythm structure:
       slam → HARD SNAP to flat → hold 300ms → 500ms crossfade to connector_2
       → hold 300ms → 500ms crossfade → hold 300ms → ... → connector_5 lands.
     Beats land 800ms apart for an even pulse. */
  --connector-fade: 500ms;     /* crossfade between connector images */
  --connector-hold: 300ms;     /* time held before next crossfade kicks in */

  /* Establishing fade-in on first load */
  --establish-duration: 1.4s;
  --establish-ease: cubic-bezier(0.22, 0.61, 0.36, 1);

  /* Hover snap on Click-to-Begin */
  --hover-snap: 160ms;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--navy);
  color: var(--cream);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* =========================================================
   ESTABLISHING ANIMATION (page fade-in on first load)
   ========================================================= */
.desk {
  opacity: 0;
  transform: scale(0.96);
  transition: opacity var(--establish-duration) ease,
              transform calc(var(--establish-duration) + 0.2s) var(--establish-ease);
}
body.loaded .desk {
  opacity: 1;
  transform: scale(1);
}

header, footer {
  opacity: 0;
  transition: opacity 0.9s ease 0.4s;
}
body.loaded header,
body.loaded footer {
  opacity: 1;
}

/* =========================================================
   HEADER
   ========================================================= */
header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 80;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 48px;
  pointer-events: none;
}
.header-mark {
  font-family: 'Teko', 'Oswald', 'Impact', 'Arial Narrow', sans-serif;
  font-size: 18px;
  letter-spacing: 1.5px;
  color: var(--cream);
  pointer-events: auto;
}
.header-mark .reg {
  display: inline-block;
  width: 14px; height: 14px;
  border: 1.5px solid var(--cream);
  border-radius: 50%;
  font-size: 9px;
  line-height: 12px;
  text-align: center;
  vertical-align: 4px;
  margin-left: 6px;
}
.header-meta {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
  opacity: 0.85;
  pointer-events: auto;
}

/* =========================================================
   HERO + DESK
   ========================================================= */
.hero {
  position: relative;
  flex: 1;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.hero::before, .hero::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  z-index: 40;
  pointer-events: none;
}
.hero::before {
  top: 0; height: 140px;
  background: linear-gradient(180deg, rgba(20,44,79,0.55) 0%, rgba(20,44,79,0) 100%);
}
.hero::after {
  bottom: 0; height: 140px;
  background: linear-gradient(0deg, rgba(20,44,79,0.55) 0%, rgba(20,44,79,0) 100%);
}

.desk {
  position: relative;
  aspect-ratio: 4000 / 2250;
  width: min(100vw, calc(100vh * 4000 / 2250));
  overflow: hidden;
}

.world {
  position: absolute;
  inset: 0;
  transform-origin: 50% 50%;
}

/* =========================================================
   LAYER STACK
   ========================================================= */
.layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

/* --- BACKDROPS (z=1) ---
   bg-initial: snaps OUT instantly on cue-flat (no fade).
   bg-flat: snaps IN instantly on cue-flat, then crossfades OUT on cue-fade-2. */
.bg { z-index: 1; opacity: 0; }
.bg.bg-initial { opacity: 1; transition: opacity 0ms; }
.bg.bg-flat    { transition: opacity 0ms; }       /* default: instant for the snap-in */

body.cue-flat .bg-initial { opacity: 0; }
body.cue-flat .bg-flat    { opacity: 1; }

/* On cue-fade-2, bg-flat begins crossfading OUT — switch to the normal 500ms duration */
body.cue-fade-2 .bg-flat {
  opacity: 0;
  transition: opacity var(--connector-fade) ease;
}

/* --- CROSSFADE IMAGES (z=2) — connectors crossfade at 500ms each --- */
.fade {
  z-index: 2;
  opacity: 0;
  transition: opacity var(--connector-fade) ease;
}

body.cue-fade-2 .fade-2 { opacity: 1; }

body.cue-fade-3 .fade-2 { opacity: 0; }
body.cue-fade-3 .fade-3 { opacity: 1; }

body.cue-fade-4 .fade-3 { opacity: 0; }
body.cue-fade-4 .fade-4 { opacity: 1; }

body.cue-fade-5 .fade-4 { opacity: 0; }
body.cue-fade-5 .fade-5 { opacity: 1; }

/* =========================================================
   XLR_1 + CLICK TO BEGIN (Phase 1) — breath, hover, slam
   ========================================================= */
.cable-1-wrapper {
  position: absolute;
  inset: 0;
  z-index: 10;
  transform: scale(1);
  transform-origin: 50% 50%;
  transition: opacity 0ms;                /* snap out instantly on the slam impact */
  will-change: transform, opacity;
}
.cable-1 {
  width: 100%; height: 100%;
  display: block;
  animation: cable-breathe var(--breath-duration) ease-in-out infinite;
}
@keyframes cable-breathe {
  0%, 100% {
    transform: scale(1.000);
    filter:
      drop-shadow(0 0 0 rgba(var(--glow-color), 0))
      drop-shadow(0 1px 2px rgba(0, 0, 0, 0.20));
  }
  50% {
    transform: scale(1.010);
    filter:
      drop-shadow(0 0 0 rgba(var(--glow-color), 0))
      drop-shadow(0 9px 16px rgba(0, 0, 0, 0.45));
  }
}

.click-to-begin {
  z-index: 20;
  opacity: 1;
  transform: scale(1);
  transition: opacity 0ms,                              /* snap out instantly on slam impact */
              transform var(--hover-snap) cubic-bezier(0.22, 1.2, 0.36, 1),
              filter   var(--hover-snap) ease;
  filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.22));
}

.hot {
  position: absolute;
  z-index: 25;
  cursor: pointer;
}
.hot-begin {
  left: 42%; top: 36%; width: 16%; height: 14%;
}
body:not(.phase-1) .hot-begin { display: none; }

/* Snappy hover: button lifts with warm halo */
body.phase-1 .hot-begin:hover ~ .click-to-begin {
  transform: scale(1.05);
  filter: drop-shadow(0 13px 22px rgba(0, 0, 0, 0.55))
          drop-shadow(0 0 24px rgba(var(--glow-color), 0.65));
}

/* THE SLAM — soft lift, brief hold, hard slam down. One beat total. */
body.cue-slam .cable-1-wrapper,
body.cue-slam .click-to-begin {
  animation: slam-cycle var(--slam-duration) forwards;
}

@keyframes slam-cycle {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.22));
    animation-timing-function: cubic-bezier(0.2, 0.7, 0.3, 1);   /* ease-out for soft lift */
  }
  48% {
    transform: scale(1.075);
    filter: drop-shadow(0 24px 38px rgba(0, 0, 0, 0.55));
    animation-timing-function: linear;
  }
  62% {
    transform: scale(1.075);
    filter: drop-shadow(0 24px 38px rgba(0, 0, 0, 0.55));
    animation-timing-function: cubic-bezier(0.7, 0, 0.85, 0);    /* ease-in for hard slam */
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.22));
  }
}

/* At the impact moment, cable + button vanish (snap to flat backdrop) */
body.cue-flat .cable-1-wrapper,
body.cue-flat .click-to-begin {
  opacity: 0;
  pointer-events: none;
}

/* =========================================================
   FOOTER
   ========================================================= */
footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 80;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 24px 48px 28px;
}
.tagline {
  font-family: 'Teko', 'Oswald', 'Impact', 'Arial Narrow', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cream);
  opacity: 0.95;
}
.tagline .dot { color: var(--orange); margin: 0 8px; }
.contact {
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--cream);
  text-decoration: none;
  border-bottom: 1.5px solid var(--orange);
  padding-bottom: 4px;
  transition: color 0.2s ease, border-color 0.2s ease;
}
.contact:hover { color: var(--orange); }

/* =========================================================
   REPLAY BUTTON — appears after first play
   ========================================================= */
.replay-btn {
  position: fixed;
  bottom: 78px;
  right: 48px;
  z-index: 90;
  background: transparent;
  color: var(--cream);
  border: 1px solid rgba(242, 235, 221, 0.45);
  padding: 9px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 400ms ease,
              border-color 200ms ease,
              color 200ms ease,
              background-color 200ms ease;
}
body.played .replay-btn {
  opacity: 0.7;
  pointer-events: auto;
}
.replay-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
  opacity: 1;
}
.replay-btn .icon {
  display: inline-block;
  margin-right: 6px;
  font-size: 13px;
  transform: translateY(1px);
}

/* MOBILE */
@media (max-width: 720px) {
  header { padding: 20px 24px; }
  footer {
    padding: 20px 24px 24px;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
  }
  .header-meta { font-size: 9px;  letter-spacing: 1.5px; }
  .header-mark { font-size: 13px; letter-spacing: 1px;   }
  .tagline     { font-size: 11px; letter-spacing: 2.5px; }
  .contact     { font-size: 11px; letter-spacing: 2px;   }
  .replay-btn  { bottom: auto; top: 64px; right: 24px; padding: 7px 13px; font-size: 10px; letter-spacing: 2px; }
}
</style>
</head>
<body class="phase-1">

<header>
  <div class="header-mark">BCKSTG &middot; BLPRNT<span class="reg">M</span></div>
  <div class="header-meta">EST. 2026</div>
</header>

<main class="hero">
  <div class="desk">
    <div class="world" id="world">

      <!-- ===== BACKDROPS ===== -->
      <img class="layer bg bg-initial" src="HOME_PAGE/LANDING PAGE OPTIONS ASSETS/LANDING_PAGE_REFERENCE.png" alt="">
      <img class="layer bg bg-flat"    src="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/BACKGROUND_XLR_CLICK_1.png" alt="">

      <!-- ===== CROSSFADE IMAGES (full-canvas, opacity-driven) ===== -->
      <img class="layer fade fade-2" src="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONECTOR_2.png" alt="">
      <img class="layer fade fade-3" src="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_3.png" alt="">
      <img class="layer fade fade-4" src="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_4.png" alt="">
      <img class="layer fade fade-5" src="HOME_PAGE/NEW_5-27/BB_WEBSITE_PAGES/XLR_CONNECTOR_5.png" alt="">

      <!-- ===== XLR_1 BREATH + CLICK TO BEGIN (Phase 1) ===== -->
      <div class="cable-1-wrapper">
        <img class="cable-1" src="HOME_PAGE/LANDING PAGE OPTIONS ASSETS/XLRCABLE_1.png" alt="">
      </div>

      <!-- hot-begin MUST come before click-to-begin so the sibling selector works -->
      <div class="hot hot-begin"></div>
      <img class="layer click-to-begin" src="HOME_PAGE/LANDING PAGE OPTIONS ASSETS/CLICK_TO_BEGIN.png" alt="">

    </div>
  </div>
</main>

<footer>
  <div class="tagline">Backstage Blueprint <span class="dot">&middot;</span> Every Show Needs A Blueprint</div>
  <a class="contact" href="mailto:hello@backstageblueprint.com">Get In Touch</a>
</footer>

<button class="replay-btn" id="replay-btn" type="button">
  <span class="icon">&#x21BB;</span>Replay
</button>

<script>
  // ===== ESTABLISHING ANIMATION =====
  const body = document.body;
  window.addEventListener('load', () => {
    setTimeout(() => body.classList.add('loaded'), 60);
  });
  setTimeout(() => body.classList.add('loaded'), 2500);

  // ===== CUE SEQUENCE =====
  // Rhythm:
  //   slam → HARD SNAP to flat (instant) → hold 300ms → 500ms crossfade to connector_2
  //   → hold 300ms → 500ms crossfade → ... → connector_5 lands.
  //   Beats land every 800ms (hold + crossfade) for an even pulse.
  const SLAM_END = 460;
  const HOLD     = 300;
  const FADE     = 500;
  const STEP     = HOLD + FADE;   // 800ms between connector cues

  const T_FLAT   = SLAM_END;             //  460 — HARD SNAP to flat
  const T_FADE_2 = T_FLAT   + HOLD;      //  760 — start crossfade to connector_2
  const T_FADE_3 = T_FADE_2 + STEP;      // 1560 → connector_3
  const T_FADE_4 = T_FADE_3 + STEP;      // 2360 → connector_4
  const T_FADE_5 = T_FADE_4 + STEP;      // 3160 → connector_5
  // (landing on connector_5 fully visible at T_FADE_5 + FADE  =  3660ms)

  const CUES = [
    { at:        0, cls: 'cue-slam'   },  // lift + slam
    { at:   T_FLAT, cls: 'cue-flat'   },  // [HARD SNAP] flat XLR
    { at: T_FADE_2, cls: 'cue-fade-2' },  // 500ms crossfade → connector_2
    { at: T_FADE_3, cls: 'cue-fade-3' },  // 500ms crossfade → connector_3
    { at: T_FADE_4, cls: 'cue-fade-4' },  // 500ms crossfade → connector_4
    { at: T_FADE_5, cls: 'cue-fade-5' },  // 500ms crossfade → connector_5 (landing)
  ];

  let playing = false;
  const timeouts = [];

  function playSequence() {
    if (playing) return;
    playing = true;
    body.classList.remove('phase-1');
    body.classList.add('played');
    CUES.forEach(c => {
      const t = setTimeout(() => body.classList.add(c.cls), c.at);
      timeouts.push(t);
    });
  }

  function resetSequence() {
    timeouts.forEach(clearTimeout);
    timeouts.length = 0;
    CUES.forEach(c => body.classList.remove(c.cls));
    body.classList.add('phase-1');
    playing = false;
  }

  document.querySelector('.hot-begin').addEventListener('click', playSequence);

  document.getElementById('replay-btn').addEventListener('click', () => {
    resetSequence();
    setTimeout(playSequence, 100);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') resetSequence();
  });
</script>

</body>
</html>
