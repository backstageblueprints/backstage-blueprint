# Netlify configuration — Backstage Blueprint platform

[build]
  # Build the toolkit-app (Vite/React) as part of every deploy.
  # Output: toolkit-app/dist/ → moved to /toolkit/ at publish root.
  command = "cd toolkit-app && npm install && npm run build && rm -rf ../toolkit && mv dist ../toolkit"
  publish = "."

[functions]
  # Server-side code (Stripe webhook, etc.) will live here.
  directory = "netlify/functions"

# Root URL serves experience.html without changing the URL bar.
[[redirects]]
  from = "/"
  to = "/experience.html"
  status = 200
  force = true

# /toolkit (no trailing slash) → /toolkit/ (with slash).
# Without this, Netlify's pretty-URL behavior strips the slash off /toolkit/
# and matches toolkit.html (the sales page) instead of /toolkit/index.html
# (the React app). The force = true makes this redirect win over the
# pretty-URL extension lookup.
[[redirects]]
  from = "/toolkit"
  to = "/toolkit/"
  status = 301
  force = true

# SPA fallback for /toolkit/* — any client-side route inside the React app
# falls back to the app's index.html. Real assets (JS/CSS/images) still win
# because this rule is non-forced (status = 200 only, no force).
[[redirects]]
  from = "/toolkit/*"
  to = "/toolkit/index.html"
  status = 200
