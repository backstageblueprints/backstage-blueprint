# Netlify configuration — Backstage Blueprint platform

[build]
  # Build the toolkit-app (Vite/React) as part of every deploy.
  # Output: toolkit-app/dist/ → moved to /toolkit/ at publish root.
  command = "cd toolkit-app && npm install && npm run build && rm -rf ../toolkit && mv dist ../toolkit"
  publish = "."

[functions]
  # Server-side code (Stripe webhook, etc.) will live here.
  directory = "netlify/functions"

# Root URL serves experience.html without changing the URL bar.
[[redirects]]
  from = "/"
  to = "/experience.html"
  status = 200
  force = true

# /toolkit (no trailing slash) — REWRITE (not redirect) to the React app's
# index.html. Without `force = true` Netlify's pretty-URL behavior strips
# the slash off /toolkit/ and matches toolkit.html (the sales page) first.
# Using status 200 (rewrite) instead of 301 (redirect) avoids redirect loops.
[[redirects]]
  from = "/toolkit"
  to = "/toolkit/index.html"
  status = 200
  force = true

# /toolkit/ (with trailing slash) — same rewrite.
[[redirects]]
  from = "/toolkit/"
  to = "/toolkit/index.html"
  status = 200
  force = true

# SPA fallback for everything under /toolkit/* — non-forced so real assets
# (JS bundle, CSS, icon images) win when they exist on disk.
[[redirects]]
  from = "/toolkit/*"
  to = "/toolkit/index.html"
  status = 200
